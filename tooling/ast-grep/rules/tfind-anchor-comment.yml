# Finding 8: TFIND / feature-spec anchor comments. Density is a heat map of
# accreted complexity — where historical pain & decisions concentrate.
# INFORMATION: not a defect; a complexity-archaeology layer.
id: tfind-anchor-comment
language: typescript
severity: info
rule:
  kind: comment
  regex: 'TFIND-[0-9]+|firegrid-[a-z-]+\.[A-Z_]+\.[0-9]+'
message: "Architecture anchor comment (TFIND / feature-spec)"
note: >
  Anchors marking historical pain / decisions. Their per-file density is
  the heat map — read counts-by-file, not individual lines.
