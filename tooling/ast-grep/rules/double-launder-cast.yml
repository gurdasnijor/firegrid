# Finding 6: double-launder cast — `expr as unknown as T`. The `unknown`
# hop defeats structural checking between source and target.
# INFORMATION: footprint of where types are forcibly reinterpreted.
id: double-launder-cast
language: typescript
severity: info
rule:
  pattern: $E as unknown as $T
message: "Double-launder cast to $T (via `unknown`)"
note: >
  `x as unknown as T` erases the source type then asserts the target.
  Inventory only — some are legitimate boundary adapters; the question is
  how many, and clustered where.
