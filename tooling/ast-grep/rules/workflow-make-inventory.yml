# firegrid-workflow-driven-runtime.WORKFLOW_ADMISSION.1
# firegrid-workflow-driven-runtime.WORKFLOW_ADMISSION.2
#
# Inventory rule for production workflow identities. The blocking gate lives in
# .semgrep.yml so CI can baseline existing migration debt and reject new
# unclassified Workflow.make sites.
id: workflow-make-inventory
language: typescript
severity: info
rule:
  pattern: Workflow.make($$$ARGS)
message: "Workflow.make identity definition"
note: >
  Production Workflow.make sites should be rare and owner-shaped: an owned
  durable resource or long-running process state machine. One-shot commands,
  tool calls, waits, request/claim bridges, and route handlers are operation
  wrappers and should lower through the owning workflow state machine or an
  explicitly named engine primitive instead.

  Classified migration-debt entries (operation wrappers slated for cutover, NOT
  durable owners) are linked to their deletion/cutover beads under
  `metadata.migration-debt` below — see the tf-phk7 audit (tf-8lte).
metadata:
  # Workflow.make identities classified as migration-debt: production operation
  # wrappers that should collapse into their owning workflow rather than remain
  # standalone identities. Each links to the cutover/deletion bead that owns the
  # removal. These are also the grandfathered entries tracked in
  # semgrep-error-baseline.json (firegrid-no-unclassified-workflow-make).
  # Tooling/doc note only — no gate change (the active ast-grep gate filters to
  # hrtime-number-arithmetic; the blocking Workflow.make gate is in .semgrep.yml).
  migration-debt:
    - identity: ToolCallWorkflow
      workflow-name: firegrid.agent-tool-call
      site: packages/runtime/src/workflow-engine/workflows/tool-call.ts
      classification: operation-wrapper
      # Cutover: route MCP tool calls into owning RuntimeContextWorkflow; delete
      # ToolCallWorkflow.
      cutover-bead: tf-vfq9
    - identity: WaitForWorkflow
      workflow-name: firegrid.agent_tools.wait_for
      site: packages/runtime/src/workflow-engine/workflows/wait-for.ts
      classification: operation-wrapper
      # Collapse WaitForWorkflow into owning-workflow durable observation/wait
      # primitive.
      cutover-bead: tf-hpr0
