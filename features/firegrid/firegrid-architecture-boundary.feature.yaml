feature:
  name: firegrid-architecture-boundary
  product: firegrid
  description: Define the Firegrid package and authority boundaries so client, runtime, substrate, and lab surfaces do not collapse into each other.

components:
  VOCABULARY:
    requirements:
      1: Firegrid is the canonical product and durable execution fabric name.
      2: The app-facing package is the Firegrid client and exposes operation messaging and read APIs.
      3: The server-side participant package is the Firegrid runtime and advances durable execution.
      4: The substrate package owns durable kernel records, transitions, folds, projections, and authority.
      5: The lab is a standalone inspector app and may later use the same app-facing client APIs as applications.

  DEPENDENCY_GRAPH:
    requirements:
      1: The client package may depend on substrate but must not depend on runtime.
      2: The runtime package may depend on substrate but must not depend on client.
      3: The substrate package must not depend on client, runtime, lab, or product-specific runtime packages.
      4: Browser lab code may depend on the client and Durable Streams client but must not import runtime or substrate packages.
      5: Runtime process tooling may launch child processes but must not provide app-client capabilities from the runtime package.
      6: Reusable packages must not import workspace apps; standalone apps may depend downward on packages through public workspace package entrypoints.

  AUTHORITY:
    requirements:
      1: Clients append operation messages and caller-owned EventStream rows, not execution facts.
      2: Runtimes append execution facts only through substrate authority APIs.
      3: Substrate validates durable execution transitions including claims, completions, runs, and terminalization.
      4: Durable Streams and Durable State remain the source of truth.

constraints:
  SURFACE_AREA:
    requirements:
      1: Firegrid APIs should reduce public concept count rather than introduce parallel composition systems.
      2: Runtime composition uses ordinary Effect Layers rather than a Firegrid-specific graph DSL.
      3: Low-level kernel APIs live in substrate and are not re-exported from the app-facing client root.
      4: Standalone apps live under apps/* and do not expose package-style public exports unless a spec declares an importable surface.
      5: Substrate execution-service modules live under semantic write-api or execution boundaries rather than root-level substrate files.

  EFFECT_ARTIFACT_GRAPH:
    requirements:
      1: Architecture review tooling inventories exported Effect artifacts by structural role, including service tags, Layers, Schemas, tagged errors, Effect-returning functions, service interfaces, plain types, constants, and pure helpers.
      2: Effect-returning export inventory records the success, error, and requirement channels and resolves requirement-channel services to their declaration locations when possible.
      3: Boundary reports identify exported Effect artifacts and requirement-channel services that cross package or durable-core layer boundaries.
      4: Export reports distinguish declarations from re-exports so public package roots can be audited without hiding original ownership.
      5: Effect artifact inventory is emitted as structured data so SDD boundary rules can be checked independently from report rendering.
