feature:
  name: firegrid-workflow-driven-runtime
  product: firegrid
  description: Move runtime-context execution authority into durable workflows so runtime launch, synchronous agent runs, temporal waits, and future host supervision share one workflow-backed coordination plane.

components:
  PHASE_0_TARGET_REFERENCE:
    requirements:
      1: packages/tiny-firegrid contains an API-compatible clean-room reference implementation that drives the production protocol, client, edge, and channel contracts needed by the individual workflow slice while replacing only the behind-contract runtime implementation.
      2: The target reference composes a host-plane channel router, channel route implementations, workflow-owned DurableTable state, and one workflow body without importing production host-sdk or runtime implementation modules as behavioral dependencies.
      3: Host-plane route bodies in the target reference lower channel verbs to workflow-owned DurableTable writes or reads without exposing workflow handles, engine handles, DurableTable handles, output tables, request rows, claim rows, deferred rows, or completion rows to callers.
      4: Workflow-owned state in the target reference is modeled as an individual workflow state machine over a small number of DurableTable collections, not as separate request, claim, deferred, and completion table families per CRUD operation.
      5: The target reference proves session create or load, start, prompt, cancel, close or resume, duplicate input identity, and workflow-owned table progress through native tiny-firegrid OTel trace evidence and durable table/workflow artifacts.
      6: The target reference does not reference appendRuntimeInputDeferred, WorkflowEngineTable.deferreds, RuntimeInputIntentDispatcherLive, or RuntimeControlPlaneTable.inputIntents.
      7: "The target reference treats implementation sprawl as a stop-and-re-evaluate condition: adding a new public abstraction, request/claim/completion/deferred bridge, broad registry, adapter subsystem, authority model, parent/child workflow orchestration, cross-host routing, or non-reference production concern above the workflow-owned table seam requires an SDD update before code continues."

  PHASE_1_CONTEXT_WORKFLOW:
    requirements:
      1: startRuntime(contextId) starts or resumes a RuntimeContextWorkflow keyed by the contextId instead of directly owning local process execution.
      2: RuntimeContextWorkflow reads the RuntimeControlPlaneTable context row, records run started and terminal run evidence, and completes with the runtime exit evidence.
      3: RuntimeContextWorkflow performs external runtime side effects through one runRuntimeContext workflow activity per runtime attempt rather than through top-level runtime-host code.
      4: Duplicate startRuntime(contextId) calls do not start duplicate external runtime executions for the same context attempt.
      5: RuntimeContextWorkflow coordinates live runtime execution through a host-internal RuntimeContextSession seam whose workflow-reachable startOrAttach and send methods take and return only schema-serializable values.
      6: RuntimeContextSession startOrAttach and send are implemented by separate host-internal RawAdapter and CodecAdapter modules that do not share a generic command queue or monolithic supervisor.
      7: RuntimeContextSession send lazily reconstructs or reattaches the live owner when workflow replay has cached startOrAttach evidence but the host process has an empty in-memory registry.
      8: The default RuntimeContextWorkflow production path does not call runRuntimeContext, runCodecRuntimeEventPipeline, runIngressDelivery, or runToolRouter as compatibility fallbacks.

  PHASE_2_SYNC_RUN:
    requirements:
      1: A synchronous Firegrid run entrypoint can create a RuntimeContext row from a command supplied after a "--" separator and then call startRuntime(contextId).
      2: The synchronous run entrypoint blocks until RuntimeContextWorkflow completes and exits with the runtime execution exit code.
      3: The synchronous run entrypoint uses the same runtime host Layer composition, RuntimeControlPlaneTable, durable runtime input evidence, RuntimeOutputTable, workflow engine, and local-process provider path as normal runtime execution.
      4: The synchronous run entrypoint accepts secrets only through Effect Config or environment-backed redacted configuration, not through command-line token flags.
      5: The synchronous run entrypoint can attach env bindings of shape { name, ref:"env:VAR" } to the local-process provider's runtime.config.envBindings; only the binding ref is durably persisted, and the resolved value is sourced from the host process's env at spawn time and merged into the local-process SandboxCommand.envVars without traversing the durable plane.
      5-1: The local-process provider must not expose unrelated host process environment variables to the child; the child environment is limited to an explicit minimal baseline plus SandboxConfig.envVars and SandboxCommand.envVars.
      6: The runtime resolver authorizes envBindings as exact (childEnvVarName, hostEnvVarName) pairs and denies any binding whose pair is not on the host-authorized map, including a binding that routes an authorized host env value into a child env var the operator did not approve. The synchronous run entrypoint authorizes pairs through a --secret-env flag whose left/right halves are env-var names only, never secret values.
      7: The synchronous run entrypoint accepts a --cwd PATH flag and writes it through to RuntimeContext.runtime.config.cwd so the local-process sandbox spawns the child in that working directory; the durable row is the single source of truth for the spawn cwd.
      8: The synchronous run entrypoint accepts a --prompt TEXT flag and records an idempotent, sequenced initial runtime input for the context before startRuntime; the runtime workflow's stdin delivery stream then delivers the prompt to the child without bypassing durable input evidence.
      9: The synchronous run entrypoint resolves Durable Streams base URL and runtime namespace with the same local-defaults strategy as the start entrypoint - DURABLE_STREAMS_BASE_URL and FIREGRID_RUNTIME_NAMESPACE are honored when set, otherwise an embedded DurableStreamTestServer is acquired and the firegrid-local namespace default is used; pnpm firegrid -- run -- <agent> must not fail because those env vars are unset in local dev. When the env vars are set, the configured Durable Streams endpoint and namespace are used unchanged.

  PHASE_3_ACTIVITY_CLAIMS:
    requirements:
      1: Workflow activity claims are the single side-effect fence for runRuntimeContext; a competing context ownership mutex is not introduced for the normal runtime-context path.
      2: The workflow activity-claim implementation does not silently report the local worker as winner when the claim row fails to materialize.
      3: The workflow activity-claim implementation does not rely on fixed Effect.sleep polling as its normal materialization wait path.

  PHASE_4_TEMPORAL_WORKFLOWS:
    requirements:
      1: sleep(durationMs) semantics are expressed through DurableClock.sleep inside workflow code rather than through a Firegrid-owned timer table.
      2: schedule_me-style delayed self input is expressed as workflow state plus DurableClock.sleep followed by a runtime input append.
      3: Effect Schedule may be used to compute recurrence, backoff, or calendar policy, but DurableClock is the durable suspension primitive.
      4: effect/Scheduler is not used as Firegrid's durable scheduling abstraction.

  PHASE_5_HOST_WORKFLOW:
    requirements:
      1: A future HostWorkflow observes explicit eligible runtime-context work and starts or resumes RuntimeContextWorkflow executions without directly performing external runtime side effects.
      2: HostWorkflow does not use app-local in-memory sets as a correctness fence for context execution.
      3: HostWorkflow does not start child context workflows from retained context rows until the control-plane model can distinguish eligible work from already-observed context evidence.

  PHASE_6_AGENT_TOOLS:
    requirements:
      1: "FiregridAgentToolkit is an Effect AI Toolkit (Toolkit.make over Tool.make values) that exposes exactly the canonical agent tools sleep, wait_for, spawn, spawn_all, schedule_me, and execute. Firegrid does not maintain a separate descriptor registry parallel to the toolkit."
      2: "Each Tool.make value carries name, description, parameters Schema, success Schema, failure Schema, stability/capability annotations, and tool dependencies; no Tool field carries credentials, callback tokens, signing keys, provider session tokens, Durable Streams URLs, sandbox handles, host ids, or transport references."
      3: "Tool parameter and success schemas are imported from @firegrid/protocol/agent-tools and attached to each Tool.make via setParameters/setSuccess rather than duplicated; protocol is the single Effect Schema source of truth."
      4: "toolUseToEffect is the host-side lowering invoked from the toolkit handlers; it switches on ToolUse.name against the canonical protocol Effect Schemas, decodes ToolUse.input through each schema before dispatch, and routes each validated invocation to an exhaustive per-tool arm."
      5: "The match expression is the implementation; FiregridAgentToolkit is the public exposure manifest. Adding a tool requires a protocol Effect Schema, a Tool.make entry inside Toolkit.make, and a new arm in toolUseToEffect. Removing a tool requires removing the Tool from FiregridAgentToolkit before removing the arm."
      6: "Unknown tool names produce a ToolResult input event with isError true via the lowering's name-switch default; the workflow does not fail. Codecs that publish FiregridAgentToolkit will not deliver unknown names through the toolkit handle path itself."
      7: "Invalid tool inputs produce a ToolResult input event with isError true and a structured ToolInvalidInput error payload; the workflow does not fail. At the toolkit handler boundary the same input is also rejected by Effect AI's Schema.decodeUnknown before the handler runs."
      8: "Tool execution failures (typed expected errors and defects raised inside an arm) produce a ToolResult input event with isError true and a structured ToolExecutionFailed payload; the workflow does not fail. Arms do not use Effect.orDie to satisfy the outer never error channel."
      9: "sleep composes DurableClock.sleep with a deterministic clock name derived from toolUseId; suspends the workflow for the requested duration."
      10: "wait_for composes the durable-tools WaitFor.match surface, mapping EventQuery to a FieldEquals trigger over the named source collection, optionally raced against DurableClock.sleep for the timeout variant."
      11: "schedule_me composes DurableClock.sleep and then records a durable runtime input intent for the same context through the canonical host prompt append seam; the active host-scoped RuntimeContext engine or its startup reconciliation is the only path that turns the intent into runtime input delivery."
      12: "spawn, spawn_all, and execute lower onto host-provided AgentToolHost seams (spawnChildContext, spawnChildContexts, executeSandboxTool); the seams keep the lowering free of runtime-host imports while still composing the same Workflow.execute and SandboxProvider primitives at the Live layer."
      13: "A scheduled-input identity used by schedule_me is deterministic from contextId and toolUseId so workflow replay does not duplicate the scheduled prompt."
      14: "Toolkit handlers (installed via FiregridAgentToolkit.toLayer) route each tool call through ToolCallWorkflow.execute so toolUseToEffect always runs inside a workflow instance and never bypasses DurableClock, workflow identity, or host seams. The runtime-owned MCP-facing failure is a small Effect Schema (FiregridMcpToolFailure) the handlers raise on the Effect error channel so @effect/ai/McpServer can map it to CallToolResult.isError true."
      15: "The MCP projection uses @effect/ai/McpServer.registerToolkit(FiregridAgentToolkit) directly. Firegrid does not introduce a wrapper toolkit, a parallel descriptor catalog, a hand-written tools/list or tools/call handler, or a custom JSON-RPC parser."

  PHASE_7_MCP_HOST_SERVER:
    requirements:
      1: "The MCP HTTP server is owned by the Firegrid host process and ships as an Effect Layer composition primitive (FiregridMcpServerLayer) that consumers launch under their own NodeRuntime.runMain / Effect.scoped / Layer.launch scope; Firegrid does not introduce a separate firegrid:mcp process, stdio shim binary, child-process supervisor, or sidecar lifecycle for host-local agents."
      2: "The host-owned MCP server binds only to loopback for V1 and is intended for host-local agents launched or configured by the same host boundary; remote agents, browser clients, non-loopback binding, public endpoint discovery, and production authentication are deferred until after the localhost path is proven."
      3: "The host-owned MCP server uses @effect/ai/McpServer.layerHttp and McpServer.registerToolkit(FiregridAgentToolkit) directly with NodeHttpServer Layer composition; it does not implement custom JSON-RPC parsing, hand-written tools/list or tools/call handlers, a wrapper toolkit, a dynamic registry, or product-specific transport package."
      4: "Context routing for the MCP server is HTTP route or session state or a durable host/session record at compose time, never an agent-visible tool input and never static host-process env config. The preferred route shape is /mcp/runtime-context/:contextId installing FiregridAgentToolContext from request state. Until route-based injection or a durable host/session record lands, FiregridMcpServerLayer accepts contextId only as an explicit Layer-factory option at the call site; FIREGRID_MCP_CONTEXT_ID-style env knobs that bake runtime identity into deployment config are out of scope."
      5: "The host-owned MCP server shares the consuming Effect.scoped or Layer.launch scope and shuts down through normal scope finalization; it does not install a separate signal handler or lifecycle manager."
      6: "An MCP-shaped client over JSON-RPC HTTP must prove initialize, tools/list, sleep, malformed input, and unknown tool behavior through Effect AI's MCP layer, with sleep flowing through FiregridAgentToolkitLayer, ToolCallWorkflow.execute, toolUseToEffect, and DurableClock.sleep. Malformed tool input maps to CallToolResult.isError true inside HTTP 200. Unknown tool names map to Effect AI's library-default JSON-RPC -32602 error response inside HTTP 200 per MCP semantics for unrecognized tools; neither path is an HTTP 500 nor a Firegrid-custom protocol error."
      7: "The host-owned MCP server does not expose Durable Streams tokens, provider session handles, sandbox handles, host credentials, or Durable Streams URLs in tools/list, structuredContent, logs, generated local-agent config, or tool arguments."
      8: "Env config for the MCP server is limited to listener topology (FIREGRID_MCP_ENABLED, FIREGRID_MCP_HOST, FIREGRID_MCP_PORT, FIREGRID_MCP_PATH); the durable-tools stream URL is derived from the existing DURABLE_STREAMS_BASE_URL and FIREGRID_RUNTIME_NAMESPACE, not a separate FIREGRID_MCP_AGENT_TOOLS_STREAM_URL knob."
      9: "Auto-mounting the MCP server inside the firegrid:host entrypoint from env config is deferred until either route-based FiregridAgentToolContext injection or a durable host/session/local-agent authority record (in runtime-host or control-plane shape, not agent-tools) is available; the V1 PR ships the composition primitive and smoke, not the auto-mount."
      10: "Durable invocation/result facts, cross-retry idempotency, process-restart recovery for in-flight MCP tool calls, and remote/authenticated bridge behavior are later durable-indirect bridge work, not required for the first host-owned localhost MCP server."
      11: "OAuth authorization-server well-known discovery probes against the host-owned MCP server return HTTP 404 when OAuth is not configured without making the server span fail; the 404 is protocol negotiation evidence, not an MCP host error."

constraints:
  BOUNDARIES:
    requirements:
      1: RuntimeContext remains the durable intent and identity record; runRuntimeContext is an activity effect, not a new durable record family or product plane.
      2:
        requirement: RuntimeIngressTable.deliveries was legacy per-input delivery evidence inside runRuntimeContext.
        deprecated: true
      2-1: Runtime input delivery records durable per-input evidence by completing content-derived RuntimeContextWorkflow input deferreds; the workflow-native runtime path must not depend on RuntimeIngressTable.deliveries, RuntimeIngressTable.inputs, or runRuntimeContext.
      3: packages/runtime/src/durable-tools is provisional and may only bridge DurableTable row matches into workflow deferred completion; it must not own host dispatch, runtime execution, temporal scheduling, or context ownership.
      4: The workflow-driven runtime model does not introduce a public executeByName, workflow-name registry, DurableConsumer, ConsumerSource, ConsumerCheckpointStore, or DurableProjection replacement.
      5: Per-message runtime input delivery is not modeled as one workflow activity per input row in the default runtime path.
      6:
        requirement: RuntimeContext workflow engine state is provisioned per contextId; host-owned workflow stream routing and appendRuntimeIngressToOwner are not part of the target runtime input path.
        deprecated: true
      6-1: RuntimeContext workflow engine state is provisioned in one host-scoped workflow engine per host process; active RuntimeContext executions are keyed by contextId and executionId inside that shared engine.
      6-2: Host and application code depend on Layer-provided RuntimeContext capability services rather than a RuntimeContextEngineRegistry object that returns workflow engine handles.
      7: Client-written RuntimeInputIntent rows are consumed by a host-wide local dispatcher that demuxes to active RuntimeContext workflow executions; per-context engines do not each subscribe to the entire namespace intent stream.
      7-1: Until an engine.signal primitive exists, the host-scoped RuntimeContext engine may deliver input intents by completing context-scoped workflow deferreds in the shared engine table.
      8: Sticky RuntimeContext ownership prevents two hosts from starting or attaching workflow engines for the same contextId; lease expiry, failover takeover, rebalance, and scheduler-driven reassignment are deferred future work.

  VALIDATION:
    requirements:
      1: The first implementation phase must prove duplicate startRuntime(contextId) calls do not duplicate process start.
      2: The synchronous run phase must prove a real local-process command can be launched and observed through RuntimeOutputTable using the same runtime-context workflow path.
      3: A temporal workflow phase must prove DurableClock wakeup survives workflow-engine reconstruction before any Firegrid-owned schedule_me facade is accepted.
      4: "PHASE_6_AGENT_TOOLS V0 must prove FiregridAgentToolkit.tools matches the canonical six, Tool.parametersSchema decodes identically to the @firegrid/protocol schema, direct toolkit execution of sleep runs through toolUseToEffect under the workflow engine, malformed inputs are rejected at the toolkit/schema boundary, tool-arm failures become FiregridMcpToolFailure without failing the workflow, and McpServer.registerToolkit(FiregridAgentToolkit) composes as an Effect without a custom JSON-RPC stack or wrapper toolkit. Local HTTP MCP smoke is V1 acceptance, not V0."
      5: "PHASE_7_MCP_HOST_SERVER must prove FiregridMcpServerLayer composes a loopback Node HTTP server through McpServer.layerHttp + McpServer.registerToolkit(FiregridAgentToolkit), starts and stops with the consuming Effect scope, and that an MCP-shaped JSON-RPC HTTP client can drive initialize, tools/list, sleep, malformed input, and unknown tool through Effect AI's MCP layer without a custom JSON-RPC stack, separate MCP process, agent-visible contextId argument, or FIREGRID_MCP_CONTEXT_ID-style env config."
      6: RuntimeContextSession cutover tests prove idempotent startOrAttach, lazy send reattach after workflow-engine reconstruction, and at-most-once external command emission across restart.
      7: Host-scoped engine tests prove duplicate cross-host start or attach for the same contextId is rejected before a foreign workflow execution is provisioned, while same-owner attach is idempotent.
      7-1: Multi-context activation tests prove one host-scoped workflow engine can own multiple concurrent RuntimeContextWorkflow executions without provisioning per-context engine streams.
      7-2: Static source checks prove runtime host and agent-tool code do not import or depend on a RuntimeContextEngineRegistry surface.
      8: Runtime input intent tests prove a client or non-owner host can append an intent and the owning host's local dispatcher completes the active RuntimeContext workflow deferred without appendRuntimeIngressToOwner or owner-host workflow stream URL routing.
      9: The runtime control request reconciler daemon continues polling and can activate a newly appended context start request while a prior long-running RuntimeContextWorkflow start request remains active.
      10: The workflow-core-paths simulation gate fails if legacy durable-tools wait-router spans are present and requires trace evidence for runtime-context body execution, durable state transitions, agent-tool wait_for workflow execution, workflow Activity execution, DurableDeferred.raceAll completion, and DurableClock.sleep scheduling.
      11: A host-sdk MCP HTTP test proves /.well-known/oauth-authorization-server returns 404 while its firegrid.mcp.http span exits successfully.

  AGENT_TOOL_BOUNDARIES:
    requirements:
      1: "Agent tools are not a dynamic public registry; new tools require a Tool.make entry in FiregridAgentToolkit and a host lowering arm change."
      2: "Agent tool implementations introduce no new substrate modules; all six tools compose Phase 1 agent-io events with @effect/workflow primitives and existing durable-tools/sandbox-provider surfaces."
      3: "ToolUse parsing and ToolResult encoding remain codec concerns (Phase 1 agent-io substrate); Toolkit exposure and host-side lowering are agent-tool concerns and live in packages/runtime/src/agent-tools."
      4: "The match expression depends only on the Phase 1 agent-io event types and the canonical protocol Effect Schemas; it does not depend on which codec produced the invocation or which transport delivered it."
      5: "@firegrid/protocol owns the schema source of truth; only the Tool.make values listed in FiregridAgentToolkit are exposed to agents."
      6: "Runtime API calls and agent tool calls lower to the same durable workflow/table shapes; agent tools introduce no parallel run, claim, or completion record families."
      7: "A runtime-owned Streamable HTTP MCP bridge may live under packages/runtime/src/agent-tools only as @effect/ai/McpServer composition that calls registerToolkit(FiregridAgentToolkit) directly; it does not define new tool schemas, dynamic tool registration, a wrapper toolkit, a parallel descriptor catalog, product-specific transports, substrate row families, or a custom JSON-RPC parser."
      8: "Effect AI Toolkit and McpServer are the integration layer for tool definition, handler registration, and MCP projection; Firegrid does not maintain a Firegrid-local toolkit clone, a Firegrid descriptor manifest, or hand-written tools/list and tools/call handlers."
      9: "The host-owned MCP server is a runtime-host composition concern, not a new process ownership model. Host-local agent MCP access composes with the existing host graph and Effect scope."
