feature:
  name: firegrid-package-migration
  product: firegrid
  description: Define the package, naming, and compatibility migration from durable-agent-substrate host/client vocabulary to Firegrid vocabulary.

components:
  PACKAGE_NAMES:
    requirements:
      1: The substrate package target name is `@firegrid/substrate`.
      2: The client package target name is `@firegrid/client`.
      3: The runtime package target name is `@firegrid/runtime`.
      4: The lab app workspace target name is `@firegrid/lab`.

  RUNTIME_RENAME:
    requirements:
      1: SubstrateHost is renamed to FiregridRuntime.
      2: SubstrateHostBoot is renamed to FiregridRuntimeBoot.
      3: HostProgramRuntime is renamed to RuntimeContext.
      4: Host Program Graph vocabulary is replaced by ordinary runtime Layer composition vocabulary.
      5: HostPrograms vocabulary is replaced by Firegrid runtime Layer constructor vocabulary.

  COMPATIBILITY:
    requirements:
      1: Compatibility exports may be kept temporarily during migration.
      2: Compatibility exports must point toward the Firegrid names in docs and tests.
      3: New public docs should prefer Firegrid names over durable-agent-substrate names.
      4: Migration must not reintroduce runtime-to-client package dependencies.

constraints:
  REPO_BOUNDARY:
    requirements:
      1: The renamed repository canonical GitHub slug is `gurdasnijor/firegrid`.
      2: Local tooling and documentation should converge on the Firegrid product name.
