feature:
  name: firegrid-package-migration
  product: firegrid
  description: Define the package, naming, and hard cutover from legacy durable-agent-substrate host/client vocabulary to Firegrid vocabulary.

components:
  PACKAGE_NAMES:
    requirements:
      1: The substrate package target name is `@firegrid/substrate`.
      2: The client package target name is `@firegrid/client`.
      3: The runtime package target name is `@firegrid/runtime`.
      4: The lab app workspace target name is `@firegrid/lab`.

  RUNTIME_RENAME:
    requirements:
      1: SubstrateHost is renamed to FiregridRuntime.
      2: SubstrateHostBoot is renamed to FiregridRuntimeBoot.
      3: HostProgramRuntime is renamed to RuntimeContext.
      4: Host Program Graph vocabulary is replaced by ordinary runtime Layer composition vocabulary.
      5: HostPrograms vocabulary is replaced by Firegrid runtime Layer constructor vocabulary.

  COMPATIBILITY:
    requirements:
      1: Active package names, workspace dependencies, imports, and public test examples use Firegrid package names only.
      2: Legacy durable-agent-substrate package names may appear only in clearly marked historical review or migration provenance.
      3: New public docs must use Firegrid names instead of legacy durable-agent-substrate names.
      4: Migration must not reintroduce runtime-to-client package dependencies.

  PACKAGE_DISTRIBUTION:
    requirements:
      1: Public Firegrid package artifacts expose built JavaScript and declaration files instead of workspace-only TypeScript source entrypoints.
      2: The `@firegrid/client` package artifact is consumable from an external project without `workspace:*` dependencies or monorepo path assumptions.
      3: The `@firegrid/client` package artifact includes the root client surface and browser-safe `event-streams` subpath while preserving the client authority boundary.
      4: External package consumption is proven in CI by packing local artifacts and type-checking a temporary consumer project without publishing to npm.
      5: The `@firegrid/substrate` package artifact supports the public subpaths needed by `@firegrid/client` without broadening the curated root or making kernel imports app-facing.

constraints:
  REPO_BOUNDARY:
    requirements:
      1: The renamed repository canonical GitHub slug is `gurdasnijor/firegrid`.
      2: Local tooling and documentation should converge on the Firegrid product name.
