feature:
  name: firegrid-effect-ai-native-agents
  product: firegrid
  description: Effect AI-native agent adapter foundations that expose upstream LanguageModel.Service without cloning model, tool, provider, or sandbox contracts.

components:
  CURRENT_TURN:
    requirements:
      1: CurrentAgentTurn carries adapter-local turn correlation through Effect context with a required turnId and optional contextId.
      2: Agent adapter model calls do not add Firegrid-specific fields to LanguageModel request options.

  ADAPTER_SURFACE:
    requirements:
      1: AgentAdapter exposes an upstream @effect/ai LanguageModel.Service plus a small additive capability summary.
      2: AgentAdapter is not a SandboxProvider and does not provision process, filesystem, environment, container, or remote sandbox resources.
      3: AgentAdapterRegistry defines the host selection shape as adapterFor(RuntimeContext) returning an AgentAdapterService without wiring runtime-host integration.

  LANGUAGE_MODEL_ADAPTER:
    requirements:
      1: LanguageModelAdapter wraps an injected @effect/ai LanguageModel.Service as an AgentAdapter without changing generateText, generateObject, or streamText semantics.
      2: LanguageModelAdapter advertises in-process streaming text and tool support, no multi-turn session ownership, and no permission-request capability.

  ADAPTER_ERRORS:
    requirements:
      1: Firegrid adapter errors are Schema.TaggedError classes, not manual _tag object/type aliases.
      2: Firegrid adapter errors remain Firegrid-owned capability or selection errors and do not widen the LanguageModel.Service error channel.

  ACP_ADAPTER:
    requirements:
      1: AcpAgentAdapter exposes @effect/ai LanguageModel.Service for an ACP agent connection without cloning model, tool, provider, or sandbox contracts.
      2: AcpAgentAdapter acquires the ACP ClientSideConnection plus session over an existing AgentByteStream and reuses one session across multiple streamText calls.
      3: AcpAgentAdapter streamText emits Response.textDeltaPart for ACP agent_message_chunk events and Response.toolCallPart for ACP tool_call events.
      4: AcpAgentAdapter streamText emits Response.finishPart with a FinishReason derived from ACP stopReason at end of turn.
      5: AcpAgentAdapter streamText and generateText with an Effect AI toolkit option fail explicitly with AiError.UnknownError whose cause is AdapterUnsupportedFeature; no Firegrid tool-result callbacks are added.
      6: An ACP requestPermission during the base LanguageModel view fails the active stream with AiError.UnknownError whose cause is PermissionRequiredButNotHandled; permission is never auto-allowed.
      7: AcpAgentAdapter generateText collects streamText into a LanguageModel.GenerateTextResponse, aggregating text deltas into text parts and propagating tool-call parts.
      8: AcpAgentAdapter generateObject fails explicitly as unsupported in Slice 2 with AiError.UnknownError whose cause is AdapterUnsupportedFeature.
      9: AcpAgentAdapter correlation reads CurrentAgentTurn when available; ACP PromptRequest.messageId and PromptResponse.userMessageId are not used for adapter correlation.
      10: AcpAgentAdapter base LanguageModel view rejects prompts that contain zero messages, more than one message, or any non-user-role message; lossy multi-message translation is never produced.
      11: AcpAgentAdapter maps ACP tool_call notifications to Response.toolCallPart with providerExecuted=true to reflect that ACP tool execution is owned by the agent, and documents the lossy ACP.title -> Effect AI tool name choice as the only available name source on ACP today.
      12: AcpAgentAdapter requestPermission and sessionUpdate handlers swallow runPromise failures from a torn-down adapter scope and always reply to ACP so the agent does not hang.
      13: "AcpAgentAdapter holds the per-turn lock until ACP confirms the prompt has finalized: stream interruption sends connection.cancel({sessionId}), awaits the in-flight prompt fiber, and clears the current-turn ref before the lock is released, so a subsequent streamText cannot receive stale ACP updates from a prior turn."
      14: AcpAgentAdapter accepts optional ACP session setup through AcpAgentAdapterOptions.session (cwd, mcpServers) and forwards those values verbatim to connection.newSession; defaults remain cwd=process.cwd() and mcpServers=[]; there is no env coupling and no Firegrid-custom protocol for routing MCP servers to the spawned agent.

constraints:
  BOUNDARIES:
    requirements:
      1: Slice 1 does not modify runtime-host workflow execution, runtime journaling, ACP codec behavior, SandboxProvider, or MCP routing.
      2: LanguageModel.Service is the base prompt/model contract; Firegrid does not define a parallel model interface or local tool registry in this slice.
      3: Slice 2 does not modify runtime-host workflow execution, runtime journaling, ACP codec behavior, SandboxProvider, MCP routing, or CLI entrypoints; the existing AcpCodec stays exported.

  VALIDATION:
    requirements:
      1: Tests prove LanguageModelAdapter delegates to an injected fake LanguageModel.Service and does not require SandboxProvider.
      2: Tests prove CurrentAgentTurn can be provided and read through Effect context.
      3: Tests prove AgentAdapterRegistry can select an AgentAdapterService for a RuntimeContext shape without invoking runtime-host integration.
      4: Tests prove AcpAgentAdapter streamText emits text-delta and tool-call stream parts plus a final finish part for an ACP fixture turn.
      5: Tests prove AcpAgentAdapter generateText collects streamText into a GenerateTextResponse with aggregated text and propagated tool-call parts.
      6: Tests prove AcpAgentAdapter reuses one ACP session across multiple consecutive streamText calls.
      7: Tests prove AcpAgentAdapter streamText with an Effect AI toolkit option fails with AiError.UnknownError caused by AdapterUnsupportedFeature.
      8: Tests prove AcpAgentAdapter streamText fails with AiError.UnknownError caused by PermissionRequiredButNotHandled when ACP issues requestPermission and no permission capability is installed.
      9: Tests prove AcpAgentAdapter generateText preserves the relative order of text, tool-call, and finish parts when ACP emits text-delta followed by tool-call followed by stopReason.
      10: Tests prove AcpAgentAdapter rejects multi-message and non-user-role prompts with AiError.MalformedInput caused by AdapterUnsupportedFeature.
      11: Tests prove AcpAgentAdapter emits Response.toolCallPart with providerExecuted=true on ACP tool_call observations.
      12: "Tests prove AcpAgentAdapter sends connection.cancel to ACP on stream interruption and that a subsequent streamText call does not observe stale text-delta or tool-call updates from the prior interrupted turn."
      13: Tests prove AcpAgentAdapter forwards AcpAgentAdapterOptions.session (cwd, mcpServers) verbatim to ACP newSession and preserves the prior defaults when those fields are omitted.
