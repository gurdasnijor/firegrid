feature:
  name: effect-durable-operators
  product: firegrid
  description: Define a reusable Effect-native durable operators package built around a single public primitive — DurableTable — over typed Durable Streams and @durable-streams/state.

components:
  PACKAGE:
    requirements:
      1:
        requirement: The durable operators package exposes generic DurableTable, DurableProjection, and DurableConsumer modules.
        deprecated: true
      1-note: Deprecated. DurableProjection, DurableConsumer, ConsumerSource, ConsumerCheckpointStore, and the Electric adapter were removed; the public root now exposes DurableTable only. See PACKAGE.4.
      2: The durable operators package does not import Firegrid runtime, client, protocol, scenario, or app packages.
      3: The durable operators package uses Effect Stream, Effect Scope, Effect Schema, Effect Layer, and Effect concurrency primitives directly rather than hiding them behind custom stream or service wrappers.
      4: The durable operators package public root exposes only the DurableTable primitive, its primaryKey field helper, supporting types/options, and error types; consumer/projection/source/checkpoint-store modules are not exported.

  TABLE:
    requirements:
      1: DurableTable is a typed Effect facade over @durable-streams/state createStreamDB rather than a new materialization engine.
      2: DurableTable accepts Effect Schema-native collection definitions and translates them to Standard Schema only at the @durable-streams/state boundary.
      3: DurableTable materialization is Scope-managed, preloads on acquire, closes on scope finalization, and exposes txid read-after-write coordination through Effect.
      4: DurableTable exposes multi-collection pull query and push subscription helpers without re-folding retained durable history at every query boundary.
      5: DurableTable rebuilds correctly from retained source change events after restart or cold start.
      6: DurableTable declarations return Effect service-tag classes with a Layer constructor so callers consume materialized table services through Effect context.
      7: DurableTable collection declarations are plain Effect Schema row schemas whose primary key is marked on exactly one struct field through DurableTable.primaryKey schema metadata.
      8: DurableTable fails loudly when a collection schema has zero primary-key fields or more than one primary-key field.
      9: DurableTable v0 derives each collection's durable wire type from the table namespace and collection key as namespace.collectionKey.
      10: DurableTable collection services expose insert, insertOrGet, upsert, delete, get, query, and subscribe facades for each declared collection.
      11: DurableTable generated insert, upsert, and delete collection writes use @durable-streams/state createStreamDB actions rather than caller-provided standard actions.
      12: DurableTable generated insert, upsert, and delete writes attach txid headers and wait for createStreamDB awaitTxId before completing.
      13: DurableTable v0 does not expose persistentType, Type, per-collection wire-type overrides, or required actions configuration for standard collection writes.
      14: DurableTable consumers do not use package-owned manual durable stream append helpers for generated table writes.
      15: DurableTable generated writes construct State Protocol change events through @durable-streams/state createStateSchema collection helpers rather than package-owned change-event constructors.
      16: DurableTable.primaryKey wraps the underlying field schema with a Schema transform whose encoded representation is a string, while preserving the package-owned primary-key annotation so DurableTable can discover the key field through AST inspection.
      17: DurableTable composite primary keys are declared as Schema.transform schemas; the DurableTable runtime does not concatenate or split key parts with package-local separator strings.
      18: DurableTable encodes primary-key values via the primary-key field schema (Schema.encodeSync) for insert, upsert, delete, and get paths; the package contains no string-coercion key helper.
      19: DurableTable.layer acquisition ensures the backing durable stream exists before preload; callers do not pre-create the stream out of band, and acquisition is idempotent against an already-existing stream with compatible configuration.
      20: DurableTable exposes one public DurableTableHeaders type for request header passthrough so runtime and workflow table options share the same auth/header shape.
      21: DurableTable collection facades expose a read-only TanStack collection view for query engines and UI bindings; mutations through that view fail loudly so callers keep using DurableTable generated writes.
      22: DurableTable read-only collection views decode primary-key fields through the collection's primary-key schema before exposing rows to TanStack query, map, state, and subscription consumers.
      23: DurableTable read-only collection view mutation rejection throws the typed DurableTableError directly at the synchronous TanStack boundary so callers can match `instanceof DurableTableError`; the package does not wrap synchronous failures in a FiberFailure.
      24: DurableTable rejects primary-key encodings that produce a non-string wire value with a typed DurableTableError naming the durable type and field; the package contains no silent String(...) coercion for encoded primary keys.
      25: DurableTable get/upsert/delete by composite primary key declared with Schema.transformOrFail (JSON-tuple encoded) returns the same decoded row as query.toArray on the same key.
      26: DurableTable collection services expose insertOrGet(row), which attempts a row-level primary-key insert and otherwise returns the already-materialized row for that key.
      26-1: insertOrGet returns Inserted without a row when the caller's row wins the primary-key insert fence and the insert event is locally observable.
      26-2: insertOrGet returns Found with the materialized row when the primary key is already owned by an earlier insertOrGet call; Found does not write a replacement event.
      26-3: Concurrent insertOrGet calls from independently acquired DurableTable layers for the same primary key converge to exactly one Inserted result and one or more Found results.
      26-4: A concurrent insertOrGet caller that loses the primary-key race observes the winning row rather than its own candidate row.
      26-5: insertOrGet never silently overwrites an existing row; callers that need replacement semantics must use upsert.
      26-6: A successful Inserted result has the same read-after-write visibility guarantee as generated insert and upsert writes.
      26-7: insertOrGet failures surface as DurableTableError.
      26-8: insertOrGet is a row-level insert-or-read primitive, not a lock, claim, mutex, semaphore, lease, or general coordination primitive.
      26-9: insertOrGet consumers branch on Inserted versus Found with Match.value, Match.tag, and Match.exhaustive rather than manual discriminator switches.
      26-10: insertOrGet relies on a generic effect-durable-streams producer-fenced append classification to distinguish first append from duplicate append for the same primary key.
      26-11: insertOrGet surfaces the durable-stream append offset on its Inserted result as a read-only receipt of the position the substrate already assigned; for a per-stream collection, distinct concurrent Inserted results receive distinct offsets that are monotonic in append (arrival) order, and the offset is not a writable sequence or coordination token. Found carries no offset because a duplicate writes no event and reports no position.
      27: DurableTable.layer is the generic Durable Streams stream-options-to-table materialization boundary; callers provide streamOptions and receive typed table collection facades.
      28: DurableTable collection facades are the shared durable fact and live observation surface for writes, queries, collection subscriptions, UI bindings, and downstream wait_for source registration.
      28-1: Each DurableTable collection facade exposes a row observation stream that emits current non-deleted rows plus live non-deleted row changes using the collection's live subscription semantics.
      29: effect-durable-operators does not register wait_for source names or import @firegrid/runtime; runtime-facing wait_for registration consumes DurableTable collection facades outside this package.

  REACT:
    requirements:
      1: The durable operators package exposes React bindings only from an optional react subpath; the public root does not import React or @tanstack/react-db.
      2: The React provider acquires caller-supplied DurableTable layers once per React provider lifetime and releases their Effect Scope when the provider unmounts.
      3: React consumers can retrieve shared DurableTable services by table tag and bind TanStack useLiveQuery to the table collection views without app-local control-plane wrappers.
      4: React bindings surface loading and acquisition failures explicitly rather than silently creating per-render table layers.
      5: React hook failure boundaries throw the original error object directly so React error boundaries observe the typed error rather than a FiberFailure wrapper.

  PROJECTION:
    requirements:
      1:
        requirement: DurableProjection converts raw durable fact streams into State Protocol change event streams consumed by DurableTable.
        deprecated: true
      1-note: Deprecated. Projection-shaped behavior is ordinary Effect stream code that reads DurableStream and writes through DurableTable generated actions; there is no DurableProjection module.
      2:
        requirement: DurableProjection v0 emits change events directly rather than defining a separate reducer execution model for tables.
        deprecated: true
      2-note: Deprecated together with PROJECTION.1; change events are now produced via DurableTable generated actions.
      3:
        requirement: DurableProjection state is allocated inside Effect, typically through Ref or SynchronizedRef, and is derived deterministically from retained source facts.
        deprecated: true
      3-note: Deprecated. State allocation is the caller's choice (Ref/SynchronizedRef as needed) in ordinary Effect stream code.
      4:
        requirement: DurableProjection exposes derived outputs as Effect Stream values so projection fan-out composes with backpressure.
        deprecated: true
      4-note: Deprecated. Stream composition and backpressure remain ordinary Effect Stream concerns at the call site.

  CONSUMER:
    requirements:
      1:
        requirement: DurableConsumer selects logical inputs from durable fact streams and keys them per subscriber.
        deprecated: true
      1-note: Deprecated. Selection and per-key idempotency are expressed inline against DurableStream reads + a DurableTable checkpoint collection at the consumer's delivery boundary.
      2:
        requirement: DurableConsumer checkpoint storage is provided through a ConsumerCheckpointStore service Layer rather than through caller-owned fold code.
        deprecated: true
      2-note: Deprecated. Checkpoint rows are ordinary DurableTable collection rows; there is no ConsumerCheckpointStore service tag.
      3:
        requirement: DurableConsumer policies are explicit tagged values for AtMostOnce, AtLeastOnce, and AtLeastOnceWithClaim semantics.
        deprecated: true
      3-note: Deprecated. No generic policy API; delivery semantics are expressed directly by call sites that need them (see firegrid-agent-ingress.DELIVERY.* for local-process stdin AtMostOnce).
      4:
        requirement: AtMostOnce records a durable claim before running an externally visible side effect.
        deprecated: true
      4-note: Deprecated as a package primitive. The AtMostOnce claim-before-side-effect guarantee is preserved for local-process stdin in the provider-owned delivery code (firegrid-agent-ingress.DELIVERY.3/5).
      5:
        requirement: AtLeastOnce records durable completion after a successful side effect.
        deprecated: true
      5-note: Deprecated. No production consumer needed a generic AtLeastOnce policy API; future call sites may express it directly with DurableTable checkpoint upsert post-side-effect.
      6:
        requirement: DurableConsumer exposes both Sink-shaped and Stream-shaped execution APIs.
        deprecated: true
      6-note: Deprecated together with the DurableConsumer module.
      7:
        requirement: DurableConsumer supports an optional Effect Schedule for retrying the processing effect.
        deprecated: true
      7-note: Deprecated. Retry is expressed at the call site with Effect.retry/Schedule where needed.
      8:
        requirement: DurableConsumer restart tests prove the selected policy does not silently duplicate or lose logical work beyond its documented delivery semantics.
        deprecated: true
      8-note: Deprecated. Restart proofs for the only production consumer (local-process stdin AtMostOnce) live in the provider-owned delivery tests, including a failure-injection test between claim and byte emission.

  SOURCE:
    requirements:
      1:
        requirement: DurableConsumer reads from a small Effect Stream-shaped ConsumerSource interface rather than directly requiring effect-durable-streams Bound sources.
        deprecated: true
      1-note: Deprecated. Durable Streams is the explicit substrate; there is no source-abstraction interface.
      2:
        requirement: The operators package ships a Durable Streams ConsumerSource adapter that preserves the existing production DS infrastructure as Firegrid's primary substrate.
        deprecated: true
      2-note: Deprecated. Durable Streams is accessed directly via DurableStream.define(...).read(...) at call sites; no adapter is needed.
      3:
        requirement: The operators package ships an Electric ShapeStream/D2TS ConsumerSource adapter proof to validate the source interface against a second change-stream backend.
        deprecated: true
      3-note: Deprecated. Electric adapter removed; Electric Cloud Durable Streams is a streamOptions URL/auth swap and any future ShapeStream read-only adapter lives outside this package.
      4:
        requirement: Electric ShapeStream integration remains source-only; DurableConsumer checkpoint and delivery semantics continue to be owned by ConsumerCheckpointStore.
        deprecated: true
      4-note: Deprecated together with SOURCE.3 and CONSUMER.2.
      5:
        requirement: D2TS integration is used only to adapt or transform Electric shape changes into typed consumer facts; it does not replace DurableTable or ConsumerCheckpointStore semantics.
        deprecated: true
      5-note: Deprecated together with SOURCE.3.

  FIREGRID_PROOF:
    requirements:
      1:
        requirement: A Firegrid-shaped proof replaces runtime input requested-minus-accepted fold logic with DurableConsumer rather than adding another runtime-ingress service plane.
        deprecated: true
      1-note: Deprecated. Runtime input fold logic now uses DurableStream + a DurableTable checkpoint collection directly; there is no DurableConsumer. See FIREGRID_PROOF.4.
      2: The Firegrid proof uses production package surfaces and high-fidelity scenario coverage, not scenario-only composition roots or shadow harnesses.
      3:
        requirement: The Firegrid proof remains a consumer of the generic operators package and does not introduce Firegrid-specific APIs into that package.
        deprecated: true
      3-note: Deprecated wording; effect-durable-operators still exports no Firegrid-specific APIs, but Firegrid runtime delivery now consumes DurableTable directly rather than a generic operator. See PACKAGE.4 and FIREGRID_PROOF.4.
      4: Firegrid runtime input stdin delivery is implemented at the provider delivery boundary as ordinary Effect code reading DurableStream facts and recording AtMostOnce claim checkpoints through a DurableTable checkpoint collection.

constraints:
  BOUNDARIES:
    requirements:
      1:
        requirement: The package may depend on effect-durable-streams, effect-durable-streams-state, @durable-streams/client, @durable-streams/state, @tanstack/db, and Effect packages.
        deprecated: true
      1-note: Replaced by BOUNDARIES.6 and BOUNDARIES.7 — the dependency surface narrows now that consumer/source/electric modules are deleted.
      2:
        requirement: The package must not depend on @firegrid/durable-streams; that package remains Firegrid's substrate adapter boundary.
        deprecated: true
      2-note: Deprecated because @firegrid/durable-streams is no longer a Firegrid substrate boundary package; Firegrid code uses DurableTable for ordinary table state and effect-durable-streams for raw facts. See BOUNDARIES.9 and BOUNDARIES.11.
      3: The package must not implement workflow suspension, durable clocks, required actions, prompt APIs, or Firegrid session semantics.
      4:
        requirement: Consumer checkpoint state is distinct from durable stream producer idempotency.
        deprecated: true
      4-note: Restated as a runtime delivery concern; see firegrid-agent-ingress.DELIVERY.3.
      5: Table semantics rely on @durable-streams/state and TanStack DB invariants; the wrapper must not mutate table state outside the sync protocol.
      6: The package's runtime dependency surface is @durable-streams/client, @durable-streams/state, @tanstack/db, effect-durable-streams for generic producer-fenced append classification, @effect/platform, and Effect packages; @electric-sql/* dependencies and devDependencies are not permitted.
      8: The package effect-durable-streams-state has been deleted; DurableTable uses @durable-streams/state directly with no Firegrid-local State Protocol wrapper.
      7: The package must not import @firegrid/* packages; this is enforced by pnpm run lint:deps.
      9: The package @firegrid/durable-streams has been deleted; runtime, client, protocol, app, and scenario source do not import upstream @durable-streams packages directly for ordinary table or state behavior.
      10: The package effect-durable-streams remains only as a generic Effect adapter for retained Durable Stream IO and producer coordination semantics; it does not own State Protocol tables, Firegrid workflow state, or public test utilities.
      11: Ordinary retained table/state behavior in runtime, client, app, and scenario code is expressed through DurableTable declarations and generated facades rather than createStateSchema, createStreamDB, or manual State Protocol event builders.
      12: Browser and host code share one DurableTable declaration for a durable table shape; duplicate client/runtime table declarations for the same namespace are not allowed.
      13: Shared protocol/contract packages do not expose manual state descriptors or createStateSchema-style schema files for ordinary table behavior.
      14: UI apps bind directly to shared DurableTable declarations through read-only table collection views and TanStack live queries; app-local APIs that duplicate Firegrid control-plane semantics are not the preferred pattern.
      15: effect-durable-streams exposes generic producer-fenced append classification as Appended versus Duplicate without DurableTable, State Protocol, or Firegrid-specific logic.

  TRACER_017:
    requirements:
      1:
        requirement: Tracer 017 adds non-Firegrid DurableConsumer tests for an order-email style side-effect consumer.
        deprecated: true
      1-note: Deprecated. DurableConsumer module removed; consumer-style tests are gone.
      2:
        requirement: Tracer 017 adds non-Firegrid DurableProjection plus DurableTable tests for an account-balance projection materialized through createStreamDB.
        deprecated: true
      2-note: Deprecated. DurableProjection module removed; balance-projection-style behavior is ordinary Effect stream code over DurableTable actions.
      3: Tracer 017 adds a DurableTable restart or cold-start replay test proving retained change events rebuild queryable state.
      4:
        requirement: Tracer 017 adds DurableConsumer restart tests for AtMostOnce and AtLeastOnce behavior.
        deprecated: true
      4-note: Deprecated. DurableConsumer module removed. AtMostOnce restart coverage for the only production consumer (local-process stdin) lives in the provider-owned delivery tests, including a failure-injection test between claim and byte emission.
      5: Tracer 017 adds a Firegrid scenario E2E proving runtime input delivery still works through production surfaces after replacing the previous custom-fold path.

  TRACER_018:
    requirements:
      1:
        requirement: Tracer 018 migrates DurableConsumer tests and Firegrid usage to ConsumerSource.fromDurableStream without changing observable behavior.
        deprecated: true
      1-note: Deprecated. ConsumerSource removed; Firegrid usage reads DurableStream directly.
      2:
        requirement: Tracer 018 adds a non-Firegrid Electric ShapeStream/D2TS source adapter test that feeds DurableConsumer through the same ConsumerSource interface.
        deprecated: true
      2-note: Deprecated. Electric adapter and ConsumerSource removed.
      3:
        requirement: Tracer 018 proves Electric source offsets or shape protocol progress are not treated as DurableConsumer processing checkpoints.
        deprecated: true
      3-note: Deprecated together with TRACER_018.1/2.
