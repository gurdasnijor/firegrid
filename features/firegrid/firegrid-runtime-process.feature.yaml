feature:
  name: firegrid-runtime-process
  product: firegrid
  description: Define the Firegrid runtime process, command-line entrypoints, and environment injection model.

components:
  RUNTIME_PACKAGE:
    requirements:
      1: The runtime package target name is `@firegrid/runtime`.
      2: The runtime package exposes server-side runtime boot and Layer composition APIs.
      3: The runtime package does not import the app-facing client package.
      4: Public withHost-style helpers that provide an app client are removed or deprecated.
      5: The runtime helper namespace exposes a low-level projection-match subscriber Layer for attaching existing substrate projection-match completions to runtime execution.

  SCENARIOS:
    requirements:
      1: CLI validation scenario inputs are TypeScript emitters outside package source that derive durable rows from Effect Schema and protocol builders, write JSON rows to stdout, and do not import the app-facing client package.
      2: Runtime graph execution for operation-handler validation is separate from scenario row emission and must not be implemented as hard-coded scenario Layers in the `firegrid` binary.
      3: Projection-match CLI scenario emitters include both the operation-started row and the caller-owned EventStream row needed to exercise the future subscriber path from the durable stream boundary.
      4: "Scheduled-work CLI scenario emitters include a pending `durable.completion` row with `kind: scheduled_work` and schema-encoded scheduled input needed to exercise the future scheduled-work subscriber path from the durable stream boundary."
      5: CLI validation scenario inspection rebuilds existing Firegrid projections from an explicit stream URL and reports scenario progress without adding runtime execution support or privileged writer APIs.
      6: Claim-before-side-effect CLI scenario emitters include the durable run and completion rows needed to derive one ready-work item for future competing operator participants.
      7: Echo receiver CLI scenarios run an app-owned typed runtime graph through `run({ connection, runtime })`, install the Echo handler with `Firegrid.handler`, and verify terminal state through the existing scenario inspection path.
      8: Scheduled-work receiver validation uses an app-owned runtime entrypoint that composes the scheduled-work subscriber with a typed operation handler and verifies due-time completion resolution plus ready-work terminalization through projection inspection.
      9: WaitFor projection-match receiver validation uses an app-owned runtime entrypoint that composes the projection-match subscriber with a typed operation handler and verifies caller-owned EventStream matching plus ready-work terminalization through projection inspection.

  RUNTIME_RUN_API:
    requirements:
      1: Application runtime graphs are started from app-owned TypeScript entrypoints through a typed Firegrid `run(...)` API rather than through Firegrid-owned dynamic module discovery.
      2: The runtime `run(...)` API accepts one composed Effect Layer runtime graph with shape `Layer.Layer<never, E, RuntimeContext | R>`.
      3: The runtime `run(...)` API provides Firegrid runtime process context and attached Durable Streams execution while preserving any unprovided app requirements in the returned Effect type.
      4: The runtime package does not expose or require `FIREGRID_RUNTIME_MODULE`-style dynamic app-module loading for normal runtime graph execution.
      5: The runtime `run(...)` API does not import or provide the app-facing client package.
      6: Stock subscribers and operator loops are not installed implicitly by `run(...)`; callers compose explicit Layers so process behavior is readable from the app entrypoint.
      7: Runtime startup failures are fail-fast typed failures from `run(...)`, not silent hangs or hidden binary exits.
      8: Durable Streams attachment options are supplied through a connection object rather than as loose top-level runtime options.
      9: The runtime `run(...)` Effect is a long-running process Effect that normally exits only through interruption or typed failure.
      10: Runtime tests assert positive API behavior by executing Effects or checking TypeScript contracts rather than by grepping source strings; source-grep tests are reserved for explicitly tagged negative architectural constraints.

  READY_WORK_OPERATOR:
    requirements:
      1: The runtime owns a scoped operator loop that watches the substrate `ReadyWorkProjection` and resumes blocked runs whose pending completion has resolved.
      2: The runtime ready-work operator loop reuses substrate `processReadyWorkItem` for claim arbitration and terminal-event authorship rather than reimplementing claim or terminal logic in runtime.
      3: The runtime ready-work operator loop attributes claim ownership through `RuntimeContext.processId`.
      4: The runtime ready-work operator loop is edge-driven from durable run and completion changes and does not run on a fixed polling cadence.
      5: The runtime invokes the same typed `Operation` handler registered with `Firegrid.handler` on resume; choreography primitives are idempotent because their durable completion lookups short-circuit when the keyed completion already resolved.
      6: Non-success outcomes from `processReadyWorkItem` (`claim-lost`, `already-terminal`, `terminalization-lost`) are logged at debug and the loop continues without re-attempting the same item in the same scan.
      7: The runtime `Firegrid.handler` Layer installs both the started-run dispatch loop and the ready-work operator loop under a single scope so handler registration is the single durable-execution entrypoint for an operation.

  BINARIES:
    requirements:
      1: The primary runtime binary is named `firegrid`.
      2: The short runtime binary alias is named `fg`.
      3: The binary supports attached mode through an explicit stream URL.
      4:
        requirement: The binary supports embedded development mode.
        deprecated: true
      4-note: Firegrid no longer owns Durable Streams dev-server lifecycle; local development runs Durable Streams externally and uses attached mode.
      5:
        requirement: The binary supports `firegrid dev -- <command...>` to run a child process with stream environment injected.
        deprecated: true
      5-note: Firegrid no longer provides child-process dev launchers; browser tooling receives stream configuration from its own environment.
      6: Attached mode uses `DURABLE_STREAMS_URL` or an explicit CLI stream URL rather than Firegrid-specific stream URL environment variables.
      7: The binary does not start, stop, or supervise a Durable Streams server.
      8: The binary rejects launcher subcommands and runs only as an attached runtime process.

  DEV_ENV_INJECTION:
    requirements:
      1:
        requirement: The dev process boots embedded Durable Streams.
        deprecated: true
      2:
        requirement: The dev process creates the configured substrate stream.
        deprecated: true
      3:
        requirement: The dev process resolves the actual stream URL, including OS-assigned port cases.
        deprecated: true
      4:
        requirement: The dev process injects `DURABLE_STREAMS_URL` into the child process.
        deprecated: true
      5:
        requirement: The dev process injects `VITE_DURABLE_STREAMS_URL` into the child process for browser tooling.
        deprecated: true
      6:
        requirement: The dev process tears down embedded resources when the child process exits.
        deprecated: true
      7: Firegrid-owned dev environment injection is removed; consumers configure their own process or browser environment.

constraints:
  EFFECT_PLATFORM:
    requirements:
      1: The binary entrypoint is wrapper-thin and delegates execution to Effect runtime APIs.
      2: The binary entrypoint uses NodeRuntime.runMain or the equivalent Effect Platform Node runtime entrypoint.
      3: Child process execution uses Effect Platform Command rather than direct child_process orchestration unless a concrete gap is documented.
      4: User-visible terminal output uses Effect Platform Terminal where possible.
      5: Runtime and child-process lifetimes are scoped through Effect scopes.

  CONFIG_SURFACE:
    requirements:
      1: Runtime process configuration is handled at the binary process edge rather than through exported boot-plan-from-env APIs.
      2: The runtime package does not expose `bootPlanFromConfig` or `attachedFromConfig` as public Firegrid APIs.
      3: User-facing environment configuration does not include process id, Durable Streams host, Durable Streams port, or stream-name knobs in v1.
      4: Runtime process identity is generated by default and is not normal user-facing environment config.
      5:
        requirement: Embedded development topology is configured through the `firegrid dev` command and explicit CLI flags when needed, not broad environment variables.
        deprecated: true
      6: Local development topology is configured outside Firegrid by running Durable Streams separately and attaching with `DURABLE_STREAMS_URL`.

  RUNTIME_HOT_PATH:
    requirements:
      1: Long-running runtime subscriber and handler loops use a single scoped live `SubstrateStreamDB` after the initial no-gap catch-up and must not call `rebuildProjection` or `db.preload` on every wake while a live handle is held; one-shot snapshot APIs and tests may still rebuild.
      2: The runtime projection-match subscriber reuses the shared scoped subscriber runner and the substrate snapshot-input projection-match scan rather than rebuilding projections on each wake.
      3: The runtime projection-match subscriber wakes from both durable completion changes and caller-owned EventStream changes, while preserving durable deadline wake behavior for projection-match timeouts.
