feature:
  name: firegrid-runtime-process
  product: firegrid
  description: Define the Firegrid runtime process, command-line entrypoints, and environment injection model.

components:
  RUNTIME_PACKAGE:
    requirements:
      1: The runtime package target name is `@firegrid/runtime`.
      2: The runtime package exposes server-side runtime boot and Layer composition APIs.
      3: The runtime package does not import the app-facing client package.
      4: Public withHost-style helpers that provide an app client are removed or deprecated.
      5: The runtime helper namespace exposes a low-level projection-match subscriber Layer for attaching existing substrate projection-match completions to runtime execution.

  SCENARIOS:
    requirements:
      1: CLI validation scenario inputs are TypeScript emitters outside package source that derive durable rows from Effect Schema and protocol builders, write JSON rows to stdout, and do not import the app-facing client package.
      2: Runtime graph loading for operation-handler validation is separate from scenario row emission and must not be implemented as hard-coded scenario Layers in the `firegrid` binary.

  BINARIES:
    requirements:
      1: The primary runtime binary is named `firegrid`.
      2: The short runtime binary alias is named `fg`.
      3: The binary supports attached mode through an explicit stream URL.
      4:
        requirement: The binary supports embedded development mode.
        deprecated: true
      4-note: Firegrid no longer owns Durable Streams dev-server lifecycle; local development runs Durable Streams externally and uses attached mode.
      5:
        requirement: The binary supports `firegrid dev -- <command...>` to run a child process with stream environment injected.
        deprecated: true
      5-note: Firegrid no longer provides child-process dev launchers; browser tooling receives stream configuration from its own environment.
      6: Attached mode uses `DURABLE_STREAMS_URL` or an explicit CLI stream URL rather than Firegrid-specific stream URL environment variables.
      7: The binary does not start, stop, or supervise a Durable Streams server.
      8: The binary rejects launcher subcommands and runs only as an attached runtime process.

  DEV_ENV_INJECTION:
    requirements:
      1:
        requirement: The dev process boots embedded Durable Streams.
        deprecated: true
      2:
        requirement: The dev process creates the configured substrate stream.
        deprecated: true
      3:
        requirement: The dev process resolves the actual stream URL, including OS-assigned port cases.
        deprecated: true
      4:
        requirement: The dev process injects `DURABLE_STREAMS_URL` into the child process.
        deprecated: true
      5:
        requirement: The dev process injects `VITE_DURABLE_STREAMS_URL` into the child process for browser tooling.
        deprecated: true
      6:
        requirement: The dev process tears down embedded resources when the child process exits.
        deprecated: true
      7: Firegrid-owned dev environment injection is removed; consumers configure their own process or browser environment.

constraints:
  EFFECT_PLATFORM:
    requirements:
      1: The binary entrypoint is wrapper-thin and delegates execution to Effect runtime APIs.
      2: The binary entrypoint uses NodeRuntime.runMain or the equivalent Effect Platform Node runtime entrypoint.
      3: Child process execution uses Effect Platform Command rather than direct child_process orchestration unless a concrete gap is documented.
      4: User-visible terminal output uses Effect Platform Terminal where possible.
      5: Runtime and child-process lifetimes are scoped through Effect scopes.

  CONFIG_SURFACE:
    requirements:
      1: Runtime process configuration is handled at the binary process edge rather than through exported boot-plan-from-env APIs.
      2: The runtime package does not expose `bootPlanFromConfig` or `attachedFromConfig` as public Firegrid APIs.
      3: User-facing environment configuration does not include process id, Durable Streams host, Durable Streams port, or stream-name knobs in v1.
      4: Runtime process identity is generated by default and is not normal user-facing environment config.
      5:
        requirement: Embedded development topology is configured through the `firegrid dev` command and explicit CLI flags when needed, not broad environment variables.
        deprecated: true
      6: Local development topology is configured outside Firegrid by running Durable Streams separately and attaching with `DURABLE_STREAMS_URL`.

  RUNTIME_HOT_PATH:
    requirements:
      1: Long-running runtime subscriber and handler loops use a single scoped live `SubstrateStreamDB` after the initial no-gap catch-up and must not call `rebuildProjection` or `db.preload` on every wake while a live handle is held; one-shot snapshot APIs and tests may still rebuild.
      2: The runtime projection-match subscriber reuses the shared scoped subscriber runner and the substrate snapshot-input projection-match scan rather than rebuilding projections on each wake.
      3: The runtime projection-match subscriber wakes from both durable completion changes and caller-owned EventStream changes, while preserving durable deadline wake behavior for projection-match timeouts.
