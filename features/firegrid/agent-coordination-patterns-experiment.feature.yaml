feature:
  name: agent-coordination-patterns-experiment
  product: firegrid
  description: Run a publishable agent-coordination experiment on Firegrid's public session, channel, trace, and artifact surfaces.

components:
  ARMS:
    requirements:
      1: Every arm runs the same task packet and records the task packet in its artifact directory.
      2: The single-agent arm starts exactly one participant session for the task.
      3: The central-orchestrator arm requires the manager participant to delegate with session_new, session_prompt, and wait_for over session.agent_output rather than driver-created worker sessions.
      4: The choreography arm requires peer participants to discover and coordinate through durable board channels rather than central driver assignment.
  BOARD:
    requirements:
      1: The experiment board declares typed coordination channels for work, claims, findings, questions, reviews, and final artifacts.
      2: Claim rows include run id, arm, work id, claim id, claimant session id, observed cursor, status, and timestamp.
      3: Winning claims are derived from durable append order rather than from model prose.
  ARTIFACTS:
    requirements:
      1: Each arm writes session output, execution metadata, trace path, prompt, and summary artifacts.
      2: The scorer reads Firegrid-native artifacts such as trace JSONL, tool-call spans, permission spans, session output, and board rows.
      3: The finding compiler produces a Markdown report that separates generic coordination conclusions from Firegrid-specific implementation findings.
  EXECUTION:
    requirements:
      1: The live harness composes a real Firegrid host and drives participant sessions through Firegrid's public client/session surfaces rather than tiny-firegrid-specific runner APIs.
      2: Fixture or simulation runners may be added for regression coverage, but the headline experiment path uses real participant runtimes.
      3: CLI subprocess runs may be used as external smoke tests, but the primary experiment runner does not shell out to the Firegrid CLI.

constraints:
  NO_PRIVATE_COORDINATION:
    requirements:
      1: The harness must not satisfy choreography through a private file board or hidden driver-only state that is unavailable to the agents.
      2: If a required board channel is missing, the choreography arm reports a blocked status instead of silently substituting a custom harness helper.
