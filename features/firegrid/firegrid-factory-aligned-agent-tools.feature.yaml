feature:
  name: firegrid-factory-aligned-agent-tools
  product: firegrid
  description: Firegrid agent-tool primitives needed for planner-driven factory choreography without adding a factory orchestration runtime.

components:
  ADAPTER:
    requirements:
      1: ACP adapter proof provides an Effect AI LanguageModel.Service view for ACP-backed agents while keeping AcpCodec exported and deferring runtime-host integration.

  RUNTIME_CODEC:
    requirements:
      1: Runtime host integration consumes codec-backed AgentOutputEvent streams for ACP and stdio-jsonl launches, journals structured durable output rows, routes ToolUse through agent-tool lowering only for codecs that support ToolResult input, and represents PermissionRequest as durable observable state that can be matched or resumed through runtime ingress.

  SESSION:
    requirements:
      1: The live runtime host implementation exposes a session-plane child creation tool that creates a child RuntimeContext, propagates parent/correlation metadata, and returns a session-shaped handle with context authority, status, and projection metadata.
      2: Batch session creation is a generalized convenience over repeated single-session creation; when implemented, it uses the same child RuntimeContext path, preserves task keys, and returns every child session handle or terminal state.
      3: A parent factory run can be represented by planning RuntimeContext metadata, and child sessions carry explicit parentSessionId, role, and correlationId metadata when supplied.
      4: Session cancel and abort operations are deferred until needed; if exposed before real support exists, they fail explicitly rather than silently no-oping.
      5: Parent factory run create/load is idempotent by an external source key containing provider or source identity plus external id such as issue id, ticket id, or correlation id; duplicate external triggers resolve to the same parent RuntimeContext and session identity rather than creating competing parent runs.
      6: Public agent-tool exposure uses session_new, session_prompt, session_cancel, and session_close semantics; spawn and spawn_all remain host-internal lowering seams rather than the public session-plane abstraction.
      7: The v1 session handle carries explicit context authority and uses the RuntimeContext contextId as the sessionId until a separate session registry is introduced.

  CAPABILITY:
    requirements:
      1: Session-bound filesystem, terminal, and external-resource capabilities are declared for the session, scoped by session identity and host authority, keep credentials host-side, and return capability output or a structured tool failure.
      2: The execute tool accepts a session-bound capability invocation shape so ACP-aligned filesystem, terminal, and external-resource operations can be bridged without exposing raw provider credentials or process-local handles.

  WAIT_FOR:
    requirements:
      1: Human approvals, application replies, webhook deliveries, and external status changes can be represented as durable facts that wait_for can match by scalar fields such as contextId, kind, correlationId, and external id.
      2: External facts carry source identity for dedupe, append in durable order, and represent permission waits with explicit permission_requested, permission_resolved, and cancellation or rejection facts rather than hidden callback markers.
      3:
        requirement: Permission facts use an explicit event shape; permission_requested includes permissionId, parentSessionId or contextId, kind, prompt, choices, correlationId, requestedBy, and expiry or status when needed; permission_resolved matches by permissionId and records the selected choice, rejection, cancellation, or expiry without hidden callbacks.
      4: Runtime-host tool composition registers existing RuntimeOutputTable, RuntimeControlPlaneTable, and RuntimeIngressTable collections as wait_for source collections without adding a new permission table.
      5: Runtime-output agent event observations expose decoded AgentOutputEvent metadata such as contextId, event tag, permissionRequestId, and toolUseId as scalar wait_for match fields while retaining RuntimeOutputTable as the durable fact store.

  PROMPT_DISPATCH:
    requirements:
      1: session_prompt or equivalent prompt dispatch to an existing session/runtime context, if exposed to agents, uses host-owned runtime ingress with explicit context authority, correlation metadata, and idempotent input identity.
      2: session_prompt appends through the runtime-host prompt append path, resolving RuntimeContext.host before writing ingress, and never constructs host-owned stream URLs at the call site.

  OBSERVATION:
    requirements:
      1: Tool calls, tool results, child session/context ids, parent/correlation metadata, and ordered runtime facts are durable and queryable enough for a planner agent and product shell to inspect factory progress and choose the next action from history.
      2: Session handles and durable facts expose a status projection compatible with created, running, input_required, done, failed, aborted, and idle, and awaiting a child session is modeled as wait_for over those durable observations rather than blocking inside session creation.
      3: Runtime terminal run evidence is wait_for-observable through RuntimeControlPlaneTable run rows keyed by contextId, status, and activityAttempt.

constraints:
  BOUNDARY:
    requirements:
      1: Firegrid does not add a factory-specific workflow product, orchestration runtime, hidden callback marker protocol, or hard-coded planner/implementer/QA/council sequence for the factory use case.
      2: Flamecast may project sessions, route external events, and display progress, but factory sequencing remains planner-driven through Firegrid agent tools.
      3: Firegrid does not introduce hidden callback comments, string-encoded child session ids, or a broad Linear/GitHub webhook product as prerequisites for the first factory path.
      4: This workstream does not add MCP-specific custom protocols, one-shot ACP semantics, public batch/fanout session tools, or ACP adapter hardening; those remain separate surfaces.
