feature:
  name: firegrid-schema-projection-contract
  product: firegrid
  description: Canonical Effect Schema operation entries are projected into agent tools, programmer client APIs, and CLI args/help.

components:
  SCHEMA_CATALOG:
    requirements:
      1: Operation schemas live in packages/protocol as the canonical input/output contract for session, wait, and permission operations.
      2: Operation schema entries carry descriptions, examples, and serialization metadata through Effect Schema annotations.
      3: Existing agent-tool protocol schemas are reused or compatibility-exported rather than copied into a second divergent schema family.
      4: Firegrid-specific projection metadata such as operation id, tool name, client method name, and CLI name is expressed through a small custom Schema annotation rather than a parallel descriptor object.

  TOOL_PROJECTION:
    requirements:
      1: packages/runtime/src/agent-tools/tools.ts projects schema catalog entries into Effect AI Tool definitions.
      2: packages/runtime/src/agent-tools/tool-use-to-effect.ts remains the runtime lowering path from tool calls to RuntimeContext, RuntimeIngress, RuntimeOutput, RuntimeObservationSourceNames, WaitFor.match, and host authority primitives.
      3: Agent tool descriptions, parameter schemas, success schemas, and examples are derived from the schema catalog rather than duplicated in runtime tool code.

  CLIENT_PROJECTION:
    requirements:
      1: The programmer-facing API stays in the single @firegrid/client package and exposes namespaces such as sessions, wait, and permissions.
      2: Client methods decode inputs through the same schema catalog and do not import @effect/ai Tool values, MCP server layers, or runtime-only handler dependencies.
      3: Client APIs use product-facing names such as sessions.create and sessions.prompt while preserving the same schema contract as agent tool projections.

  CLI_PROJECTION:
    requirements:
      1: src/run.ts and future CLI commands project schema metadata into command args, validation, defaults, examples, and help text where applicable.
      2: CLI parsing may use @effect/cli, but accepted values and validation are aligned with protocol schemas rather than private CLI-only contracts.

constraints:
  BOUNDARIES:
    requirements:
      1: This feature does not split @firegrid/client into many tiny published packages; subpath exports are allowed only as exports from the existing package.
      2: This feature does not expose packages/runtime/src/agent-tools/tools.ts as the programmer-facing client API.
      3: This feature does not introduce packages/runtime/src/session-control or another runtime service layer unless repeated lowering code proves that abstraction is needed.
      4: This feature does not introduce a platform parent/child session hierarchy beyond RuntimeContext identity and explicit metadata.
