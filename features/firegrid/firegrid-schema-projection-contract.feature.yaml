feature:
  name: firegrid-schema-projection-contract
  product: firegrid
  description: Canonical Effect Schema operation entries are bound into agent tools, programmer client APIs, and CLI args/help without mixing those bindings with execution substrate.

components:
  SCHEMA_CATALOG:
    requirements:
      1: Operation schemas live in packages/protocol as the canonical input/output contract for session, wait, and permission operations.
      2: Operation schema entries carry descriptions, examples, and serialization metadata through Effect Schema annotations.
      3: Existing agent-tool protocol schemas are reused or compatibility-exported rather than copied into a second divergent schema family.
      4: Firegrid-specific projection metadata such as operation id, tool name, client method name, and CLI name is expressed through a small custom Schema annotation rather than a parallel descriptor object.

  TOOL_PROJECTION:
    requirements:
      1: packages/runtime/src/agent-tools/tools.ts projects schema catalog entries into Effect AI Tool definitions.
      2: Runtime tool-call execution remains the path from tool calls to RuntimeContext, RuntimeIngress, RuntimeOutput, RuntimeObservationSourceNames, WaitFor.match, and host authority primitives.
      3: Agent tool descriptions, parameter schemas, success schemas, and examples are derived from the schema catalog rather than duplicated in runtime tool code.
      4: Agent tool binding files may import @effect/ai and protocol operation schemas, but must not import waits, host, workflow-engine, durable table facades, or runtime operation execution modules.

  CLIENT_PROJECTION:
    requirements:
      1: The programmer-facing API stays in the single @firegrid/client package and exposes namespaces such as sessions, wait, and permissions.
      2: Client methods decode inputs through the same schema catalog and do not import @effect/ai Tool values, MCP server layers, or runtime-only handler dependencies.
      3: Client APIs use product-facing names such as sessions.create and sessions.prompt while preserving the same schema contract as agent tool projections.
      4: The client exposes a durable session facade that can create or load a RuntimeContext-backed session by external key, append prompts with idempotency, read snapshots, wait for permission requests, and write permission responses without callers constructing RuntimeContext ids or RuntimeIngress input ids.
      5: Starting a runtime from the client facade is expressed through a protocol-owned runtime-start capability supplied by host/runtime composition; packages/client must not import packages/runtime source or call startRuntime directly.
      6: Client wait and permission helpers use protocol-owned runtime observation source names and protocol schemas so browser/app-facing code does not import runtime-host observation modules.

  CLIENT_SESSION_FACADE:
    requirements:
      1: firegrid.sessions.createOrLoad decodes protocol-owned SessionCreateOrLoad input schemas, normalizes PublicLaunchRuntimeIntentSchema runtime config, derives contextId through the protocol external-key helper, and returns the same RuntimeContext handle for duplicate externalKey calls.
      2: The external-key to contextId helper is protocol-owned, deterministic, collision-resistant for distinct canonical key tuples, and does not rely on app-local slug or separator joining policy.
      3: createOrLoad writes or loads a host-bound RuntimeContext row through protocol host-authority primitives so apps do not reconstruct Firegrid runtime identity, host binding, journal, or launch normalization details.
      4: The returned handle scopes prompt, start, snapshot, wait.forPermissionRequest, and permissions.respond to the durable contextId so callers do not restate RuntimeContext identity on every operation.
      5: handle.prompt decodes protocol-owned scoped prompt input, appends a RuntimeIngress message row, keeps input idempotency deterministic from the caller supplied idempotencyKey, and preserves optional metadata on the durable ingress row.
      6: handle.start delegates to protocol RuntimeStartCapability supplied by runtime-host or app composition; @firegrid/client remains runtime-source-free and does not call startRuntime directly.
      7: handle.snapshot observes existing RuntimeControlPlane, RuntimeIngress, and RuntimeOutput DurableTable rows for the scoped RuntimeContext without app-local projection state.
      8: handle.wait.forPermissionRequest observes protocol FiregridRuntimeObservationSourceNames.agentOutputEvents semantics over RuntimeOutput events, filters by scoped contextId plus optional afterSequence and timeoutMs, and returns the matching PermissionRequest observation without adding a permission table.
      9: handle.permissions.respond decodes protocol-owned scoped permission response input and appends a RuntimeIngress PermissionResponse control row, deriving default idempotency inside the client helper from contextId plus permissionRequestId.
      10: The facade does not import runtime agent Tool values, app-owned identity helpers, factory-specific code, scenario-side adapters, parent-child hierarchy, or provider-specific Firegrid substrate.

  CLIENT_READ_PROJECTION:
    requirements:
      1: Protocol-owned observation schemas define normalized runtime agent-output observations exposed to clients and apps.
      2: RuntimeContextSnapshot includes agentOutputs derived from RuntimeOutput event rows through the protocol observation schema rather than exposing only raw RuntimeEvent rows for session semantics.
      3: handle.wait.forAgentOutput observes the scoped session's normalized agent-output observations with optional afterSequence and timeoutMs filters.
      4: handle.wait.forPermissionRequest is implemented as permission-specific sugar over the same normalized agent-output projection semantics rather than a separate raw-envelope parser.
      5: Product apps such as Dark Factory do not parse RuntimeEvent.raw or import @firegrid/runtime/events to recover normalized agent output.
      6: DurableTableProvider and raw RuntimeOutputTable access remain available for inspectors, diagnostics, and raw timelines, but are not the normal product API for Firegrid session semantics.

  CLI_PROJECTION:
    requirements:
      1: src/run.ts and future CLI commands project schema metadata into command args, validation, defaults, examples, and help text where applicable.
      2: CLI parsing may use @effect/cli, but accepted values and validation are aligned with protocol schemas rather than private CLI-only contracts.
      3: CLI binding files may import @effect/cli and protocol schemas, but Node process/env access, embedded durable-streams server setup, runtime-host composition, and MCP server startup stay in CLI execution files.

  BINDING_EXECUTION_SPLIT:
    requirements:
      1: Agent-tool, TypeScript client, and CLI bindings are physically isolated from execution/substrate code so binding files serialize protocol schemas into user-facing surfaces and execution files perform Firegrid effects.
      2: The binding/execution split is implemented transactionally across agent-tool, client, and CLI surfaces rather than through long-lived compatibility moves that keep mixed binding/execution files alive.
      3: Shared operation execution is introduced only where multiple bindings have the same runtime substrate semantics; otherwise each binding delegates to its appropriate execution environment without redefining the operation contract.
      4: Static validation prevents binding files from importing execution/substrate internals and prevents execution files from importing client or CLI binding modules.
      5: Feasibility validation for the transactional cutover includes dependency analysis, browser-safety checks for client binding files, and package export checks before implementation begins.

constraints:
  BOUNDARIES:
    requirements:
      1: This feature does not split @firegrid/client into many tiny published packages; subpath exports are allowed only as exports from the existing package.
      2: This feature does not expose packages/runtime/src/agent-tools/tools.ts as the programmer-facing client API.
      3: This feature does not introduce packages/runtime/src/session-control or another runtime service layer unless repeated execution code proves that abstraction is needed.
      4: This feature does not introduce a platform parent/child session hierarchy beyond RuntimeContext identity and explicit metadata.
      5: The client package remains runtime-source-free; if an operation needs runtime-host authority, the dependency is represented as an Effect service/tag declared in protocol and provided by runtime-host or app composition.
      6: The binding/execution split does not require publishing one package that mixes browser-safe client code, Node CLI code, MCP/Effect AI tooling, and runtime host execution.
