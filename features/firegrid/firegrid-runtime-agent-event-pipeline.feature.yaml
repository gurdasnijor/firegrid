feature:
  name: firegrid-runtime-agent-event-pipeline
  product: firegrid
  description: Stage-disciplined runtime agent event pipeline with explicit write authorities per durable table family.

components:
  STAGES:
    requirements:
      1: Runtime agent execution is expressed as sources, codecs, transforms, authorities, subscribers, projections, tools, waits, and host wiring rather than one runtime-host aggregate root.
      2: Sources acquire byte/process resources with scoped lifetime and do not decode protocols or write durable rows.
      3: Codecs convert protocol sessions into AgentInputEvent and AgentOutputEvent flows and never write Firegrid durable rows directly.
      3-1: The shared codec runtime owns bounded output queue construction for all codecs.
      3-2: The shared codec runtime owns runtime-bound emit construction for all codecs.
      3-3: The shared codec runtime owns fallback id generation for all codecs.
      3-4: The shared codec runtime owns terminal event merging for all codecs.
      3-5: The shared codec runtime owns send-side input dispatch scaffolding for all codecs.
      3-6: The shared codec runtime owns common codec error mapping scaffolding for all codecs.
      3-7: The codec contract exposes a toolUseMode capability flag used by the tool router subscription gate.
      3-8: Active codec sessions report a per-session toolUseMode after protocol negotiation or fixed construction; runtime does not infer the mode from codec class and the tool router gates only client_result_roundtrip sessions.
      3-9: The SDD classifies agent wire modes as observation_only, client_result_roundtrip, and control_channel_request_response; control-channel request/response is not subscriber-produced ToolResult ingress.
      3-10: Stateful protocol-session codecs may own scoped live protocol connection, negotiation, in-memory correlation, and lifecycle state when required by the wire protocol, but durable evidence crosses the codec boundary only through AgentOutputEvent and AgentInputEvent, and live codec state does not survive session restart.
      4: Transforms are pure stream operators over normalized events and own no resources or durable writes.
      5: Projections are sibling views over codec sessions and do not sit downstream of RuntimeOutput.
      6: Pipeline sources, durable write capability tags, static Stream observation tags, and dynamic SourceCollectionHandle registrations remain directionally distinct; host observation wiring only registers dynamic read handles and does not introduce new write ownership.
      7: Stage boundaries expose typed contracts using existing Effect interfaces where possible; sources return Streams, transforms are Stream-to-Stream functions or Channels, durable table authorities provide Queue.Enqueue/Sink/Effect write tags plus Stream observation tags, subscribers consume capability tags, and host/pipeline only composes those contracts.
      8: Cross-stage routing identities use schema-owned branded types where practical instead of unstructured strings or numbers.

  SOURCE_CONFORMANCE:
    requirements:
      1: A firelab conformance matrix enumerates every supported SandboxProvider, session mode, codec or transport, and live-agent canary row before harness cases are implemented.
      2: Deterministic fixture replay covers ACP, stdio-jsonl, fake MCP/provider permission and tool round trips, and adversarial restart or disconnect transcripts without requiring live model credentials in standard verification.
      3: Replay fixtures exercise named fault classes for crash mid-action, dropped wait, codec double-advertisement, and permission-gate stall.
      4: A fuzz pass mutates replay byte/input boundaries for chunk splitting, frame coalescing, stdout/stderr interleaving, malformed or incomplete JSON, early exit, stdin close/EPIPE, slow or hung response, duplicate tool ids, missing permission response, response after disconnect, provider secret leakage, and restart/replay after a committed output row.
      5: The harness emits traceable firelab artifacts that can be inspected with simulate:show and simulate:perf, and a failing run exposes the trace path and failed matrix row.
      6: Findings from the harness update the runtime sources README so source-owned guarantees are separated from codec correlation, durable authority, and app-facing configuration guarantees.
      7: Live-agent canary rows use real tool-use agent commands only when explicitly enabled by environment and never replace deterministic fixture replay as the CI foundation.

  AUTHORITIES:
    requirements:
      1: Every durable table family written by runtime code has exactly one runtime authority module that owns commits for that family.
      2: RuntimeOutputJournalLive is the only runtime provider layer for capability tags that write RuntimeOutputTable.events and RuntimeOutputTable.logs.
      3:
        requirement: RuntimeIngressAppenderLive was the legacy runtime provider layer for sequenced RuntimeIngressTable.inputs rows.
        deprecated: true
      4:
        requirement: RuntimeIngressDeliveryTrackerLive was the legacy runtime provider layer for RuntimeIngressTable.deliveries rows.
        deprecated: true
      4-1: RuntimeIngress delivery claim/complete capabilities are shared across raw stdin and codec delivery paths; subscriberId namespaces delivery claims by protocol and role.
      4-2: RuntimeIngress delivery subscriber ids use the shape runtime-ingress:<protocol>:<role>.
      5: RuntimeControlPlaneRecorderLive is the only runtime provider layer for capability tags that write RuntimeControlPlaneTable.contexts and RuntimeControlPlaneTable.runs lifecycle rows.
      5-1: RuntimeControlPlaneRecorderLive owns local RuntimeContext insertion currently performed through host-context authority; host-context authority remains the read, validation, current-context, and stream URL derivation surface.
      6: DurableWaitStoreLive is the only runtime provider layer for capability tags that write durable wait rows and completions.
      6-1:
        requirement: DurableWaitForMatching is deferred until a production permission/capability bridge needs a static matching capability beyond WaitFor.match and SourceCollections.
        deprecated: true
      7: Authority layers may provide Queue.Enqueue capabilities for append-only writes, Sink values for stream-terminal writes, and narrow Effect-returning capabilities for command handlers that need committed rows or lookups.
      8: Authority layers that own rows consumed by subscribers expose static Stream observation tags for those rows and dynamic SourceCollectionHandle registrations only for wait_for/source lookup by name.
      9: Authority read surfaces are named and documented as static durable observation streams or dynamic source registrations rather than pipeline byte sources.
      10: Authority layers expose split Effect Context.Tag capability services using stock Effect interfaces, with implementations provided by Effect Layers, rather than unrelated ad hoc module object APIs, generic RuntimeAuthority wrappers, or new DurableAppend/DurableObservation concepts.
      11: Authority layers do not expose generic DurableTable CRUD facades; they expose Queue.Enqueue, Stream, Sink, and narrow Effect capabilities using Effect types directly.
      12: Runtime code depends on durable capability tags through the Effect requirement channel or narrow typed parameters, not on module-global authority singletons or full services when a stock Effect capability is enough.
      13: Authority layers that provide static Stream observation tags also construct corresponding dynamic SourceCollectionHandle registrations from those streams when wait_for lookup needs them.
      14: A runtime authority provider map exists only when production runtime behavior needs it; otherwise provider uniqueness is verified by tests or docs against actual Effect Context.Tag and Layer values without exporting review-only runtime registry surface.

  TOOL_DISPATCH:
    requirements:
      1: ToolUse dispatch is driven from durable RuntimeOutput ToolUse observations rather than inline taps on the live codec output stream.
      2: The tool router deduplicates dispatch by durable tool-use identity and does not append duplicate ToolResult rows for already-completed tool uses.
      3: "ToolResult ingress rows produced by tool dispatch use deterministic idempotency keys of shape agent-tool-result:<contextId>:<activityAttempt>:<toolUseId>."
      4: Tool dispatch writes explicit result, interruption, or error evidence for each dispatched ToolUse.
      5: Tool dispatch is single-flight per contextId and activityAttempt in v1.
      5-1: The tool router watches only the current running activityAttempt for a context and does not redispatch ToolUse rows from prior terminal attempts.
      6: The v1 transactional cutover implements subscriber-based ToolUse to ToolResult round-trip for active stdio-jsonl sessions whose per-session toolUseMode is client_result_roundtrip.
      7: ACP sessionUpdate.tool_call and tool_call_update rows are durable observations, not dispatch candidates, and the tool router must not claim them.
      8: ToolUse rows are decoded through a protocol/runtime event-output envelope helper shared by the output capability layer and subscribers; subscribers do not parse RuntimeEventRow.raw ad hoc.
      9: ACP MCP delegation and ACP Client capability methods are request/response control-channel paths; additional filesystem or terminal handlers require separate SDD/spec ACIDs for authority, journaling, idempotency, and sandbox policy.

  INGREDIENTS:
    requirements:
      1: Runtime input deferred rows are decoded into AgentInputEvent values by the reactive RuntimeContextWorkflow and sent to the active session through RuntimeContextWorkflowSession.send.
      2: AgentOutputEvent values are transformed and committed through RuntimeAgentOutputRowSink before subscriber side effects depend on them.
      3: RuntimeOutput ToolUse observations are routed to toolUseToEffect through the reactive workflow, which sends ToolResult responses through RuntimeContextWorkflowSession.send.
      4: RuntimeOutput PermissionRequest observations remain durable observations that are resumed by PermissionResponse ingress rows.
      4-1: Permission waits observe RuntimeAgentOutputEvents or its dynamic wait/source registration through wait_for or session.wait APIs rather than subscribing to codec internals.
      4-2: PermissionResponse runtime input is completed as owner-workflow deferred input and delivered to the active codec by RuntimeContextWorkflowSession.send.
      4-3: AcpCodec resolves pending ACP requestPermission promises from delivered PermissionResponse rows without making the tool router responsible for permission flow.
      4-4: The permission-wait bridge is the v1 instance of the general control_channel_request_response capability bridge pattern.
      4-5: Capability bridges compose only when they fit the substrate guarantee of a durable output Stream capability, durable wait capability, runtime ingress append capability, and ingress delivery to the active codec; other shapes require a new SDD.
      5: DurableTable remains the storage and live row observation primitive; this feature does not introduce a new fact/source storage abstraction.
      6: Codec runtime commits the Terminated event row through RuntimeAgentOutputRowSink before returning terminal exit evidence to host workflow handling.
      6-1:
        requirement: Codec runtime fails with a named runtime output error when the output stream ends without a Terminated event.
        deprecated: true
      7: The AgentToolHost service tag and interface remain with tool lowering, while the host-coupled live implementation lives under host wiring.

  TRANSACTIONAL_CUTOVER:
    requirements:
      1: The implementation lands as one target-state cutover rather than a behavior-preserving split followed by separate semantic and directory-rename phases.
      2: The new packages/runtime/src tree is organized by stage role and pins the directory rename in scope.
      2-1: The file currently named host-context-authority.ts is renamed to host/authority-context.ts as part of the cutover.
      3: The source tree reflects the target stage roles immediately and does not preserve open-ended compatibility aliases for prototype-internal runtime paths.
      3-1: If a temporary compatibility export bridge is unavoidable during the cutover, a deletion ACID must be added and satisfied before this feature is complete.
      3-2: The protocol insertLocalRuntimeContext helper is a deprecated browser-safe compatibility write path during the cutover; runtime host-facing exports and callsites route local context insertion through the runtime control-plane insert capability, and replacing the client/protocol helper requires a follow-up browser-safe command authority.
      4: The implementing PR description presents the target tree and ACID list as the review artifact.
      5: The implementing PR description lists durable capability tags with provider layers/backing tables and the dynamic SourceCollectionHandle registrations exposed for wait_for lookup.

constraints:
  BOUNDARIES:
    requirements:
      1: The runtime agent event pipeline does not change @firegrid/protocol durable row schemas.
      2: The runtime agent event pipeline does not move app-owned DurableTable schemas, provider semantics, planner prompts, provider credentials, or UI read-model joins into runtime.
      3: The runtime agent event pipeline does not make packages/client import runtime implementation modules.
      4: Agent tool schema projection remains schema-owned and tool lowering remains host-authority backed.
      5: App-owned DurableTable collections may be registered as wait sources, but Firegrid does not introduce a new provider fact table.
      6: The runtime event pipeline does not define the resource plane; pre-launch resource materialization and runtime-time Client capability interception require separate SDD/spec work.
      7: Durable rows may describe sessions, contexts, resources, or sandboxes, but they do not prove live host ownership of process handles, filesystems, containers, provider sessions, or protocol connections.
      8: Composition in this cutover is static, strongly typed pipeline wiring; behavior that affects durable state routes through durable capability tags or dynamic SourceCollectionHandle lookup so externally visible effects are durable, observable, and replay-safe.

  ENFORCEMENT:
    requirements:
      1: The canonical runtime-host Effect layer composition relates each durable runtime capability tag to exactly one provider layer and backing DurableTable collection family.
      2: Semgrep rejects direct insert, upsert, and delete calls against runtime-owned DurableTable collection facades outside the provider layer for the corresponding durable capability tags and tests.
      2-1: Semgrep allows calls to durable capability tags and explicit test harness allowlist entries.
      3: Subscribers consume durable seams through Stream capability tags or dynamic SourceCollectionHandle lookup rather than directly calling DurableTable.rows on runtime-owned tables.
      4: Subscribers and transforms do not accept runtime-owned DurableTable collection facades as inputs; production writes route through durable capability tags and production reads route through Stream capability tags or dynamic source registrations.
      5: Production runtime code has exactly one provider layer for each durable runtime capability tag expected by the canonical runtime-host layer composition.
      5-1: Provider uniqueness is validated by a test-local canonical durable capability tag list paired with actual Effect Context.Tag and Layer values, while Semgrep prevents production registry APIs and direct table-facade bypasses.
      6: Enforcement and review helpers inspect the Effect layer/tag graph or test-local metadata derived from those values rather than treating hand-maintained strings as the source of truth.
      7: Runtime production source does not export registry files or APIs whose only consumers are review tooling, documentation, or tests.

  VALIDATION:
    requirements:
      1: The cutover proves existing raw local-process runtime behavior still journals stdout and stderr correctly.
      2: The cutover proves stdio-jsonl codec runtime execution advertises client_result_roundtrip and still handles Prompt, ToolUse, ToolResult, and Terminated events.
      3: The cutover proves ACP PermissionRequest remains durably observable and resumable through RuntimeIngress PermissionResponse.
      3-1: The cutover proves a wait_for or session.wait permission query resolves from RuntimeAgentOutputEvents or its dynamic source registration after a PermissionRequest row commits.
      3-2: The cutover proves PermissionResponse ingress delivery resolves the pending ACP requestPermission promise for a live session.
      4: The cutover proves duplicate startRuntime calls do not duplicate external runtime execution.
      5: A test named firegrid-runtime-agent-event-pipeline.TOOL_DISPATCH.1 firegrid-runtime-agent-event-pipeline.VALIDATION.5 proves durable subscriber tool dispatch replays from committed RuntimeOutput ToolUse rows after restart or reconstruction.
      6: The cutover proves ACP tool_call and tool_call_update observations are journaled and not claimed by the tool router, while ACP PermissionRequest remains durably observable and resumable.
      7: The cutover proves control_channel_request_response modes are not routed through subscriber-produced ToolResult ingress.
