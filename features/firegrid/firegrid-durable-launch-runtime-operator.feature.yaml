feature:
  name: firegrid-durable-launch-runtime-operator
  product: firegrid
  description: Stream-native launch verb, runtime context handle, sandbox stream contract, and durable runtime event/log rows for starting disposable black-box runtime processes whose application-visible output is rebuildable from durable rows.

components:
  LAUNCH_ROWS:
    requirements:
      1: Runtime launch is requested by appending a durable runtime context row to a configured control-plane stream, not by invoking a Firegrid RPC or product HTTP endpoint.
      2:
        requirement: Runtime stop is requested by appending a durable stop row to the same launch authority, not by treating a live process handle as authority.
        deprecated: true
      3: The internally assigned runtime context id is the v1 idempotency key for duplicate runtime workflow execution unless a later spec introduces a separate dedupe key.
      4: Runtime context rows and runtime run rows are separate durable control-plane facts; context lifecycle projections fold over one context and N run attempts.
      5:
        requirement: Launch request specs carry secret references only; adapters reject raw secret material in durable target specs.
        deprecated: true
      6: Public launch requests contain a provider helper result plus optional caller metadata; callers do not provide runtime context id, planes, bindings, stream URLs, journal config, raw env values, readiness, rebuild, or restart policy.
      7: Firegrid normalizes a public launch request into an internal runtime context row that contains the assigned context id, creation time, runtime provider, runtime config, and provider-owned journaling mapping.
      8: Local JSONL launch helpers configure stdout as runtime event JSONL and stderr as runtime log text without exposing those journal rules on the public launch request.

  RUNTIME_TARGET:
    requirements:
      1:
        requirement: A RuntimeTarget describes how to start a live runtime process or adapter without defining provider message, transcript, tool, permission, or product session schemas.
        deprecated: true
      5: A provider helper result describes the runtime provider and minimal provider config needed to start a live command without introducing a durable RuntimeTarget registry.
      2:
        requirement: A RuntimeTarget may declare readiness as a predicate over durable rows in named streams; the launch operator observes the predicate but does not embed provider-specific readiness logic.
        deprecated: true
      3:
        requirement: A RuntimeTarget may declare rebuild inputs and strategy so replacement runtimes can restore equivalence from durable rows before performing side effects.
        deprecated: true
      4:
        requirement: Restart policy decides whether another process attempt is allowed; rebuild strategy decides what the replacement runtime must do after it starts.
        deprecated: true

  PLANES:
    requirements:
      1:
        requirement: A runtime context may declare session, logs, execution, and resource plane references without making those planes Firegrid-owned provider taxonomies.
        deprecated: true
      2:
        requirement: Session and log planes are Durable Streams backed stream references that can be observed or materialized independently of the runtime process.
        deprecated: true
      3:
        requirement: Execution planes describe where side effects may run, such as local process, Docker-backed workspace, remote sandbox, or hosted adapter references, without embedding sandbox lifecycle policy in Firegrid.
        deprecated: true
      4:
        requirement: Resource planes describe durable or external resources such as filesystem mounts, repository worktrees, artifact bundles, volumes, MCP proxies, and secret references without storing resource bytes or raw secret material in Firegrid runtime context rows.
        deprecated: true
      5:
        requirement: Plane bindings declaratively map plane fields into runtime-visible handles such as environment variables, mount paths, stdio configuration, or adapter inputs.
        deprecated: true

  SANDBOX_PROVIDERS:
    requirements:
      1: Execution providers implement a common SandboxProvider contract with provider name, capabilities, create, getOrCreate, find, execute, executeMany, stream, upload, download, and destroy operations.
      2: SandboxProvider configuration carries image or runtime hints, resource limits, resolved non-durable environment values, labels, setup commands, working directory, and provider-specific config without becoming product session schema.
      3: SandboxProvider instances return sandbox identity, state, labels, connection info, and provider metadata as live/provider facts, while durable runtime context rows remain the replay authority.
      4: Local process execution and remote providers such as Val Town, E2B, Daytona, or container providers are interchangeable behind the SandboxProvider contract when their capabilities satisfy the launch request.
      5: Optional capabilities such as persistence, snapshots, streaming, file upload, interactive shell, and GPU are declared as provider capabilities rather than assumed by Firegrid launch code.
      6: SandboxProvider.stream emits non-durable stdout, stderr, and exit chunks for a command; durable truth begins only when workflow activities append rows to Durable Streams.

  SECRET_BINDINGS:
    requirements:
      1:
        requirement: Secret values needed by a local or remote runtime are represented in runtime context rows as resource-plane secret references, never as raw environment variable values.
        deprecated: true
      2:
        requirement: Env-secret bindings resolve secret references only at the live execution boundary and inject the resolved value into the runtime process or platform provider without writing the value back to Durable Streams.
        deprecated: true
      3:
        requirement: Secret resolution is performed by a host-provided resolver Layer or platform provider integration, not by Firegrid substrate state.
        deprecated: true
      4:
        requirement: Local and remote launch providers may resolve the same durable secret reference through different backing stores while preserving the runtime context row and session stream identity.
        deprecated: true
      5:
        requirement: Failed secret resolution records a launch or materialization failure instead of starting a runtime process with missing secret-dependent environment.
        deprecated: true
      6: Provider helper configs may carry provider-owned secret references, and those references are resolved only at the live provider boundary without writing raw secret material to durable rows.
      7: Tracer 001 does not require secret injection; secret helper behavior is a later provider-conformance concern.

  LAUNCH_OPERATOR:
    requirements:
      1: The launch operator preloads retained runtime context state and reads the normalized context row before starting live sandbox stream side effects.
      2:
        requirement: The launch operator arbitrates runtime context execution through @effect/workflow execution idempotency and workflow-engine activity-claim semantics before starting a process attempt.
        deprecated: true
      2-note: Deprecated. Runtime context execution is host-owned table/fact orchestration; workflow-engine activity claims are reserved for workflow-engine workflows, not a runtime-context mini-root.
      3: The launch operator starts local processes through SandboxProvider.stream and scopes live resources to the process attempt lifetime.
      4: The launch operator records run started, exited, and failed facts as durable runtime context control-plane rows for tracer 001.
      5: Process ids, child handles, stdio pipes, sockets, SDK clients, fibers, and filesystem handles are never durable authority.
      6: Process death does not make runtime event and log facts unavailable after those facts were durably journaled by Firegrid.
      7: The tracer bullet launcher starts a local black-box command, consumes its live stdout and stderr chunks, and writes durable runtime output data-plane rows itself.
      8:
        requirement: The launch workflow is declared with @effect/workflow and uses the runtime context id as its idempotency key.
        deprecated: true
      8-note: Deprecated. The runtime-context workflow mini-root was deleted; host code reads RuntimeControlPlaneTable directly and records run rows through the same table.
      9: Node-tier hosts consume tracer 001 runtime launch execution through declared @firegrid/runtime package exports, not source subpaths.
      10: A tracer 001 acceptance path starts with public Firegrid.launch, runs the runtime workflow with the returned runtime context id, and observes retained event and log rows from the configured data-plane stream.
      11: Runtime context execution reads the shared RuntimeControlPlaneTable directly, invokes the configured sandbox provider, writes runtime output table rows, and writes run status rows without a RuntimeControlPlane service wrapper or runtime-context workflow mini-root.
      12: Runtime control-plane table stream selection is derived by product composition from a Durable Streams service base URL plus namespace; launch clients and scenarios do not hand-wire runtime control table stream URLs.

  RUNTIME_HOST:
    requirements:
      1:
        requirement: The production runtime host root owns stream topology for workflow state, runtime control-plane rows, and runtime-output journal rows.
        deprecated: true
      1-note: Deprecated because runtime-context execution no longer uses a workflow mini-root or raw runtime-output journal; workflow-engine topology is owned by the workflow-engine package surface.
      2:
        requirement: The production runtime host root owns workflow engine selection and worker identity for runtime context execution.
        deprecated: true
      2-note: Deprecated because runtime-context execution is direct table/fact orchestration and does not select a workflow engine.
      3: Runtime context start requests carry the context id only; host-owned stream URLs, workflow engine selection, worker identity, materialization backend, and provider wiring are not launch request fields.
      4: Scenario tracer 001 configures the production runtime host root and starts runtime context execution through exported @firegrid/runtime package code.
      5: The production runtime host root owns runtime control-plane rows, runtime-output table rows, and optional runtime input delivery topology without requiring workflow stream configuration.
      6: Runtime host configuration validates optional input topology at the host options boundary without exporting a separate input configuration module.
      7: Runtime host v0 allocates a run activity attempt by reading existing run rows for the context and choosing max(activityAttempt)+1; strict concurrent allocation fencing is deferred to a future durable claim/append primitive.

  JOURNAL_ROWS:
    requirements:
      1: Stdout chunks mapped to runtime events are written as durable runtime output data-plane rows before downstream consumers can observe provider content.
      2: Stderr chunks mapped to runtime logs are written as durable runtime output data-plane rows before the process exit control-plane row is appended.
      3: Runtime event JSONL journal events preserve the raw line without parsing or interpreting provider-specific schemas in the launcher.
      4: Process exited control-plane rows are appended only after prior emitted output chunks from the sandbox stream have been durably journaled.
      5: Late consumers can read retained durable runtime output data-plane rows after the launched process has exited.
      6: Runtime output data-plane rows include a durable per-attempt sequence so retained consumers do not rely on wall-clock timestamp ordering.
      7: Runtime output data-plane rows are stored in a shared RuntimeOutputTable with separate stdout event and stderr log collections keyed by schema-owned composite primary keys that include context id, activity attempt, target, and sequence.

  REMOTE_TRACER:
    requirements:
      1:
        requirement: A remote tracer provider can deploy the same runtime event tracer runtime to a remote execution plane using the same runtime context id, session stream plane, resource secret refs, and readiness predicate as the local tracer.
        deprecated: true
      2:
        requirement: The first opt-in remote provider target is Val Town because it can create a small remotely hosted TypeScript val, expose an HTTP trigger, and provide private environment variables to the remote runtime.
        deprecated: true
      3:
        requirement: Remote tracer tests are opt-in and require caller-provided provider credentials and account identity; default CI does not create external resources.
        deprecated: true
      4:
        requirement: A successful basic remote tracer returns the same product-owned provider wire row shape that the local tracer appends, including proof that configured secret bindings were available to the remote runtime.
        deprecated: true
      5:
        requirement: Remote tracer cleanup deletes, replaces, or marks retired the remote runtime resource when the selected provider adapter supports cleanup and records durable lifecycle state before the test exits.
        deprecated: true
      6:
        requirement: Container or VM providers such as Fly Machines remain later conformance targets for process-supervision semantics that Val Town's HTTP-triggered runtime does not prove.
        deprecated: true
      7:
        requirement: Remote session-plane writeback is a separate opt-in conformance lane that requires a Durable Streams endpoint reachable from the selected remote execution provider.
        deprecated: true
      8: Remote sandbox provider conformance is a later lane and is not part of tracer 001 completion.

  MATERIALIZERS:
    requirements:
      1:
        requirement: RuntimeTarget definitions and StreamMaterializer definitions are independent; either side may be reused without a 1:1 binding.
        deprecated: true
      2:
        requirement: A StreamMaterializer declares one or more input stream names and one output projection name.
        deprecated: true
      3:
        requirement: A StreamMaterializer can be attached after launch by a late observer when the required raw rows are still retained.
        deprecated: true
      4:
        requirement: A StreamMaterializer fold is pure and deterministic over schema-decoded durable rows; impure enrichment is a downstream layer, not projection authority.
        deprecated: true
      5:
        requirement: Unknown runtime event rows remain durable raw records even when no materializer maps them into canonical projection rows.
        deprecated: true
      6:
        requirement: Dual client/runtime materialization uses a declared materializer identity, fold version, and source cursor contract.
        deprecated: true
      7:
        requirement: Materialized projections remain consistent across process attempt death and replacement startup with no missing or duplicated logical rows at the boundary.
        deprecated: true

  LAUNCH_HANDLE:
    requirements:
      1: A RuntimeContextHandle is a durable observation handle for Firegrid's internally assigned runtime context id, not a live process handle or caller-provided id.
      2:
        requirement: A RuntimeContextHandle exposes lifecycle, snapshot, named projection, and stop affordances.
        deprecated: true
      3:
        requirement: Raw named stream access is diagnostic and is not the default product-facing observation surface.
        deprecated: true
      4:
        requirement: Product packages may wrap RuntimeContextHandle projections into product-specific APIs such as sessions, messages, transcripts, histories, or runtime events.
        deprecated: true
      5: For tracer 001, a RuntimeContextHandle exposes the assigned context id and retained durable runtime context snapshot without live process authority.

constraints:
  PRODUCT_NEUTRALITY:
    requirements:
      1: Firegrid launch APIs do not define Claude, ACP, Codex, Cursor, Devin, Flamecast, prompt, chat, tool, permission, provider webhook, or product callback semantics.
      2: Firegrid exposes no product HTTP launch or webhook surface for this feature; configured Firegrid client and runtime Durable Streams connections are the ingress and observation boundary.
      3: Built-in provider mappings for Claude SDK, Claude ACP, Codex, Devin, Cursor, Jules, OpenHands, Factory Droid, or Flamecast require separate adapter packages or product-owned code.

  STREAM_TRUTH_BOUNDARY:
    requirements:
      1: Runtime context control-plane producers use Durable Streams State Protocol for context and run rows because workflow coordination queries those rows by runtime context id.
      2: Runtime output data-plane producers write schema-validated stdout and stderr rows through RuntimeOutputTable generated facades rather than raw Durable Streams journals.
      3: Downstream session, permission, trace, and product projections consume data-plane facts and may emit Durable Streams State Protocol changes to their own projection streams.

  DEPENDS_ON:
    requirements:
      1: "`durable-records-and-projections.*` governs durable record authority, projection rebuild, materializer fold, and raw-row retention semantics."
      2: "`firegrid-runtime-process.*` governs runtime package placement, Effect Platform process discipline, scoped runtime lifetimes, and binary attachment through `DURABLE_STREAMS_URL`."
      3: "`firegrid-client-projection-api.*` governs browser-safe projection observation and prevents client surfaces from gaining claim, completion, terminal, or runtime authority."
      4:
        requirement: "`firegrid-execution-plane-resources.*` governs resource identity, secret references, materialization facts, and local-to-remote handoff constraints consumed by launch resource planes."
        deprecated: true
      5: Later provider-conformance lanes govern provider helper config for resources, secret references, and local-to-remote handoff outside tracer 001.

  INVARIANTS:
    requirements:
      1: This spec is bound by `firegrid-platform-invariants.PRODUCTION_SURFACE.1`, `firegrid-platform-invariants.PRODUCTION_SURFACE.2`, `firegrid-platform-invariants.PRODUCTION_SURFACE.3`, and `firegrid-platform-invariants.PRODUCTION_SURFACE.4`; tracer 001 is not complete when its launch-to-runtime-output path exists only inside scenario or test code.
