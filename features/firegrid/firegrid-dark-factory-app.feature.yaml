feature:
  name: firegrid-dark-factory-app
  product: firegrid
  description: Firegrid-powered replacement surface for the existing Smithery hooks/factory product loop, using durable facts, RuntimeContext execution, agent tools, runtime observation, and product-owned provider adapters without introducing a factory orchestration engine.

components:
  APP_SURFACE:
    requirements:
      1: The first dark-factory app slice lives under apps/dark-factory and is wired as a workspace app rather than a top-level package, direct Flamecast dependency, or hook.new bundle.
      2: The app exposes product-owned adapter entrypoints for Linear, GitHub, or webhook inputs and composes Firegrid runtime primitives directly; it does not use pnpm firegrid -- run as the core factory path.
      3: The app is framed as the Firegrid-powered replacement for the existing hooks/factory behavior, not as a generic demo app or Flamecast-adjacent prototype.

  EXTERNAL_FACTS:
    requirements:
      1: External Linear, GitHub, decision, PR, CI, and webhook-style inputs are represented as app-owned DurableTable facts with deterministic source plus external event keys so duplicate delivery resolves to the same durable fact.
      2: Product-owned HTTP routes, workers, or adapters capture raw provider input and write fact rows; Firegrid does not expose a provider webhook endpoint, callback URL product, or provider taxonomy for the app.
      3: The app registers its fact table collection under a short source name so wait_for can observe facts by top-level scalar fields such as source, externalEventKey, externalEntityKey, eventType, contextId, and correlationId.

  HOSTED_SUBSTRATE:
    requirements:
      1: App acceptance runs against a configured hosted Electric/Durable Streams endpoint with auth headers; local DurableStreamTestServer is not accepted as apps/dark-factory replacement evidence.
      2: Linear, GitHub, Slack, and provider credentials are supplied through env or deployment secret config and are never committed, logged as bearer values, or copied into docs/spec examples.
      3: The accepted provider ingest proof uses a live provider webhook or live provider-shaped route delivery where feasible, not fixture Linear or GitHub event payloads as the replacement proof.

  PARENT_RUN:
    requirements:
      1: A factory trigger creates or loads one parent planner RuntimeContext by external source key, such as Linear issue id, ticket id, or correlation id, rather than creating competing parent runs on redelivery.
      2: Parent and child relationships are carried as RuntimeContext metadata, prompts, durable facts, and tool result payloads; the app does not add a platform parent/child hierarchy beyond metadata and correlation.

  CHOREOGRAPHY:
    requirements:
      1: The planner agent owns sequencing, branching, retries, and delegation by reading durable facts/runtime history and calling Firegrid tools; the app does not encode a deterministic planner/implementer/reviewer/QA/deploy DAG.
      2: Firegrid supplies durable primitives and observations through packages/runtime/src/agent-tools/tools.ts, including session_new, session_prompt, wait_for, schedule_me, and execute where supported by the runtime.
      3: The acceptance proof uses a real planner/agent backend selected from what Firegrid supports at implementation time; deterministic fake planners are not accepted as the factory replacement proof.

  PLANNER_RUNTIME:
    requirements:
      1: The parent planner is launched through RuntimeContext/control-plane primitives and normal runtime-host execution, not through a synchronous CLI run path, hook.new RPC chain, or custom factory workflow engine.
      2: The planner receives enough prompt/context metadata to discover relevant fact source names, runtime observation source names, provider capability boundaries, and the external ticket/repository identity.
      3: Agent selection is whatever Firegrid can support for the slice; the app must not require a predetermined Flamecast runtime or direct Flamecast module dependency.

  SESSION_TOOLS:
    requirements:
      1: Delegated implementation, review, or QA work is represented by session_new child RuntimeContext creation with parentSessionId, role, and correlation metadata when supplied.
      2: Follow-up work uses session_prompt or host-owned runtime ingress to an existing RuntimeContext with idempotent input identity.

  WAIT_AND_PERMISSION:
    requirements:
      1: Human decisions and external status changes are waited on with wait_for over app fact sources or RuntimeObservationSourceNames rather than hidden callback markers, parked RPC URLs, or comment-walking routers.
      2: ACP PermissionRequest output is observed through RuntimeObservationSourceNames.agentOutputEvents and resumed by writing a RuntimeIngress PermissionResponse to the same context.
      3: The first implementation proves at least one human-gate-shaped pause and resume path using durable state through a live/manual or env-gated provider/operator path rather than a fixture decision writer as acceptance proof.

  PROVIDER_SIDE_EFFECTS:
    requirements:
      1: Linear, GitHub, and Slack credentials and provider-specific setup are owned by the dark-factory app boundary, not by Firegrid runtime, DurableTable, or a generic provider registry.
      2: GitHub and Linear side effects such as PR lookup, comment upsert, CI status, PR close/merge, Linear activity/comment updates, and delegate assignment write durable evidence facts so retries and planner turns can observe prior effects.
      3: Provider idempotency mechanisms such as GitHub comment markers may be used inside provider adapters, but they are not Firegrid resume callbacks or hidden workflow control markers.

  OBSERVATION:
    requirements:
      1: The app presents or tests durable observation from RuntimeOutputTable, RuntimeControlPlaneTable runs, runtime observation sources, and app fact tables so a user can inspect what happened and what is waiting.
      2: Terminal or waiting states are derived from durable observations and facts, not from in-memory process state.

constraints:
  BOUNDARIES:
    requirements:
      1: The app does not introduce a custom workflow engine, factory orchestration runtime, createFunction-style SDK, hidden callback marker protocol, DurableConsumer revival, Source-style abstraction, or generic webhook server.
      2: The app does not depend on #229 sync CLI UX, Flamecast implementation modules, provider callback token issuance, or a product-specific transport.
      3: The app does not hard-code a platform-owned planner/implementer/reviewer/QA/deploy DAG; any first-slice scripted path is planner policy over durable facts and tools.
      4: The app has no direct Flamecast dependency and no platform parent/child hierarchy beyond metadata and correlation.

  VALIDATION:
    requirements:
      1: The first implementation PR includes an explicit live/manual or env-gated smoke that drives a factory-style provider trigger into a parent planner RuntimeContext on hosted Electric/Durable Streams, observes durable runtime output or facts, and resumes at least one wait or permission gate.
      2: CI may run docs/spec and non-secret structural checks, but implementation acceptance documents the live smoke prerequisites and result without committing or echoing bearer tokens, webhook secrets, OAuth tokens, PATs, or generated secret values.
