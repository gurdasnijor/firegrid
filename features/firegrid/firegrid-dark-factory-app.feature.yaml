feature:
  name: firegrid-dark-factory-app
  product: firegrid
  description: Firegrid-powered replacement surface for the existing Smithery hooks/factory product loop, using durable facts, RuntimeContext execution, agent tools, runtime observation, and product-owned provider adapters without introducing a factory orchestration engine.

components:
  APP_SURFACE:
    requirements:
      1: The first factory app slice is wired as apps/factory in the workspace and uses the PR #236 UI scaffold only when available; otherwise it proves the app substrate through hosted durable row writes/reads and runtime ingress/output without becoming a top-level package, direct Flamecast dependency, hook.new bundle, or Firegrid-owned app HTTP API.
      2: The app exposes product-owned adapter entrypoints for Linear, GitHub, or webhook inputs and composes Firegrid runtime primitives directly; it does not use pnpm firegrid -- run as the core factory path.
      3: The app is framed as the Firegrid-powered replacement for the existing hooks/factory behavior, not as a generic demo app or Flamecast-adjacent prototype.

  EXTERNAL_FACTS:
    requirements:
      1: External Linear, GitHub, decision, PR, CI, and webhook-style inputs are represented as app-owned DurableTable facts with deterministic source plus external event keys so duplicate delivery resolves to the same durable fact.
      2: Product-owned HTTP routes, workers, or adapters capture raw provider input and write fact rows; Firegrid does not expose a provider webhook endpoint, callback URL product, or provider taxonomy for the app.
      3: The app registers its fact table collection under a short source name so wait_for can observe facts by top-level scalar fields such as source, externalEventKey, externalEntityKey, eventType, contextId, and correlationId.

  HOSTED_SUBSTRATE:
    requirements:
      1: App acceptance runs against a configured hosted Electric/Durable Streams endpoint with auth headers; local DurableStreamTestServer is not accepted as apps/factory replacement evidence.
      2: Linear, GitHub, Slack, and provider credentials are supplied through env or deployment secret config and are never committed, logged as bearer values, or copied into docs/spec examples.
      3: The accepted provider ingest proof uses a live provider webhook or live provider-shaped route delivery where feasible; fixture-shaped provider payloads may exercise the accepted input shape only when the route writes hosted durable facts and does not simulate product progress.

  PLATFORM_PRIMITIVES:
    requirements:
      1: The app uses RuntimeContext as durable runtime identity for the planner and delegated sessions; external source keys and provider correlations live in app facts, prompts, runtime output, subscriber rows, or tool results unless an existing context row field supports them.
      2: RuntimeIngress and RuntimeOutput are the durable input/output planes for prompts, permission responses, agent output, tool calls, tool results, status, and terminal evidence.
      3: DurableTable facts plus SourceCollections registration expose Linear, GitHub, Slack, provider, and human decision rows to wait_for under an app-owned source name.
      4: RuntimeObservationSourceNames are used for runtime runs, output, ingress, and normalized agent-output observation rather than app-local process state.

  PARENT_RUN:
    requirements:
      1: A factory trigger creates or loads one durable factory-run subscriber identity by external work key, such as Linear issue id, ticket id, or correlation id, and resolves one planner contextId from it rather than creating competing factory runs on redelivery.
      2: Parent/delegated-session correlation is carried through prompts, durable facts, subscriber rows, runtime output, and tool result payloads; the app does not add or require a platform parent/child hierarchy or new RuntimeContext metadata model.

  AUTONOMOUS_RUN:
    requirements:
      1: Factory trigger handling creates or loads the durable factory-run subscriber identity and planner context, persists the accepted provider fact, and starts the planner through runtime-host primitives without a coded phase chain.
      2: The initial planner prompt includes parent context id, factory run key, source names, runtime observation source names, Linear issue fields, repository hint, provider capability names, and choreography operating rules.
      3: The initial planner prompt is designed to elicit plan approval waits or permission requests, session_new delegation, session_prompt follow-ups, wait_for over facts/runtime observations, schedule_me rechecks, and execute only for advertised capabilities.

  CHOREOGRAPHY:
    requirements:
      1: The planner agent owns sequencing, branching, retries, and delegation by reading durable facts/runtime history and calling Firegrid tools; the app does not encode a deterministic planner/implementer/reviewer/QA/deploy DAG.
      2: Firegrid supplies durable primitives and observations through packages/runtime/src/agent-tools/tools.ts, including session_new, session_prompt, wait_for, schedule_me, and execute where supported by the runtime.
      3: The acceptance proof uses a real planner/agent backend selected from what Firegrid supports at implementation time; deterministic fake planners are not accepted as the factory replacement proof.

  PLANNER_RUNTIME:
    requirements:
      1: The parent planner is launched through RuntimeContext/control-plane primitives and normal runtime-host execution, not through a synchronous CLI run path, hook.new RPC chain, or custom factory workflow engine.
      2: The planner receives enough prompt data and durable fact/runtime observation references to discover relevant fact source names, runtime observation source names, provider capability boundaries, and the external ticket/repository identity.
      3: Agent selection is whatever Firegrid can support for the slice; the app must not require a predetermined Flamecast runtime or direct Flamecast module dependency.

  SESSION_TOOLS:
    requirements:
      1: Delegated implementation, review, or QA work is represented by session_new RuntimeContext creation with parent context and correlation values supplied through existing tool input, prompt, fact, subscriber, or output fields.
      2: Follow-up work uses session_prompt or host-owned runtime ingress to an existing RuntimeContext with idempotent input identity.
      3: The factory planner uses wait_for for human gates, provider facts, CI facts, runtime status, and child-session observations; schedule_me for future self rechecks; execute only for configured capability-backed provider or sandbox actions; sleep only for bounded backoff.
      4: spawn and spawn_all are not app-facing factory planner tools; parallel work is expressed as session_new child sessions with stable session identity.

  WAIT_AND_PERMISSION:
    requirements:
      1: Human decisions and external status changes are waited on with wait_for over app fact sources or RuntimeObservationSourceNames rather than hidden callback markers, parked RPC URLs, or comment-walking routers.
      2: ACP PermissionRequest output is observed through RuntimeObservationSourceNames.agentOutputEvents with runtime resume-anchor fields available today, including permissionRequestId, contextId, toolUseId, choices, and runtime sequence; richer product display fields such as factory-run correlation are joined from app-owned facts or projection rows, and resume writes RuntimeIngress PermissionResponse matched by contextId plus permissionRequestId.
      3: The first implementation proves at least one human-gate-shaped pause and resume path using durable state through a live/manual or env-gated provider/operator path rather than a fixture decision writer as acceptance proof.

  PROVIDER_SIDE_EFFECTS:
    requirements:
      1: Linear, GitHub, and Slack credentials and provider-specific setup are owned by the dark-factory app boundary, not by Firegrid runtime, DurableTable, or a generic provider registry.
      2: GitHub and Linear side effects such as PR lookup, comment upsert, CI status, PR close/merge, Linear activity/comment updates, and delegate assignment write durable evidence facts so retries and planner turns can observe prior effects.
      3: Provider idempotency mechanisms such as GitHub comment markers may be used inside provider adapters, but they are not Firegrid resume callbacks or hidden workflow control markers.
      4: Provider side effects feed back to the planner through DurableTable facts and runtime output observations, not hidden callback URLs, hidden Linear comments, or comment-walking routers.
      5: Live execute-backed provider capabilities are prerequisites for planner-driven Linear/GitHub/Slack side effects; first-slice acceptance may omit execute side effects if those capabilities are not implemented and advertised.

  OBSERVATION:
    requirements:
      1: The app presents or tests durable observation from RuntimeOutputTable, RuntimeControlPlaneTable runs, runtime observation sources, and app fact tables so a user can inspect what happened and what is waiting.
      2: Terminal or waiting states are derived from durable observations and facts, not from in-memory process state.
      3: The first app slice exposes run progress through the apps/factory UI scaffold when available, or through a read-model/programmer projection backed by hosted durable rows when the scaffold is unavailable.
      4: The progress UI reports subscriber identity, planner context, active/terminal delegated sessions, latest facts, runtime output/logs, permission requests, current waits, provider links, and blocked/error state from durable rows only.
      5: The client may reuse apps/flamecast DurableTableProvider, useDurableTable, and useDurableLiveQuery patterns for live watches, but it must not copy Flamecast host infrastructure, local launch process management, or browser-originated runtime authority.
      6: PR #236 simulation hooks and mock data are placeholders only and are not accepted as apps/factory replacement evidence.

constraints:
  BOUNDARIES:
    requirements:
      1: The app does not introduce a custom workflow engine, factory orchestration runtime, createFunction-style SDK, hidden callback marker protocol, DurableConsumer revival, Source-style abstraction, generic webhook server, or Firegrid-owned app-specific HTTP API wrapper.
      2: The app does not depend on #229 sync CLI UX, Flamecast implementation modules, provider callback token issuance, or a product-specific transport.
      3: The app does not hard-code a platform-owned planner/implementer/reviewer/QA/deploy DAG; any first-slice scripted path is planner policy over durable facts and tools.
      4: The app has no direct Flamecast dependency and no platform parent/child hierarchy; relationships are represented through app-owned facts, prompts, subscriber rows, runtime output, tool results, and correlation values.

  VALIDATION:
    requirements:
      1: The first implementation PR includes an explicit live/manual or env-gated smoke that drives a factory-style provider trigger into an accepted fact and durable factory-run subscriber identity on hosted Electric/Durable Streams, starts the planner context, observes planner output or a permission request, writes a durable human/provider decision through ingress or fact, and observes the next planner action.
      2: CI may run docs/spec and non-secret structural checks, but implementation acceptance documents the live smoke prerequisites and result without committing or echoing bearer tokens, webhook secrets, OAuth tokens, PATs, or generated secret values.
