feature:
  name: stream-native-runtime-loop
  product: firegrid
  description: Validate that the Effect-native Durable Streams client can express Firegrid runtime ingress, provider delivery, and runtime output as ordinary Effect Stream and Sink programs without a bespoke event-store service.

components:
  LOOP:
    requirements:
      1: The validation path consumes durable runtime ingress rows through the Effect-native Durable Streams read or snapshot-then-follow API.
      2: The validation path writes runtime output rows through the Effect-native Durable Streams producer or Sink API.
      3: The validation path records durable ingress delivery progress before the provider-visible stdin side effect.
      4: Re-running the validation path after delivery progress exists does not deliver the same ingress row to the provider again.
      5: The validation path uses a real local process provider fixture that reads stdin and writes stdout.

  SURFACE:
    requirements:
      1: The validation path does not introduce a RuntimeIngress service, RuntimeCaptureJournal service, or equivalent service-shaped wrapper around the Effect-native Durable Streams API.
      2: The validation path composes with standard Effect primitives including Effect, Stream, Sink, Scope, Schema, and HttpClient layers.
      3: The validation path keeps domain logic as schemas, row constructors, folds, and a focused program function.
      4: The validation path does not import @durable-streams/* or the legacy @firegrid/durable-streams log or producer helper subpaths.

  SCENARIO:
    requirements:
      1: A scenario-level E2E test invokes the production package validation program rather than owning the only working composition.
      2: The scenario uses real Durable Streams test infrastructure and a real local process.
      3: The scenario proves durable ingress request, durable delivery progress, durable runtime output, and restart idempotency from the retained streams.

constraints:
  SCOPE:
    requirements:
      1: This tracer does not migrate the canonical runtime host, required actions, workflow operators, materialization, or client launch API.
      2: This tracer does not add a new durable-log object protocol, runtime host topology field, workflow endpoint, or service registry.
      3: This tracer may remain an experimental production package surface until the Effect-native Durable Streams API and benchmarks are accepted.

  INVARIANTS:
    requirements:
      1: This spec is bound by effect-native-durable-log.STREAM.1, effect-native-durable-log.STREAM.2, effect-native-durable-log.STREAM.3, effect-native-durable-log.MIGRATION.1, and effect-native-durable-log.MIGRATION.2.
      2: This spec is bound by firegrid-platform-invariants.PRODUCTION_SURFACE.5 and firegrid-agent-ingress.DELIVERY.3.

