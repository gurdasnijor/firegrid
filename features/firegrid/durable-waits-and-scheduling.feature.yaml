feature:
  name: durable-waits-and-scheduling
  product: firegrid
  description: Define wait and scheduling APIs that lower to durable completions after core state, producer, ready-work, and operator authority are proven.

components:
  SLEEP:
    requirements:
      1: "`sleep(durationMs)` records durable timer intent by creating a timer-shaped `durable.completion`."
      2: Timer firing is represented by appending a durable resolved terminal record for the timer completion.
      3: Timer firing does not resume a live JS callback as authority.
      4: Optional trace rows may record scheduled, fired, or cancelled timer observability.
      5: Slice 7 `sleep` creates the pending timer completion only; timer resolver execution is a later integration concern.
      6: Timer sleep resume compares an existing blocked completion to the requested sleep by the canonical Effect Schema timer duration field.

  WAIT_FOR:
    requirements:
      1: "`waitFor(trigger, timeoutMs?)` records a projection-match-shaped `durable.completion`."
      2: Slice 7 `waitFor` records a typed projection-match trigger payload but does not run a projection matcher.
      3: Projection-match resolver implementations must evaluate an initial snapshot before following live updates.
      4: Projection-match resolver implementations use Durable Streams State snapshot boundaries or base Durable Streams no-gap cursor semantics.
      5: If a resolver cannot prove a no-gap snapshot/follow boundary, it fails with a typed unsupported/no-gap error.
      6: A timeout, when supplied, is recorded as durable completion data and later resolves through durable completion terminal rules rather than an in-memory timer callback.
      7: A timeout duration is converted to an absolute durable deadline when the projection-match completion is created.
      8: "Projection-match wait resume compares an existing blocked completion to the requested wait by the canonical Effect Schema trigger fields: tag, label, projection key, and matcher id."

  SCHEDULE_WORK:
    requirements:
      1: "`scheduleWork(when, input)` records scheduled work intent by creating a scheduled-work-shaped `durable.completion`."
      2: The substrate-level scheduled work primitive is generic and does not mention prompts or agents.
      3: Timer firing is represented by resolving the scheduled-work completion and lets ready-work derivation resume the owning run.
      4: Higher runtimes such as Fireline may map agent-facing `scheduleMe(when, prompt)` onto `scheduleWork`.
      5: Timer firing does not directly append agent prompt rows or assume live promptability.
      6: Slice 7 `scheduleWork` creates the pending scheduled-work completion only and does not declare a new run.

  AWAKEABLE_API:
    requirements:
      1: The public awakeable API creates a keyed externally resolved durable completion.
      2: The public awakeable API resolves, rejects, or cancels by appending durable completion terminal records.
      3: Awakeable APIs do not expose raw Durable Streams append or Durable Streams State envelope construction as the normal integration path.
      4: Awakeable keys are work-scoped by default using the owning `workId` plus a stable semantic name.
      5: Global awakeables require an explicit namespace.
      6: Slice 7 work-scoped awakeable keys use `awk:work:${workId}:${name}`.
      7: Slice 7 global awakeable keys use `awk:global:${namespace}:${name}`.
      8: Creating the same awakeable key more than once is idempotent and returns the existing durable completion id.

constraints:
  PHASE_BOUNDARY:
    requirements:
      1: This feature starts after semantic producer operations, ready-work derivation, and claim-before-invoke authority are proven.
      2: This feature does not introduce separate timer, trigger, or wait row families.
      3: This feature does not introduce ACP, MCP, CLI, process launch, provider lifecycle, sandbox, resource, or tool transport behavior.
      4: Slice 7 wait APIs create durable completions and return completion ids; they do not block runs or create continuations internally.
