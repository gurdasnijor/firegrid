feature:
  name: effect-native-production-cutover
  product: firegrid
  description: Cut production Firegrid runtime, materialization, client, app, and scenario code over to the Effect-native Durable Streams client as the only durable stream/log write-read surface.

components:
  RUNTIME_IO:
    requirements:
      1:
        requirement: Production runtime output writes use the Effect-native Durable Streams producer or Sink API.
        deprecated: true
      1-note: Deprecated. Runtime output is now table-shaped durable state and writes through RuntimeOutputTable generated facades.
      2: Production runtime ingress reads and writes use the Effect-native Durable Streams read, collect, append, or producer APIs.
      3: Production runtime workflow code does not depend on RuntimeCaptureJournal service tags.
      4: Production runtime host wiring does not provide RuntimeCaptureJournalLive, RuntimeIngressLive, or RuntimeIngressUnavailableLive.

  MATERIALIZATION:
    requirements:
      1: Runtime-output retained reads in session projection and external provider sinks use the Effect-native Durable Streams read or collect API.
      2:
        requirement: State Protocol materialization writes use the Effect-native Durable Streams producer or Sink API.
        deprecated: true
      2-note: Deprecated. Ordinary table writes now use DurableTable generated facades; raw durable fact streams use effect-durable-streams.
      3: Materialization tests and scenarios seed durable streams through the Effect-native Durable Streams API.

  REQUIRED_ACTION:
    requirements:
      1: Required-action durable fact reads use the Effect-native Durable Streams read or collect API.
      2: Required-action durable fact writes use the Effect-native Durable Streams append or producer API.

  CLIENT_APP:
    requirements:
      1:
        requirement: Firegrid client snapshot reads use the Effect-native Durable Streams API.
        deprecated: true
      1-note: Deprecated. Firegrid client snapshot reads use RuntimeOutputTable for runtime output rows.
      2: Flamecast durable stream usage does not import legacy Firegrid durable-streams log or producer helper subpaths.
      3: Scenario setup and assertions use the Effect-native Durable Streams API except for durable-streams test infrastructure.

constraints:
  DELETION:
    requirements:
      1: The legacy appendJson helper is deleted or made non-importable.
      2: The legacy readRetainedJson helper is deleted or made non-importable.
      3: The legacy openDurableStreamProducer helper is deleted or made non-importable.
      4: The @firegrid/durable-streams/log and @firegrid/durable-streams/producer subpaths are removed or made non-importable.
      5: No compatibility aliases are added for legacy log or producer helpers.

  GUARDRAILS:
    requirements:
      1: Static checks prevent new imports of @firegrid/durable-streams/log and @firegrid/durable-streams/producer.
      2: Static checks prevent production code from importing appendJson, readRetainedJson, or openDurableStreamProducer.
      3: The cutover leaves historical documentation as history only; current architecture documents name the Effect-native Durable Streams API as the durable stream primitive.

  INVARIANTS:
    requirements:
      1: This cutover is bound by effect-durable-operators.PACKAGE.4, effect-durable-operators.PACKAGE.2, effect-durable-operators.PACKAGE.3, effect-durable-operators.FIREGRID_PROOF.2, effect-durable-operators.FIREGRID_PROOF.4, effect-durable-operators.BOUNDARIES.9, and effect-durable-operators.BOUNDARIES.10. The legacy stream-native-runtime-loop validation surface and its feature spec were deleted in tracer 017; runtime input delivery now flows through provider-owned Effect code plus DurableTable checkpoint collections.
      2: This cutover is bound by firegrid-platform-invariants.PRODUCTION_SURFACE.5.
