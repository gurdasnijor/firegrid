feature:
  name: agentic-patterns-primitive-profile
  product: firegrid
  description: Define the Firegrid-neutral primitive profile used by agentic-patterns showcase participants.

components:
  ERGONOMIC_LAUNCH:
    requirements:
      1: Showcase participants launch through the public Firegrid client session surface with a runtime-context MCP declaration enabled by launch config.
      2: The launch shape does not require callers to pass host-sdk, runtime, DurableTable, workflow-engine, or raw Durable Streams handles.
      3: Showcase participant launch does not require a public readiness/materialization wait; operations that need reflected RuntimeContext state own bounded internal readiness before acting.

  LOCKED_TOOL_SURFACE:
    requirements:
      1: The primitive profile exposes exactly the agent-visible runtime-context MCP tools wait_for, wait_for_any, send, and call.
      2: Session creation, prompting, starting, and permission responses stay on public client/session methods rather than becoming extra agent-visible tools in this profile.
      3: The primitive profile does not expose sleep, schedule_me, execute, spawn, spawn_all, session_new, session_prompt, session_cancel, or session_close.
      4: The profile is implemented as an allowlist over public Firegrid agent-tool bindings, not as a custom JSON-RPC router or a new substrate registry.

constraints:
  SUBSTRATE_BOUNDARY:
    requirements:
      1: The primitive profile tools are channel-mediated and do not expose DurableTable, RuntimeControlPlaneTable, RuntimeOutputTable, workflow engine, stream URL, host session, or runtime kernel names in tools/list.
      2: The profile remains Firegrid-substrate-neutral and does not encode application or provider-specific semantics.
