feature:
  name: durable-clock-layer
  product: firegrid
  description: Deprecated record of the removed public durable Effect Clock layer. Durable timing now belongs inside workflow execution.

components:
  CLOCK_LAYER:
    requirements:
      1:
        requirement: "The durable Clock implementation installs through Effect's `Layer.setClock` mechanism."
        deprecated: true
      2:
        requirement: The durable Clock implementation does not override, replace, or configure Effect's Scheduler.
        deprecated: true
      3:
        requirement: "`Clock.sleep(duration)` appends a wake-up record before the calling fiber can remain parked."
        deprecated: true
      4:
        requirement: "`Clock.sleep(duration)` parks the calling fiber on an in-process deferred and resumes it only when the dispatcher fires the matching wake-up record."
        deprecated: true
      5:
        requirement: Interrupting a parked sleep cancels the matching pending wake-up record when that wake-up is still live in the current dispatcher.
        deprecated: true

  WAKEUP_STORE:
    requirements:
      1:
        requirement: The wake-up store interface supports appending wake-ups, listing pending wake-ups, listing due wake-ups, marking wake-ups dispatched, cancelling wake-ups, and snapshotting records.
        deprecated: true
      2:
        requirement: Due wake-up listing is ordered by earliest deadline first.
        deprecated: true
      3:
        requirement: A dispatcher created from a snapshot can discover due wake-up records that were appended by a previous dispatcher.
        deprecated: true
      4:
        requirement: A Durable Streams-backed wake-up store represents wake-ups as State Protocol rows keyed by wake-up id.
        deprecated: true
      5:
        requirement: A restarted Durable Streams-backed wake-up store pointed at the same stream URL can discover pending wake-ups without an in-process snapshot.
        deprecated: true
      6:
        requirement: A Durable Streams-backed wake-up store writes wake-up changes through `createStreamDB` actions and `awaitTxId` confirmation instead of Firegrid-specific append helpers.
        deprecated: true
      7:
        requirement: A Durable Streams-backed wake-up store exposes a close operation that releases the underlying StreamDB live consumer.
        deprecated: true

  EFFECT_STACK:
    requirements:
      1:
        requirement: "Standard `Effect.sleep` uses the durable Clock layer without a Firegrid wrapper."
        deprecated: true
      2:
        requirement: Standard Effect timeout APIs use the durable Clock layer without a Firegrid wrapper.
        deprecated: true
      3:
        requirement: Standard Effect Schedule retry/repeat timing uses the durable Clock layer without a Firegrid wrapper.
        deprecated: true
      4:
        requirement: Standard Clock-backed Stream operators use the durable Clock layer without a Firegrid wrapper.
        deprecated: true

  RESTART_BOUNDARY:
    requirements:
      1:
        requirement: A recreated dispatcher can mark a rehydrated due wake-up as dispatched.
        deprecated: true
      2:
        requirement: The durable Clock layer does not claim to preserve or resume in-memory Effect fibers across process death.
        deprecated: true
      3:
        requirement: Cross-process continuation after a wake-up dispatch requires a runtime-owned re-dispatch or checkpoint primitive outside the Clock layer.
        deprecated: true
      4:
        requirement: Production-shaped restart tests use a real Durable Streams stream URL as the durability boundary rather than an in-memory snapshot taken inside a live Effect scope.
        deprecated: true

constraints:
  PUBLIC_SURFACE:
    requirements:
      1:
        requirement: "The first durable Clock slice exposes a substrate `durable-clock` subpath and does not add Firegrid-specific sleep, wait, timeout, retry, or schedule verbs."
        deprecated: true
      2:
        requirement: The first durable Clock slice includes a Durable Streams-backed wake-up store but does not implement a runtime checkpoint or continuation re-dispatch primitive.
        deprecated: true
      3:
        requirement: "The first durable Clock slice does not change `RunWait`, `DurableWaits`, choreography, operation lifecycle, or subscriber APIs."
        deprecated: true

  RETIREMENT:
    requirements:
      1: Firegrid runtime does not expose a public durable Effect Clock layer; durable time is modeled through workflow clock wakeups owned by the WorkflowEngine substrate.
