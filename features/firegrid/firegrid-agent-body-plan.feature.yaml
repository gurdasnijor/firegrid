feature:
  name: firegrid-agent-body-plan
  product: firegrid
  description: Present agent body-plan verbs through opaque, host-declared channels while keeping substrate routing details inside the host plane.

components:
  CHANNEL_REGISTRY:
    requirements:
      1: Host SDK exposes an opaque ChannelTarget string token schema for agent-facing channel addresses.
      2: Host SDK exposes a ChannelRegistry service that registers channel targets with afferent, efferent, or call direction metadata.
      3: Channel registry metadata exposes the channel schema shape needed by downstream tool metadata without exposing substrate bindings.
      4: Channel registrations bind afferent channels to typed streams, efferent channels to append targets, and call channels to request-response handlers.
      5: The factory.events channel can be registered through host composition as an afferent channel without exposing CallerFact or stream names to agent-visible metadata.
  MCP_CHANNEL_METADATA:
    requirements:
      1: Runtime-context MCP tools/list metadata exposes the registered channel inventory with channel name, direction, and schema information.
      2: The factory.events tools/list metadata entry exposes its row schema without exposing substrate storage names.
      3: Channel metadata enrichment is limited to MCP tool metadata and does not replace the Effect AI toolkit or tool-call handlers.

  STATE_CHANGES:
    requirements:
      1: Host code can declare a `state.changes` channel with an opaque channel target for a DurableTable collection.
      2: A `state.changes` channel is afferent and static-source, so agents can read it but cannot append through it.
      3: The channel registration exposes the caller-declared collection row schema as metadata.
      4: The channel registration reads through the existing DurableTable rows stream for that collection.
      5: Channel consumers can wait on the opaque channel target without knowing the underlying DurableTable name or durable stream name.

  APPROVAL_CALL:
    requirements:
      1: The agent tool surface exposes a `call` operation addressed by an opaque approval channel target.
      2: The approval call request carries a permission decision plus optional timeout, sequence, and idempotency controls.
      3: The host approval adapter waits for a matching PermissionRequest on the current runtime context and responds by appending a PermissionResponse intent.
      4: Approval call targets outside the approval channel family are rejected until generic callable-channel dispatch is implemented.

  HUMAN_CHANNELS:
    requirements:
      1: Host code can declare a `dm(handle)` channel as paired afferent and efferent registrations at the same opaque channel target.
      2: Host code can declare a `notification(handle)` channel as paired afferent and efferent registrations at the same opaque channel target.
      3: Human channel schemas are substrate-neutral message envelopes that do not expose provider or MCP transport details.
      4: Human channel bindings are supplied at host composition time as incoming streams plus outgoing append targets.

  WAIT_FOR_CHANNEL:
    requirements:
      1: The wait_for agent-tool input schema accepts channel, optional match, and optional timeoutMs fields.
      2: The wait_for agent-tool input schema does not expose source, source._tag, or stream fields.
      3: wait_for resolves its channel field through the host ChannelRegistry and only accepts afferent channel registrations.
      4: wait_for accepts an omitted match as a channel discovery request and accepts timeoutMs:0 as an immediate discovery bound.
      5: wait_for returns matched channel rows as matched:true event payloads and timeout results as matched:false timedOut:true.

  SESSION_LOG:
    requirements:
      1: "Host code can declare `session.log` as an efferent-only channel registration."
      2: "The `session.log` schema carries a durable log row with context id, message, and optional payload metadata."
      3: "The `session.log` binding persists rows through a DurableTable collection supplied by host composition."
      4: "`session.log` exposes no afferent/read binding to the agent surface."

constraints:
  SLICE_BOUNDARY:
    requirements:
      1: Phase 2 Slice A is additive and does not change the wait_for tool input schema or tool-use lowering.
      2: Phase 2 Slice C.3 wraps DurableTable rows without redesigning DurableTable rows or subscribe primitives.
      3: Phase 2 Lane 2 changes the wait_for channel-addressed tool surface but does not publish channel inventory metadata through MCP tools/list.
