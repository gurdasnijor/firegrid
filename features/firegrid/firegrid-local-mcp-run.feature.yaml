feature:
  name: firegrid-local-mcp-run
  product: firegrid
  description: A unified Firegrid CLI run/start surface that composes the runtime host, route-scoped MCP server, optional embedded Durable Streams, and schema-owned RuntimeContext launch contract.

components:
  LOCAL_COMMAND:
    requirements:
      1: The unified Firegrid CLI exposes a start subcommand from the primary run.ts entrypoint and prints a structured versioned ready record containing contextId and the route-scoped MCP URL.
      2: The start subcommand keeps the host scope alive after printing the ready record so MCP Inspector or another client can connect to the printed URL.
      3: The start subcommand is usable with no agent argv; in that mode it seeds a minimal no-op RuntimeContext through production primitives and prints the MCP URL.
      4: Optional agent argv and run flags customize the seeded RuntimeContext intent; contextId is still produced by the start subcommand, not supplied by env.
      5: The start subcommand is an MCP context bootstrap, not a synchronous run path; it creates a host-bound RuntimeContext for tool authority without automatically calling startRuntime.

  RUN_COMMAND:
    requirements:
      1: The unified Firegrid CLI exposes a synchronous run subcommand from the primary run.ts entrypoint that creates a host-bound RuntimeContext, starts runtime execution, waits for terminal evidence, and exits with the runtime exit code.
      2: "The run subcommand has local-development parity with start: when DURABLE_STREAMS_BASE_URL is absent it can acquire an embedded loopback DurableStreamTestServer, and when the endpoint is provided it attaches to the configured endpoint."
      3: "The run subcommand has host-authority parity with passive host mode: context creation, host binding, prompt ingress, MCP attachment, and runtime execution use the same production primitives as the host/control-event path."

  EMBEDDED_DURABLE_STREAMS:
    requirements:
      1: When DURABLE_STREAMS_BASE_URL is provided, the command uses that endpoint through existing runtime topology config.
      2: When DURABLE_STREAMS_BASE_URL is absent, the command starts an embedded loopback DurableStreamTestServer as a scoped resource and uses its base URL.
      3: Embedded Durable Streams exists only for local developer use; production host commands still attach to an explicit Durable Streams endpoint.

  MCP_ROUTE:
    requirements:
      1: The printed MCP URL has the route shape /mcp/runtime-context/:contextId by default.
      1-1: The route accepts Firegrid-generated RuntimeContext ids without rejecting them due to HTTP router path-parameter length limits.
      2: Tool catalog and execution are provided by FiregridMcpServerLayer and Effect AI McpServer composition; the local command does not implement JSON-RPC, tools/list, or tools/call.
      3: Firegrid-launched agents receive the generated route-scoped Firegrid MCP server in their launch configuration by default when the selected adapter/backend supports MCP setup.
      4: User-provided MCP servers are additive to Firegrid's generated runtime-context MCP server; callers do not need to pass Firegrid's own MCP URL explicitly.

  LAUNCH_CONFIG:
    requirements:
      1: "CLI launch arguments and durable RuntimeContext launch ingress normalize through a shared schema-owned Firegrid-neutral MCP server declaration shaped as name plus server { type: url, url, headers? } before adapter-specific lowering."
      2: "ACP-backed launches lower Firegrid-neutral MCP server declarations into ACP session setup shapes such as { type: http }, while CLI-backed launches lower the same declarations into that CLI/backend's native MCP setup surface."
      3: The source of truth for launch parsing and validation is the schema family in packages/protocol/src/launch/schema.ts; src/run.ts must decode/validate CLI-derived launch input through those schemas instead of constructing an unchecked parallel shape.
      4: CLI parsing remains a thin Effect CLI command layer over the protocol launch schemas; command options and positional argv are converted into schema input and then decoded/normalized through Effect Schema.
      5: Firegrid's generated runtime-context MCP server is injected during launch normalization before adapter-specific lowering, leaving room for future non-ACP adapters without changing the public launch contract.
      6: The run subcommand accepts an opaque --agent NAME selector and preserves it in the schema-decoded launch config without introducing an agent registry or ACP-specific public schema.
      7: A public-command smoke scaffold covers the intended codex-acp launch shape with default Firegrid MCP attachment; full ACP execution may remain pending on the runtime codec integration lane.
      8: ACP-backed Claude Agent runs scope Claude Code setting sources to project configuration so local sim runs do not load user-level Skills or settings from the operator's home directory.
      9: MCP server header declarations reject literal strings for secret-bearing header names or secret-shaped values before a durable RuntimeContext launch config is written; credential headers must use refs.
      10: MCP server header refs of shape {ref:"env:VAR"} may be durably persisted and resolve to concrete header values only at host session attach/spawn time.

  CLI_HELP:
    requirements:
      1: Root help for `pnpm firegrid --help` describes the run and start subcommands and includes common workflows for starting host/MCP, running a local command with a prompt, launching an ACP/codex agent with default Firegrid MCP, and passing secret env bindings.
      2: Run help for `pnpm firegrid -- run --help` documents schema-backed launch inputs, including agent argv, prompt, cwd, opaque agent selector, agent protocol selection, and secret env bindings.
      3: Start help for `pnpm firegrid -- start --help` documents host/MCP options, defaults, route-scoped ready-record output, and the optional launch config seeded for the hosted RuntimeContext.
      4: CLI help and option text are generated from Effect CLI command definitions while shared launch-option descriptions/examples/default intent are sourced from annotations or metadata adjacent to packages/protocol/src/launch/schema.ts rather than a separate launch contract.
      5: Focused help-content tests prove root, run, and start help include the supported workflows and schema-backed option descriptions.

constraints:
  EFFECT_COMPOSITION:
    requirements:
      1: The command lifecycle is expressed with NodeRuntime.runMain plus Effect scoped/Layer composition; Firegrid does not add a custom process manager, sidecar service, or supervisor protocol.
      2: The embedded DurableStreamTestServer lifecycle is acquired and released through Effect scope.
      3: Runtime host and MCP server composition reuses FiregridLocalHostLive, insertLocalRuntimeContext, and FiregridMcpServerLayer.

  AUTHORITY_BOUNDARY:
    requirements:
      1: The command does not add FIREGRID_MCP_CONTEXT_ID, host identity env vars, or any tool argument that supplies context authority.
      2: The command does not construct host-owned Durable Streams URLs manually; host-owned stream routing remains inside existing runtime/protocol authority helpers.

  VALIDATION:
    requirements:
      1: A public-command smoke starts `pnpm firegrid -- start` without DURABLE_STREAMS_BASE_URL, parses the ready record, connects with the real MCP SDK, lists the six canonical tools, and calls sleep successfully.
      2: A public-command smoke starts `pnpm firegrid -- start` with DURABLE_STREAMS_BASE_URL provided and proves the command attaches to the configured endpoint instead of starting embedded Durable Streams.
      3: A public-command smoke for `pnpm firegrid -- run --prompt TEXT --agent NAME -- <command>` proves the durable RuntimeContext row contains the default firegrid-runtime-context MCP declaration and preserves the opaque agent selector.
