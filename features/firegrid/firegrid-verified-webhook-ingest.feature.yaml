feature:
  name: firegrid-verified-webhook-ingest
  product: firegrid
  description: Production-shaped Firegrid surface for turning product-owned, verified webhook requests into durable facts that wait_for can observe without making Firegrid a webhook product.

components:
  FACTS:
    requirements:
      1: Verified inbound webhook events are represented as schema-owned DurableTable rows in @firegrid/runtime, not as raw provider JSON appended directly to Durable Streams.
      2: Each fact row is keyed by a deterministic composite key derived from source id and external event key.
      3: The fact row preserves source-neutral fields for source id, external event key, optional external entity key, event type, receipt and verification timestamps, signature scheme, selected non-secret headers, payload hash, and the source-owned payload.

  INGEST:
    requirements:
      1: The ingest adapter verifies HMAC over the raw request bytes before JSON parsing.
      2: The ingest adapter decodes JSON only after signature verification succeeds.
      3: The ingest adapter rejects requests whose payload does not provide a configured external event key.
      4: The ingest adapter writes accepted facts through DurableTable.insertOrGet and acknowledges success only after the insert-or-duplicate result is durable and observable through the table layer.
      5: A duplicate delivery with the same source id, external event key, and payload hash is accepted as duplicate success without creating a second logical fact.
      6: A duplicate delivery with the same source id and external event key but a different payload hash is rejected as a conflict and does not overwrite the original fact.
      7: Selected header capture excludes common secret-bearing headers and the configured signature header even when those names are requested by adapter config.

  WAIT_INTEGRATION:
    requirements:
      1: Verified webhook fact rows are shaped so a workflow or agent-visible wait_for call can observe them through SourceCollections using scalar field equality predicates.
      2: Verified webhook fact rows become wait_for-observable through the generic DurableTable collection source-name registration path, with firegrid.verifiedWebhooks as the recommended short source name when a product wants a Firegrid-owned default.
      3: Agents can wait on top-level scalar verified webhook fact fields including source, externalEventKey, externalEntityKey, and eventType.
      4: Permission request and resolution events can use the verified webhook fact path when product routes emit source-neutral permission_requested or permission_resolved facts carrying permissionId, correlationId, and contextId or parentSessionId fields.

  PRODUCTION_SURFACE:
    requirements:
      1: The production API keeps ingestVerifiedWebhook as the raw request verifier/translator for product-owned route adapters and relies on the generic DurableTable collection source-name registration helper rather than a verified-webhook-specific source helper, Firegrid-owned HTTP service, or POST endpoint.
      2: The first production source helper does not add a public source declaration type or scalar payload field projection; those remain follow-up schema/API slices.
      3: The table/layer factory composes VerifiedWebhookFactTable with Durable Streams options, including authenticated headers when supplied by the host or product composition.
      4: VerifiedWebhookFactTable.verifiedWebhookFacts is a normal DurableTable collection that can be registered under a product-chosen wait_for source name without creating a provider registry or webhook source kind.

constraints:
  BOUNDARIES:
    requirements:
      1: This tracer does not add a Firegrid-owned HTTP webhook service, callback URL minting, callback token issuance, provider event taxonomy, product-specific Linear client, or generic webhook product.
      2: This tracer does not change runtime-host workflows, workflow-engine internals, prompt/session dispatch, DurableConsumer, DurableProjection, ConsumerSource, Source-style abstractions, or a new top-level package.
