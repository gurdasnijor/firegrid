feature:
  name: firegrid-materialization-engines
  product: firegrid
  description: Provide pluggable data-plane materialization engines for queryable projections without changing durable stream authority.

components:
  ENGINE:
    requirements:
      1: A materialization engine consumes accepted runtime-output data-plane facts and creates queryable derived projections.
      2: Materialization engines are replaceable provider services selected by the runtime host or scenario, not by browser clients.
      3: Materialization engines expose a query surface and may expose a subscription surface when the provider supports it.

  MATERIALIZE:
    requirements:
      1: The Materialize engine provisions its SQL objects through the PostgreSQL wire protocol using Effect SQL.
      2: The Materialize engine queries projection results through Effect SQL `SELECT` statements.
      3: The Materialize engine exposes live result streams through Effect SQL `SUBSCRIBE` statements.
      4: The first Materialize runtime-output projection uses a webhook JSON source for ingested runtime journal events.

constraints:
  BOUNDARY:
    requirements:
      1: Durable Streams runtime-output rows remain the source of truth; Materialize projections are derived and rebuildable.
      2: The Materialize provider does not import runtime control-plane modules or workflow-engine internals.
      3: The Materialize provider does not define product-native session, permission, tool, prompt, or provider taxonomies.
