feature:
  name: run-wait-primitives
  product: firegrid
  description: Define the app-facing durable wait primitive surface used inside typed Firegrid runtime handlers without teaching higher-level workflow vocabulary as Firegrid concepts.

components:
  RUN_WAIT_API:
    requirements:
      1: "`RunWait` is the curated app-facing service for durable wait primitives available inside a running Firegrid operation handler."
      2: "`RunWait.for(trigger)` waits for a projection-match trigger and suspends the current durable run through Firegrid-owned completion and ready-work machinery."
      3: "`RunWait.sleep(duration)` waits for a durable timer and suspends the current durable run through Firegrid-owned completion and ready-work machinery."
      4: "`RunWait.until(when)` records scheduled work intent without exposing raw completion rows or Durable Streams append calls to app handlers."
      5: "`RunWait.awakeable(name)` waits for a work-scoped externally resolved durable completion without exposing raw completion ids to app handlers."
      6: "`RunWait.layer({ streamUrl })` provides the production Layer for app-owned runtime entrypoints without requiring app code to import `@firegrid/substrate/kernel`."
      7: The `RunWait` service methods preserve Firegrid's existing durable row shapes, completion kinds, ready-work derivation, and claim-and-operator terminal authority.
      8: "`RunWait.for(trigger, options?)` accepts an optional `resultSchema` Effect Schema in `options`; on resume from a resolved projection-match completion the matched value is read from the completion's `result.matchedValue` field, decoded through `resultSchema`, and returned to the handler. Without `resultSchema` the resume returns `void` so happy-path callers stay ergonomic."
      9: "Decode failures during `RunWait.for` resume (for example, a `resultSchema` parse error against the durable `matchedValue`) surface as choreography-internal defects; they do not silently swallow the resume, do not re-author a duplicate completion, and do not corrupt the run's terminal state."

  VOCABULARY:
    requirements:
      1: Firegrid exposes durable wait primitives; higher layers such as Fireline or Firepixel own their workflow and orchestration vocabulary.
      2: Firegrid app-facing examples teach `RunWait` as the durable wait primitive API.
      3: The curated substrate root does not export choreography-named service or Layer constructors for app-facing durable wait primitives.

constraints:
  BOUNDARY:
    requirements:
      1: The `RunWait` API does not introduce Fireline, Firepixel, ACP, MCP, session, prompt, permission, provider, sandbox, tool-call, or schedule_me as substrate-native row families.
      2: The `RunWait` API does not expose raw completion CRUD, raw run transition builders, raw append helpers, retained fold readers, or `processReadyWorkItem` as the normal app-handler path.
      3: The `RunWait` API does not import or depend on the app-facing `@firegrid/client` package.
      4: "App code that composes `RunWait.layer({ streamUrl })` does not need to import `@firegrid/substrate/kernel`, `ChoreographyLive`, `DurableWaitsLive`, or any other lower-level Firegrid Layer to make `RunWait` work; `RunWait.layer({ streamUrl })` provides every Layer dependency `RunWait` needs."
      5: "`RunWait` is the app-facing surface, not a thin synonym: documentation, examples, and tests aimed at app authors do not teach `Choreography`, `ChoreographyLive`, `DurableWaits`, or `DurableWaitsLive` as the way to use durable wait primitives. Internal `RunWait` implementations may delegate to existing substrate services."
