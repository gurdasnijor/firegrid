feature:
  name: fluent-firegrid-keystone
  product: firegrid
  description: Prove a Restate sdk-gen-shaped Firegrid Operation/Future API can journal one durable step directly over Durable Streams without Workflow, DurableTable, or runtime dependencies.

components:
  PACKAGE:
    requirements:
      1: "`@firegrid/fluent-firegrid` is a self-contained workspace package whose runtime dependencies are limited to `effect` and `effect-durable-streams`."
      2: "The package exports a Restate-shaped `service({ name, handlers })` builder."
      3: "The package exports a client/invocation helper that can call a named service handler against a caller-supplied durable journal endpoint."
      4: "The package exports sdk-gen-shaped `gen`, `execute`, `run`, `Operation<T>`, and `Future<T>` primitives."

  DURABLE_RUN:
    requirements:
      1: "The free-standing `run(action, options?)` primitive returns a yieldable `Future<T>` when called inside `execute(ctx, gen(...))`."
      2: "`run` records a successful step result as an append-only journal event in a Durable Stream."
      3: "On re-invocation with the same journal endpoint, `run` replays the journaled result and does not execute `action` again."
      4: "`run` step identity is deterministic for a handler invocation by combining generator order with the caller-provided step name."

  FREE:
    requirements:
      1: "The package exports a free-standing `all(futures)` combinator that returns a yieldable `Future` with ordered tuple results."
      2: "`all` delegates through the active scheduler slot instead of requiring an explicit operations parameter."
      3: "The package exports a free-standing `sleep(durationMs, name?)` primitive that records completion in the journal and replays without waiting again."
      4: "A `Future` yielded more than once is memoized so its backing work runs once and every yield observes the same result."
      5: "The package exports Promise-shaped `race`, `any`, and `allSettled` combinators over Futures."
      6: "The package exports tagged `select(branches)` that returns the winning tag and Future."
      7: "The package exports `spawn(op)` for routine-backed Futures that compose with the same combinators."

  STATE:
    requirements:
      1: "The package exports free-standing `state<T>()` and `sharedState<T>()` accessors that read the active scheduler slot."
      2: "`state<T>().get(key)` and `sharedState<T>().get(key)` return yieldable Futures that resolve to the current value or null."
      3: "`state<T>().set`, `clear`, and `clearAll` mutate a durable append-only state log and are visible to later invocations sharing the same state substrate."
      4: "`sharedState<T>()` exposes only the read methods `get` and `keys` at the type level."

  DEFINITIONS:
    requirements:
      1: "The package can define service, object, and workflow surfaces with a shared `_kind`, `name`, and handler map shape."
      2: "The package can expose generator handlers from `service`, `object`, and `workflow` through the existing invocation client."
      3: "Workflow definitions are modeled as workflow-shaped invocation surfaces over the current journal endpoint until workflow-specific primitives exist."

  BENCHMARK:
    requirements:
      1: "The package includes a Vitest benchmark harness modeled on restate-sdk-gen's bench shape."
      2: "The benchmark harness measures baseline awaits, first-run append, and replay for sequential `run` workloads at 10, 100, and 1000 steps."

  EXAMPLES:
    requirements:
      1: "The package includes tutorial examples that track restate-sdk-gen's staged tutorial layout while using Firegrid-shaped use cases."
      2: "Only tutorial tiers backed by implemented fluent-firegrid primitives are executable; unavailable primitives are marked deferred."
      3: "The tutorial includes a workflow-shaped example using `workflow({ name, handlers })` rather than workflow-only durable promise semantics."
      4: "The tutorial exposes a deferred-surface registry describing each missing restate-sdk-gen primitive family and the substrate gap."

  ENGINE:
    requirements:
      1: "The package separates the Operation/Future engine into focused source modules instead of keeping the implementation in one monolithic entrypoint."
      2: "The scheduler implementation lives in its own module and remains the single owner of generator driving, combinator dispatch, and current operation execution."
      3: "The synchronous active scheduler slot lives in its own module and is only set for the synchronous generator advance span."

constraints:
  SUBSTRATE:
    requirements:
      1: "The keystone implementation does not import `@effect/workflow`, `effect-durable-operators`, `@firegrid/runtime`, `@firegrid/protocol`, or DurableTable."
      2: "Durable execution state for the keystone slice is represented by append-only Durable Stream journal events."
