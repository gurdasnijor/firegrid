feature:
  name: choreography-tool-bindings
  product: durable-agent-substrate
  description: Specify how Fireline-style choreography operations can be implemented above the substrate and exposed both through runtime APIs and agent tool bindings.

components:
  OPERATION_MODEL:
    requirements:
      1: Choreography operations are higher-layer operation definitions, not substrate-native row families.
      2: The same operation definition can be bound to an agent tool surface and to a runtime/client API.
      3: Operation definitions lower to Projection, Work pipeline, Awaitable, and client event plane APIs.
      4: Operation definitions preserve domain-specific policy such as promptability, sandbox authorization, provider selection, and resource access above the substrate.

  CORE_OPERATIONS:
    requirements:
      1: sleep lowers to a timer awaitable plus a subscriber/resolver profile.
      2: waitFor lowers first to Projection until, and only uses an awaitable when durable suspension across runtime ownership is required.
      3: scheduleMe lowers to scheduled awaitable eligibility plus a domain Work pipeline that records a later prompt intent only after promptability policy passes.
      4: execute lowers to a domain event or projection row plus a Work pipeline that claims before invoking a provider or tool transport.
      5: spawn and spawnAll lower to domain launch/prompt event planes, Work pipelines for runtime side effects, and Projection until for child terminal observation.

  TOOL_BINDING:
    requirements:
      1: Agent tool bindings call the same operation implementations used by runtime/client APIs.
      2: Agent tool bindings do not expose raw substrate completion, claim, stream, or state APIs to the agent.
      3: Tool-call authorization, permission waits, and denied-result handling remain domain policy above the substrate.
      4: Tool binding examples include ACP-compatible permission request flow without making ACP a substrate-native protocol.

constraints:
  LAYERING:
    requirements:
      1: The substrate package does not import Fireline, Firepixel, ACP, MCP, provider, sandbox, or runtime adapter packages.
      2: A Fireline or Firepixel profile package may import the substrate and define operation bindings.
      3: Choreography operation names such as sleep, waitFor, scheduleMe, execute, spawn, and spawnAll are profile-level names unless a later API review explicitly promotes any to the substrate facade.
