feature:
  name: awakeables-and-runs
  product: durable-agent-substrate
  description: Define generic durable promise and run rows as the first agent substrate primitives.

components:
  AWAKEABLE:
    requirements:
      1: "`durable.completion` represents the internal durable promise/deferred state machine."
      2: A completion can be pending.
      3: A pending completion can resolve with durable result data.
      4: A pending completion can reject with durable error data.
      5: Awakeable resolution does not resume a live JS callback as the source of truth.
      6: Awakeable resolution is observed through rebuilt durable state.
      7: The public awakeable API is a keyed externally-resolved durable promise backed by `durable.completion`.
      8: Awakeable keys are work-scoped by default using the owning `workId` plus a stable semantic name.
      9: Global awakeables require an explicit namespace.
      10: Duplicate awakeable resolutions follow first-valid-terminal-wins.
      11: A pending completion can cancel with durable terminal reason data.

  COMPLETION_TRANSITIONS:
    requirements:
      1: A completion may transition from absent to pending.
      2: A pending completion may transition to resolved, rejected, or cancelled.
      3: Resolved, rejected, and cancelled are terminal completion states.
      4: A terminal completion does not transition back to pending or to another terminal state.
      5: Competing completion terminal records use first-valid-terminal-wins authority.
      6: Later conflicting terminal records remain evidence and do not rewrite the terminal winner.

  RUN:
    requirements:
      1: "`durable.run` represents a durable unit of work."
      2: A run can start.
      3: A run can block on a completion by recording `blockedOnCompletionId`.
      4: A run can complete with durable result data.
      5: A run can fail with durable error data.
      6: A run can cancel with durable terminal reason data.
      7: Run state can be rebuilt from durable rows without a live runtime object.
      8: A rejected completion terminalizes a blocked run as failed in the minimal profile.
      9: A cancelled completion terminalizes a blocked run as cancelled by durable terminal state in the minimal profile.
      10: A blocked run must not remain permanently blocked after its awaited completion reaches any terminal state.

  RUN_TRANSITIONS:
    requirements:
      1: A run may transition from absent to started.
      2: A started run may transition to blocked, completed, failed, or cancelled.
      3: A blocked run may transition to completed, failed, or cancelled.
      4: Completed, failed, and cancelled are terminal run states.
      5: A terminal run does not transition back to started or blocked and does not transition to another terminal state.
      6: Competing run terminal records use first-valid-terminal-wins authority.
      7: Later conflicting terminal records remain evidence and do not rewrite the terminal winner.

constraints:
  NO_SEPARATE_CONTINUATION_ROW_YET:
    requirements:
      1: The first substrate model does not expose a separate continuation row.
      2: Continuation is implicit in run state until a real workflow checkpoint model proves a separate row is necessary.
      3: The first substrate model does not introduce both wait rows and completion rows for the same durable promise role.

  NO_WORKFLOW_SDK_PRIMARY_MODEL:
    requirements:
      1: The first substrate model does not expose a workflow orchestration SDK as the primary application model.
      2: Workflow engines may drive the substrate externally, but substrate progress is represented by durable records, completions, projections, claims, and handler execution.
      3: This feature owns completion and run state-machine behavior, not ready-work derivation or claim ownership.
