feature:
  name: semantic-producer
  product: durable-agent-substrate
  description: Define semantic substrate producer operations, not a runtime launcher, adapter handle, higher-level application client, or raw stream append API.

components:
  PRODUCER_ROLE:
    requirements:
      1: The producer exposes semantic substrate operations for declaring durable work and terminalizing durable completions.
      2: The producer returns durable identities and projection-relevant fields rather than live runtime handles.
      3: The producer does not require direct access to ACP, stdio, process, provider, sandbox, or tool transport handles.
      4: The producer does not imply that a runtime participant exists when it declares work.
      5: The producer exposes typed methods only when those methods are consumed or projected in the same implementation phase.
      6: The producer does not expose raw Durable Streams append or Durable Streams State envelope construction as the normal integration path.
      7: Slice 3 live wiring configuration is provided through the producer layer factory rather than as a separate exported configuration service.

  PRODUCER_EFFECT:
    requirements:
      1: Declaring durable work produces the `durable.run` state needed by the run projection.
      2: Resolving, rejecting, or cancelling an awakeable produces the `durable.completion` terminal state needed by the completion projection.
      3: Producer methods do not hide meaningful state transitions in process memory.
      4: Producer operations do not author derived projection rows such as ready work.
      5: Slice 3 producer methods are limited to declaring new work and terminalizing existing durable completions.
      6: Slice 3 does not expose `sleep`, `waitFor`, `scheduleWork`, public awakeable key construction, ready-work derivation, operator running, or claim authority.

  PACKAGE_BOUNDARY:
    requirements:
      1: Test-only helpers remain package-local and do not become product harness APIs.
      2: The substrate implementation starts as one package until real consumers force package boundaries.
      3: The substrate package does not present itself as a higher-level application or runtime client.
      4: Higher-level clients consume substrate semantic operations from their own packages.

constraints:
  NO_RUNTIME_STACK:
    requirements:
      1: This feature does not require a CLI.
      2: This feature does not require ACP, MCP, conductor, stdio, process launch, provider, sandbox, resource, or tool transport code.
      3: This feature does not require a custom StreamDB wrapper.
      4: This feature owns the semantic producer surface, not durable row schema details or Durable Streams State encoding mechanics.
