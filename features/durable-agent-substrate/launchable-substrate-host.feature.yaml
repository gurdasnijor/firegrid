feature:
  name: launchable-substrate-host
  product: durable-agent-substrate
  description: Define the launchable client, host process, and lab surfaces needed to run prototype durable agent runtimes without adding a host mutation control plane.

components:
  CLIENT_SURFACE:
    requirements:
      1: The substrate client is the normal application-facing writer surface for durable intents.
      2: The first substrate client surface is Effect-native.
      3: The client can declare durable work through existing substrate producer semantics.
      4: The client can create choreography intents through the choreography facade.
      5: The client can emit rows to registered event planes.
      6: The client exposes curated read handles for substrate and event-plane projections.
      7: The client root does not expose raw stream append, raw StreamDB collections, raw durable row builders, or raw Durable Streams State envelopes.
      8: Operator, testing, and diagnostic escape hatches live under explicit subpaths rather than the production root.
      9: Client read handles expose explicit snapshot, stream, and until operations so one-shot reads are distinct from live subscriptions.
      10: Client snapshot operations read the current no-gap materialized view once and do not mutate durable state.

  CLIENT_COMPATIBILITY:
    requirements:
      1: Non-Effect wrappers are deferred until a real external client call site requires them.
      2: Future non-Effect wrappers must be thin wrappers over the Effect-native client and must not fork durable semantics.
      3: Future non-Effect wrappers must not expose runtime suspension semantics until a real call site requires that presentation.
      4: The client service exposed inside host development helpers is the same capability as the standalone Effect-native client.

  HOST_PROCESS:
    requirements:
      1: The substrate host is a launchable process that starts or connects to a Durable Streams endpoint.
      2: The host runs configured substrate subscribers and operator programs from durable streams/state.
      3: The host can run timer and scheduled-work subscribers.
      4: The host can run projection-match subscriber profiles supplied by the runtime.
      5: The host can run claim-before-side-effect operator profiles.
      6: The host exposes read-only lifecycle status for local tooling.
      7: The host shuts down through Effect scopes and process-signal handling.

  HOST_CONFIGURATION:
    requirements:
      1: The host supports an embedded-dev boot plan that starts a local Durable Streams server.
      2: The host supports an attached boot plan that joins an existing Durable Streams endpoint.
      3: Host boot plans can be built from explicit options.
      4: Host boot plans can be decoded from Effect Config.
      5: Missing stream URL selects embedded-dev mode rather than requiring a remote service in local development.
      6: Configured stream URL selects attached mode and does not start or own the remote Durable Streams process.
      7: Process identity is generated by default; explicit process ids are advanced or test configuration.
      8: Authorization and token config materialize stream request headers without exposing secret values through durable rows.

  RUNTIME_COMPOSITION:
    requirements:
      1: Agent-runtime layers provide profile modules to the substrate host rather than adding host mutation endpoints.
      2: Runtime profiles can provide event-plane definitions, projection-match evaluators, operator programs, and provider or adapter layers.
      3: Runtime profile modules are ordinary Effect layers and values supplied in process.
      4: Serialized config may select known local profile modules but does not create a mutable global runtime registry.
      5: Development helpers can compose client and host layers in one Effect program without making that the production process boundary.
      6: withHost-style development helpers may provide the substrate client to the program they run.
      7: withHost-style development helpers do not create a distinct writer API from the standalone substrate client.

  SERVER_RUNTIME_API:
    requirements:
      1: Server-side durable behavior is authored with substrate runtime primitives such as Choreography, Projection, Work, EventPlane, subscribers, and operator helpers.
      2: Server-side runtime primitives remain in the substrate foundation and host profile layers rather than in the standalone client root.
      3: The launchable host runs server-side runtime primitives supplied by profiles; it does not require applications to call host mutation endpoints.

  LAB_INSPECTOR:
    requirements:
      1: The lab provides a developer inspector for raw streams, substrate projections, event-plane projections, ready work, and host status.
      2: The lab supports replay plus live-follow views for stream-shaped data.
      3: The lab can use Durable Streams registry-style discovery for stream lists.
      4: The lab renders structured JSON stream records and projected state in substrate-specific panels.
      5: The lab starts scenarios by calling the substrate client, not by calling host mutation endpoints.

  SCENARIOS:
    requirements:
      1: The first scenario proves sleep through client intent, host timer subscriber, ready work derivation, operator completion, and lab observation.
      2: A scheduled-work scenario proves scheduleAt creates future work intent without blocking the caller.
      3: A fake permission scenario proves a caller-owned event plane can drive waitFor through projection-match completion resolution without implementing ACP.
      4: A tool-call-shaped scenario proves event-plane observation plus claim-before-side-effect operator execution without making tool calls substrate-native.
      5: Scenarios are runnable from both command line and lab UI while using the same substrate client APIs.

  PACKAGING:
    requirements:
      1: The first launchable design introduces package boundaries for packages/client, packages/host, and packages/lab.
      2: The substrate package remains the foundation library and does not become the launchable process.
      3: The client package is the normal application dependency.
      4: The host package owns launchable process wiring.
      5: The lab package owns development inspection and scenario workbench UI.
      6: The host package exposes thin constructors for attached, attachedFromConfig, embeddedDev, bootPlanFromConfig, and withHost-style composition.
      7: The client package exposes an Effect-native root API.
      8: The host package exposes an Effect-native launch and composition API.

constraints:
  NO_CONTROL_PLANE:
    requirements:
      1: The host does not expose application mutation endpoints such as start-work, resolve-permission, or run-scenario.
      2: Application and lab writes go through the substrate client durable intent surface.
      3: Read-only host diagnostics do not mutate durable streams/state.
      4: The lab does not depend on hidden host writer APIs for scenario execution.

  AUTHORITY_BOUNDARY:
    requirements:
      1: Durable Streams and Durable State remain the source of truth.
      2: The host does not become a second authority for runs, completions, claims, or event-plane rows.
      3: Event-plane projections do not replace substrate claim authority or completion authority.
      4: The launchable layer does not introduce new substrate-native row families for Fireline, Firepixel, ACP, MCP, sessions, prompts, providers, sandboxes, or process transports.

  PRIOR_ART:
    requirements:
      1: Durable Streams test UI is prior art for registry discovery, live follow, catchup, JSON rendering, and stream inspection.
      2: Durable Streams test UI is not prior art for substrate command endpoints.
      3: Fireline client is prior art for a narrow app-facing client with curated reads and explicit operator/testing subpaths.
      4: Restate is prior art for separating a server-side runtime SDK, a standalone client SDK, and a launchable runtime or server.
      5: Restate is not prior art for making the substrate host a central mutable ingress API.
