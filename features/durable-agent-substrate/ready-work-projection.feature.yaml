feature:
  name: ready-work-projection
  product: durable-agent-substrate
  description: "Define the first ready-work projection: resolved completions make blocked runs ready."

components:
  SOURCE_PROJECTIONS:
    requirements:
      1: "`CompletionProjection` is derived from `durable.completion` rows keyed by `completionId`."
      2: "`RunProjection` is derived from `durable.run` rows keyed by `runId`."
      3: The ready-work derivation reads rebuilt projections rather than live in-memory wait state.

  READY_WORK_PROJECTION:
    requirements:
      1: "`ReadyWorkProjection` is a derived view, not a producer-authored row."
      2: A run is ready-derived when the run state is blocked, the run has `blockedOnCompletionId`, and the referenced completion is resolved.
      3: A rejected completion does not derive normal ready work in the minimal profile.
      4: A cancelled completion does not derive normal ready work in the minimal profile.
      5: A completed or failed run does not derive ready work.
      6: Ready-work derivation is deterministic over rebuilt projection state.
      7: Ready-work items expose `runId`, `completionId`, and the resolved completion `result`.
      8: Ready-work projection items are keyed by `runId`.
      9: Ready-work derivation is exposed as a pure function over rebuilt projection state.
      10: Ready-work projection carries the source projection `foldVersion`.

constraints:
  FIRST_PHASE_LIMITS:
    requirements:
      1: This feature does not require an operator package before the projection contract is proven.
      2: This feature does not require real agents, ACP, CLI, process launch, provider lifecycle, or tool transport.
      3: Test-local proof code names the real concept `ReadyWorkProjection` and does not become a shadow runtime API.
      4: This feature owns ready-work derivation, not completion state-machine definitions, run state-machine definitions, claim authority, or operator invocation.
      5: Claim attempts, claim winners, handler invocation, and terminal owner authority are owned by `claim-and-operator-authority`.
