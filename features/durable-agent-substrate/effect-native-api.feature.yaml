feature:
  name: effect-native-api
  product: durable-agent-substrate
  description: Define the substrate public API as Effect schemas, services, layers, and scoped operator programs rather than a framework registry.

components:
  SCHEMA_FIRST:
    requirements:
      1: Public substrate input, output, row, and projection contracts are defined with Effect Schema.
      2: Effect Schema is the source of truth for runtime validation and TypeScript types.
      3: Standard Schema V1 exports are generated from dependency-free Effect schemas for interop only.
      4: Projection types use Effect Schema for row decoding, projection validation, and test data generation.
      5: API input shapes such as durable triggers compile to durable row variants and are not separate foundational row families.
      6: Optional observability rows such as `durable.trace` are defined with Effect Schema but are not part of the authority schema set.

  EFFECT_SERVICES:
    requirements:
      1: Slice 3 exposes work declaration and durable completion terminalization as Effect services.
      2: Service methods expose semantic substrate operations rather than raw Durable Streams append or envelope helpers.
      3: Service live layers may depend on Durable Streams, Durable Streams State, clocks, id generation, and projection internals without leaking those dependencies into method signatures.
      4: Durable wait APIs such as `sleep`, `waitFor`, `scheduleWork`, and public awakeables are owned by `durable-waits-and-scheduling`, not by the Slice 3 producer service.
      5: Operator running is owned by `claim-and-operator-authority`, not by the Slice 3 producer service.

  OPERATOR_PROGRAMS:
    requirements:
      1: A durable operator is a scoped Effect program that consumes one semantic work type and invokes a provided handler after durable ownership is won.
      2: Handler functions are ordinary Effect functions with explicit dependency requirements.
      3: Operator programs decode input with the provided Effect Schema and encode output with the provided Effect Schema.
      4: Handler success/failure terminalization semantics are owned by `claim-and-operator-authority`.
      5: Multiple operator programs are composed with ordinary Effect composition such as `Effect.all`, `Layer.launch`, or managed runtimes.
      6: The public Effect API shape must not require handlers to receive raw stream records, raw Durable Streams State events, or mutable projection internals.
      7: The canonical handler authoring style is an ordinary Effect function whose success value or expected failure is interpreted by the operator runner.
      8: Duplicate terminal authority rules are owned by `awakeables-and-runs` for run/completion state and by `claim-and-operator-authority` for owner gating.
      9: The canonical operator surface is not a polling API.

constraints:
  NO_FRAMEWORK_REGISTRY:
    requirements:
      1: The canonical API does not use a top-level `DurableService.define` registry.
      2: The canonical API does not require `DurableWorker.make` values as the main authoring pattern.
      3: Handlers do not receive a fat mutable context object for normal substrate operations.
      4: Handlers access durable behavior by yielding Effect services.
      5: This feature owns public API shape and Effect integration, not durable state-machine semantics or projection derivation rules.
