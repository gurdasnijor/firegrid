# firegrid-remediation-hardening.STATIC_QUALITY.7
rules:
  - id: firegrid-no-process-env-outside-bin
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.10
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: configuration-boundary
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
        - "/packages/*/src/bin/**"
    message: |
      process.env reads belong at the binary entry boundary, scripts, or tests.
      In application code use Effect Config or accept configuration as an
      explicit parameter.
    pattern-either:
      - pattern: process.env.$ANY
      - pattern: process.env[$ANY]
      - pattern: globalThis.process.env.$ANY
      - pattern: globalThis.process.env[$ANY]

  - id: firegrid-no-date-now
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-correctness
      rationale: |
        Date.now() is non-deterministic and not replay-safe. Inside Effect code,
        workflow handlers, and durable-row construction, use Clock.currentTimeMillis
        or accept a timestamp from the caller's Effect scope.
      fix-hint: |
        yield* Clock.currentTimeMillis
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
        - "/packages/*/src/bin/**"
        - "/apps/*/src/bin/**"
    message: |
      Date.now() is not replay-safe. Use Clock.currentTimeMillis inside Effect
      code or accept a timestamp resolved by the caller's Effect scope.
    pattern: Date.now()

  - id: firegrid-no-new-date-iso-in-library
    languages: [typescript]
    severity: WARNING
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-correctness
      rationale: |
        new Date().toISOString() bypasses Clock and can introduce
        non-determinism in durable rows or workflow-observable values.
      fix-hint: |
        Clock.currentTimeMillis.pipe(Effect.map(ms => new Date(ms).toISOString()))
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/__tests__/**"
        - "/packages/*/src/bin/**"
    message: |
      new Date().toISOString() is not replay-safe in library code. Use
      Clock.currentTimeMillis or accept a pre-resolved timestamp parameter.
    pattern: new Date().toISOString()

  - id: firegrid-no-effect-run-in-library
    languages: [typescript]
    severity: WARNING
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-correctness
      rationale: |
        Effect.runPromise / Effect.runSync / Effect.runFork inside library code
        starts a detached fiber that does not inherit the calling fiber's scope,
        context, or supervisor. When bridging callback-shaped APIs, capture the
        runtime once via Effect.runtime and use Runtime.runPromise(runtime).
      fix-hint: |
        const runtime = yield* Effect.runtime<never>()
        const runPromise = Runtime.runPromise(runtime)
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
        - "/packages/*/src/bin/**"
        - "/apps/*/src/bin/**"
    message: |
      Effect.runPromise/runSync/runFork inside library code starts a detached
      fiber. Use Runtime.runPromise(yield* Effect.runtime<never>()) to bridge
      callback APIs while preserving fiber context.
    pattern-either:
      - pattern: Effect.runPromise(...)
      - pattern: Effect.runSync(...)
      - pattern: Effect.runFork(...)
      - pattern: Effect.runPromiseExit(...)
      - pattern: Effect.runSyncExit(...)

  - id: firegrid-no-manual-tagged-error-type
    languages: [typescript]
    severity: WARNING
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-idioms
      rationale: |
        Manual tagged-error type aliases and interfaces reimplement
        Data.TaggedError and Schema.TaggedError without yieldable errors,
        instanceof support, Effect.catchTag narrowing, or Schema encoders.
      fix-hint: |
        class Foo extends Data.TaggedError("Foo")<{ ... }> {}
        class Foo extends Schema.TaggedError<Foo>()("Foo", { ... }) {}
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
    message: |
      Tagged error declared as a type alias or interface. Use
      Data.TaggedError or Schema.TaggedError instead.
    pattern-regex: '\b(type|interface)\s+[A-Za-z0-9_]+\s*=?\s*\{[^}]*readonly\s+_tag\s*:\s*["''][A-Za-z0-9_.:-]+["'']'

  - id: firegrid-no-inline-tagged-error-fail
    languages: [typescript]
    severity: WARNING
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-idioms
      rationale: |
        Inline tagged-error objects duplicate tag strings across call sites and
        can drift from canonical Data.TaggedError or Schema.TaggedError classes.
      fix-hint: |
        yield* new MyError({ ... })
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
    message: |
      Inline tagged-error object passed to Effect.fail. Use a Data.TaggedError
      or Schema.TaggedError class instead.
    pattern: 'Effect.fail({ _tag: "...", ... })'

  - id: firegrid-prefer-match-tag-over-switch
    languages: [typescript]
    severity: WARNING
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-idioms
      rationale: |
        switch (x._tag) does not enforce exhaustiveness without manual never
        checks. Match.value(x).pipe(Match.tag(...), Match.exhaustive) does.
      fix-hint: |
        Match.value(event).pipe(
          Match.tag("A", handleA),
          Match.exhaustive,
        )
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
    message: |
      Switching on _tag reimplements Match.tag. Use Match.value().pipe(
      Match.tag(...), Match.exhaustive) for compile-time exhaustiveness.
    pattern-regex: '\bswitch\s*\([^)]*\._tag\s*\)'

  - id: firegrid-no-promise-chain-in-effect-code
    languages: [typescript]
    severity: WARNING
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-idioms
      rationale: |
        Promise chains inside library code usually reimplement Effect.tryPromise
        and Effect.matchEffect, and keep running outside the surrounding Effect
        scope.
      fix-hint: |
        Effect.tryPromise({ try: () => somePromise(), catch: cause => ... })
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
        - "/packages/*/src/bin/**"
        - "/apps/*/src/bin/**"
        - "**/*.d.ts"
    message: |
      Promise-chain .then/.catch inside library code. Use Effect.tryPromise
      for the boundary and Effect.matchEffect / Effect.flatMap / Effect.catchAll
      for result handling.
    patterns:
      - pattern-not-inside: |
          Effect.sync(() => {
            ...
          })
      - pattern-either:
          - pattern: $PROMISE.then(...).catch(...)
          - pattern: $PROMISE.catch(...).then(...)

  - id: firegrid-tryPromise-single-await
    languages: [typescript]
    severity: WARNING
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-idioms
      rationale: |
        Multiple awaits inside one Effect.tryPromise body collapse distinct
        failures into one catch block and weaken error attribution.
      fix-hint: |
        Split into one Effect.tryPromise per Promise and compose with Effect.gen.
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
    message: |
      Effect.tryPromise body contains multiple awaits. Split into one
      tryPromise per Promise so errors are attributed to the right operation.
    pattern: |
      Effect.tryPromise({
        try: async () => {
          await $A
          ...
          await $B
          ...
        },
        ...
      })

  - id: firegrid-no-inline-stream-url-construction
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: schema-authority
      rationale: |
        Authority-bearing stream names and URLs must be encoded from the
        canonical schema that owns the authority instead of reconstructed with
        inline strings at call sites.
      fix-hint: |
        Encode host/context stream authority through schema transforms or table
        layer constructors.
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
        - "/packages/*/src/runtime-host/internal/**"
        - "/packages/*/src/host-context-authority/**"
        - "/packages/runtime/src/agent-tools/mcp-host.ts"
        - "/packages/*/src/**/schema.ts"
        - "/packages/*/src/**/table.ts"
        - "/packages/runtime/src/workflow-engine/internal/table.ts"
    message: |
      Inline durable stream URL or namespace construction. Authority-bearing
      strings must come from schema/table encoders, not call-site strings.
    pattern-either:
      - pattern-regex: '\$\{[^}]+\}\.firegrid\.host\.\$\{[^}]+\}\.(runtime|runtimeIngress|runtimeOutput|workflow|durableTools|verifiedWebhook|agentTools)'
      - pattern-regex: '\$\{[^}]+\}\.firegrid\.(runtime|workflow|runtimeIngress|runtimeOutput|durableTools|verifiedWebhook|agentTools)'
      - pattern-regex: '"firegrid\.(runtime|workflow|runtimeIngress|runtimeOutput|durableTools|verifiedWebhook|agentTools)"'

  - id: firegrid-no-filesystem-in-runtime-package
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: runtime-authority
      rationale: |
        The runtime package must not persist authority or operational state on
        the host filesystem. Runtime state belongs in durable streams, and host
        identity must come from explicit host composition/configuration.
      fix-hint: |
        Remove filesystem access from packages/runtime/src. Pass explicit
        configuration at the host boundary, or persist durable state through
        Durable Streams.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/packages/runtime/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
        - "/packages/runtime/src/bin/**"
    message: |
      packages/runtime source must not use the local filesystem. Host identity
      and runtime state must be explicit config or Durable Streams state, never
      files under $HOME/tmp/etc.
    pattern-either:
      - pattern-regex: 'from\s+["''](?:node:fs|node:fs/promises|fs|fs/promises)["'']'
      - pattern-regex: 'from\s+["''](?:node:os|node:path|path)["'']'
      - pattern-regex: 'import\s*\{[^}]*\bFileSystem\b[^}]*\}\s*from\s+["'']@effect/platform["'']'
      - pattern-regex: 'import\s*\{[^}]*\b(?:FileSystem|NodeFileSystem)\b[^}]*\}\s*from\s+["'']@effect/platform-node["'']'
      - pattern: require("node:fs")
      - pattern: require("node:fs/promises")
      - pattern: require("fs")
      - pattern: require("fs/promises")
      - pattern: FileSystem.FileSystem
      - pattern: NodeFileSystem.layer

  - id: firegrid-no-host-id-env-authority
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: runtime-authority
      rationale: |
        Host identity is durable runtime authority, not deployment environment
        configuration. Adding FIREGRID_HOST_ID or app-side VITE_FIREGRID_HOST_ID
        recreates implicit authority outside the host/context authority model.
      fix-hint: |
        Do not add host-id env knobs. Keep host identity explicit at the
        authority/composition boundary until the durable host/session authority
        primitive lands.
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Host identity must not be sourced from FIREGRID_HOST_ID/VITE_FIREGRID_HOST_ID
      environment config. Model host authority explicitly instead of adding an
      env knob.
    pattern-either:
      - pattern: Config.string("FIREGRID_HOST_ID")
      - pattern: Config.option(Config.string("FIREGRID_HOST_ID"))
      - pattern: process.env.FIREGRID_HOST_ID
      - pattern: process.env["FIREGRID_HOST_ID"]
      - pattern: globalThis.process.env.FIREGRID_HOST_ID
      - pattern: globalThis.process.env["FIREGRID_HOST_ID"]
      - pattern: import.meta.env.VITE_FIREGRID_HOST_ID
      - pattern: import.meta.env["VITE_FIREGRID_HOST_ID"]

  - id: firegrid-runtime-context-workflow-requires-local-authority
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: host-context-authority
      rationale: |
        RuntimeContextWorkflow execution is local host authority. Direct
        WorkflowEngine.execute bypasses RuntimeContext.host ownership checks.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/apps/*/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Direct RuntimeContextWorkflow execution bypasses local context authority.
      Resolve through requireLocalContext before executing local host services.
    pattern: $ENGINE.execute(RuntimeContextWorkflow, ...)

  - id: firegrid-no-unclassified-workflow-make
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-workflow-driven-runtime.WORKFLOW_ADMISSION.1
      quality-acid: firegrid-workflow-driven-runtime.WORKFLOW_ADMISSION.2
      # tf-zchu: this rule is the executable C2 guard for
      # docs/cannon/architecture/runtime-design-constraints.md ("Handlers Are
      # State/Event Reducers, Not Long-Lived Bodies"). Failing CI on ALL new
      # production Workflow.make definitions is strictly stronger than C2's
      # "operation-shaped long-lived loops or multi-wait parking" sub-case: a new
      # context-lifetime loop or cross-event parked body cannot appear without a
      # new Workflow.make. Existing owner workflows are baselined in
      # semgrep-error-baseline.json.
      cannon: docs/cannon/architecture/runtime-design-constraints.md
      constraint: C2
      category: workflow-architecture
      rationale: |
        Production workflow identities are reserved for owned durable resources
        or long-running process state machines. One-shot commands, lifecycle
        requests, tool calls, waits, and routing bridges should lower through
        the owning workflow's channel/table seam or an explicitly named engine
        primitive instead of minting another Workflow.make definition.
      fix-hint: |
        Do not add a new Workflow.make wrapper for an operation. Route through
        the owning workflow state machine, or update the SDD and the static
        inventory if this is a true durable owner workflow.
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      New production Workflow.make definitions require explicit owner/resource
      justification. Operation-shaped workflows are migration debt, not a
      default abstraction.
    pattern: Workflow.make(...)

  - id: firegrid-no-replay-path-output-scan
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-workflow-driven-runtime.WORKFLOW_ADMISSION.1
      category: workflow-architecture
      rationale: |
        tf-7kq8: a workflow body runs top-to-bottom on every @effect/workflow
        replay. A live, unbounded table read on that path
        (RuntimeAgentOutputAfterEvents.initial/.after, a DurableTable `.query`,
        or a `coll.toArray`/reduce-over-rows full materialization) is re-executed
        on every resume while the in-memory cursor resets, so cost scales with
        replays * history instead of distinct outputs — the agent_output.initial
        re-read storm that hung live ACP turns. Output observation inside the
        replay boundary must use the workflow-owned durable cursor
        (SDD_DURABLE_OUTPUT_CURSOR_PRIMITIVE, INV-2 "no replay re-walk"), not a
        host-owned scan.
      fix-hint: |
        Do not scan tables from a workflow body. Read the next output through
        the durable cursor primitive (cursor.next(), reconstructed by one point
        lookup on replay), or move the read into a named, memoized Activity.
        If a use is genuinely replay-safe, add it to semgrep-error-baseline.json
        with an explicit justification rather than widening this rule.
    paths:
      include:
        - "/packages/*/src/workflow-engine/workflows/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Live table scan on the workflow replay path. A workflow body re-runs on
      every replay; a full table read here (output-after read, DurableTable
      query, or coll.toArray/reduce over rows) re-scans history per resume
      (tf-7kq8 storm). Use the durable output cursor or a memoized Activity.
    pattern-either:
      - pattern: yield* RuntimeAgentOutputAfterEvents
      - pattern: $COLL.toArray
      - pattern: $TABLE.query(...)

  - id: firegrid-runtime-owned-table-writes-use-authorities
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.1
      quality-acid: firegrid-runtime-agent-event-pipeline.ENFORCEMENT.2
      category: runtime-authority
      rationale: |
        Runtime-owned DurableTable writes must route through the authority
        module for that table family so durable commits have one owner.
      fix-hint: |
        Use the split durable capability tags and provider layers, such as
        RuntimeEventAppendAndGet, RuntimeIngressAppendAndGet,
        RuntimeIngressDeliveryClaimAndComplete, RuntimeContextInsert,
        RuntimeRunAppendAndGet, DurableWaitAppendAndGet, or
        DurableWaitCompletionAppendAndGet.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/packages/runtime/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
        - "/packages/runtime/src/authorities/**"
        - "/packages/runtime/src/agent-event-pipeline/authorities/**"
        - "/packages/runtime/src/channels/**"
        - "/packages/runtime/src/control-plane/**"
        - "/packages/runtime/src/durable-tools/internal/durable-wait-store.ts"
    message: |
      Runtime-owned DurableTable writes must go through the owning runtime
      authority module.
    pattern-regex: '\.(contexts|runs|events|logs|inputs|deliveries|waits|completions)\.(insert|insertOrGet|upsert|delete)\s*\('

  - id: firegrid-runtime-subscribers-transforms-no-table-facades
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.ENFORCEMENT.4
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: runtime-authority
      rationale: |
        Runtime subscribers and transforms should consume read surfaces and
        authority command APIs. Accepting runtime table facades lets them become
        hidden durable read/write owners.
      fix-hint: |
        Pass SourceCollectionHandle read surfaces plus narrow authority command
        functions from host/pipeline composition.
    paths:
      include:
        - "/packages/runtime/src/agent-event-pipeline/subscribers/**/*.ts"
        - "/packages/runtime/src/agent-event-pipeline/transforms/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Subscribers and transforms must not accept runtime-owned DurableTable
      facades. Use read/observation handles plus authority APIs.
    pattern-regex: 'Runtime(?:ControlPlane|Output|Ingress)Table\[["'']Type["'']\]'

  - id: firegrid-runtime-no-exported-authority-singletons
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.10
      quality-acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.12
      category: runtime-authority
      rationale: |
        Runtime authority modules expose split Effect Context.Tag capability
        services. Exported module-singleton authority classes/objects recreate the
        old bundled service surface and invite static command calls.
      fix-hint: |
        Export the split Context.Tag capabilities and their Layer provider. Keep
        table helpers private to the provider module.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Runtime authority module-singleton class/object exported. Expose split Effect
      Context.Tag capabilities and provider Layers instead.
    pattern-regex: '\bexport\s+(?:class\s+(?:RuntimeOutputJournal|RuntimeIngressAppender|RuntimeIngressDeliveryTracker|RuntimeControlPlaneRecorder|DurableWaitStore|Runtime[A-Za-z0-9_]*Authority)\b|const\s+(?:RuntimeOutputJournal|RuntimeIngressAppender|RuntimeIngressDeliveryTracker|RuntimeControlPlaneRecorder|DurableWaitStore)\s*=)'

  - id: firegrid-runtime-no-custom-authority-wrapper-types
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.10
      quality-acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.11
      category: runtime-authority
      rationale: |
        Firegrid-specific RuntimeAuthority/RuntimeAuthorityCommand wrappers
        duplicate existing Effect surfaces. Use Context.Tag services, Effect,
        Stream, Sink, Queue.Enqueue, and SourceCollectionHandle directly.
      fix-hint: |
        Replace RuntimeAuthority* wrappers with split Context.Tag services and
        stock Effect capability types.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Custom RuntimeAuthority wrapper type. Use stock Effect capability
      surfaces directly.
    pattern-regex: '\bRuntimeAuthority(?:Command|Read|Sink)?\b'

  - id: firegrid-runtime-no-authority-static-helper-calls
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.11
      quality-acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.12
      category: runtime-authority
      rationale: |
        Production runtime code should depend on Effect capability tags through
        the requirement channel. Static table-taking helpers and .sources(table)
        calls bypass the capability surface.
      fix-hint: |
        Yield the split Context.Tag service, Stream, Sink, Queue.Enqueue, or
        narrow Effect capability. For wait_for registration, construct handles
        from the provided Stream capability value.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Static runtime authority helper call. Use the split Effect capability tag
      or a SourceCollectionHandle derived from a Stream capability.
    pattern-regex: '\b(?:RuntimeOutputJournal|RuntimeIngressAppender|RuntimeIngressDeliveryTracker|RuntimeControlPlaneRecorder|DurableWaitStore)\.(?:sources|[A-Za-z0-9_]*(?:To|In|FromTable))\s*\('

  - id: firegrid-runtime-no-singleton-authority-specifiers
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.10
      quality-acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.12
      category: runtime-authority
      rationale: |
        Barrel import/export specifiers for old singleton authority names keep
        the bundled service surface reachable even after implementation callers
        move to split Effect capability tags.
      fix-hint: |
        Export/import the split capability tags and provider layers instead.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Old singleton runtime authority name appears in an import/export surface.
      Use split Effect capability tags instead.
    pattern-regex: '\b(?:import|export)(?:\s+type)?\s*(?:\{[^}]*\b(?:RuntimeOutputJournal|RuntimeIngressAppender|RuntimeIngressDeliveryTracker|RuntimeControlPlaneRecorder|DurableWaitStore)\b[^}]*\}|(?:RuntimeOutputJournal|RuntimeIngressAppender|RuntimeIngressDeliveryTracker|RuntimeControlPlaneRecorder|DurableWaitStore)\b|\*\s+as\s+(?:RuntimeOutputJournal|RuntimeIngressAppender|RuntimeIngressDeliveryTracker|RuntimeControlPlaneRecorder|DurableWaitStore)\b)'

  - id: firegrid-runtime-no-second-durable-capability-provider
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.1
      quality-acid: firegrid-runtime-agent-event-pipeline.ENFORCEMENT.2
      category: runtime-authority
      rationale: |
        Durable capability tags must have one production provider in their
        owning authority module. Layer.succeed/effect elsewhere creates a hidden
        second writer/reader authority.
      fix-hint: |
        Move the provider to packages/runtime/src/authorities/** or packages/runtime/src/agent-event-pipeline/authorities/** or compose the
        existing authority provider layer.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
        - "/packages/runtime/src/authorities/**"
        - "/packages/runtime/src/agent-event-pipeline/authorities/**"
        - "/packages/runtime/src/channels/**"
        - "/packages/runtime/src/control-plane/**"
    message: |
      Durable capability tag provided outside its authority module. Use the
      owning provider layer instead.
    pattern-regex: 'Layer\.(?:succeed|effect)\s*\(\s*(?:RuntimeEventAppendAndGet|RuntimeAgentOutputSink|RuntimeOutputEvents|RuntimeAgentOutputEvents|RuntimeLogLineAppendAndGet|RuntimeLogLineSink|RuntimeOutputLogs|RuntimeIngressAppendAndGet|RuntimeIngressInputStream|RuntimeIngressDeliveryClaimAndComplete|RuntimeContextInsert|RuntimeContextRead|RuntimeRunAppendAndGet)\b'

  - id: firegrid-runtime-no-source-collection-handle-in-static-subscriber-contract
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.8
      quality-acid: firegrid-runtime-agent-event-pipeline.ENFORCEMENT.3
      category: runtime-authority
      rationale: |
        Static subscribers/transforms consume Stream capability tags. A
        SourceCollectionHandle crosses a dynamic wait_for lookup boundary and
        should not be part of static subscriber/transform contracts.
      fix-hint: |
        Use a Stream capability tag in the Effect requirement channel, or a
        Stream parameter for pure transform code.
    paths:
      include:
        - "/packages/runtime/src/agent-event-pipeline/subscribers/**/*.ts"
        - "/packages/runtime/src/agent-event-pipeline/transforms/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      SourceCollectionHandle in static subscriber/transform contract. Use a
      Stream capability tag instead.
    pattern-regex: '\bSourceCollectionHandle\b'

  - id: firegrid-runtime-no-table-service-yield-outside-providers
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.11
      quality-acid: firegrid-runtime-agent-event-pipeline.ENFORCEMENT.7
      category: runtime-authority
      rationale: |
        Runtime code that yields DurableTable services outside provider/host
        composition bypasses the authority capability tags and can become a
        hidden read/write owner.
      fix-hint: |
        Yield the owning Effect capability tag, or keep table service access in
        authority providers and explicit host composition wiring.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
        - "/packages/runtime/src/authorities/**"
        - "/packages/runtime/src/agent-event-pipeline/authorities/**"
        - "/packages/runtime/src/channels/**"
        - "/packages/runtime/src/control-plane/**"
        - "/packages/runtime/src/kernel/**"
        - "/packages/runtime/src/host/index.ts"
        - "/packages/runtime/src/host/observation-sources.ts"
        - "/packages/runtime/src/agent-tools/mcp-host.ts"
        - "/packages/runtime/src/durable-tools/DurableToolsWaitFor.ts"
        - "/packages/runtime/src/durable-tools/internal/table.ts"
        # tf-aseo: workflow-owned durable loop-state provider. Like the
        # per-context output authority, it is provider internals — it owns the
        # RuntimeContextStateStore capability and reads outputs by O(1) point
        # `get` (no scan), never handing a table handle to the workflow body.
        # Wave A Shape C cutover physically moved this provider from
        # `workflow-engine/` to the semantic `tables/` folder; the allowlist
        # follows the file.
        - "/packages/runtime/src/tables/runtime-context-state.ts"
    message: |
      Runtime-owned DurableTable service yielded outside provider internals or
      explicit host composition.
    pattern-regex: 'yield\*\s+(?:RuntimeOutputTable|RuntimeIngressTable|RuntimeControlPlaneTable|DurableToolsTable)\b'

  - id: firegrid-runtime-no-authority-registry-surface
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.14
      quality-acid: firegrid-runtime-agent-event-pipeline.ENFORCEMENT.7
      category: runtime-authority
      rationale: |
        AuthorityRegistry production files/imports/exports expose review-only
        metadata as runtime API surface. Provider uniqueness should be verified
        by tests/docs or actual Effect tag/layer values.
      fix-hint: |
        Keep authority registry metadata out of packages/runtime/src production
        exports, or move it to tests/review tooling.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      AuthorityRegistry production surface detected. Keep registry metadata
      review/test-only unless production behavior requires it.
    pattern-regex: '(?:packages/runtime/src/authorities/registry\.ts|["''][^"'']*registry(?:\.ts)?["'']|\b[A-Za-z0-9_]*Authority[A-Za-z0-9_]*Registry[A-Za-z0-9_]*\b)'

  - id: firegrid-runtime-host-no-direct-source-collection-registration
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-typed-wait-source-redesign.MIGRATION.4
      quality-acid: firegrid-typed-wait-source-redesign.REJECTION.1
      category: runtime-boundary
      rationale: |
        The stringly SourceCollections / sourceCollectionStreamHandle /
        registerRuntimeHostAppSource wait-source registry is a rejected
        design and is deleted. Runtime waits select a typed RuntimeWaitSource
        variant resolved from concrete Stream capability tags
        (RuntimeWaitStreams) through the Effect requirement channel.
      fix-hint: |
        Use a typed RuntimeWaitSource variant on WaitFor.match; add a
        RuntimeWaitStreams field and a router Match arm for new runtime
        observations. App-owned facts use app-local projection waits, not a
        runtime source-name registry.
    paths:
      include:
        - "/packages/**/src/**/*.ts"
        - "/packages/**/src/**/*.tsx"
        - "/apps/**/src/**/*.ts"
        - "/apps/**/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Production code must not use SourceCollections /
      sourceCollectionStreamHandle / registerRuntimeHostAppSource. The
      runtime wait-source registry is removed; select a typed
      RuntimeWaitSource resolved from RuntimeWaitStreams
      (firegrid-typed-wait-source-redesign).
    pattern-either:
      - pattern-regex: 'import\s*\{[^}]*\b(?:SourceCollections|sourceCollectionStreamHandle)\b[^}]*\}\s*from'
      - pattern: yield* SourceCollections
      - pattern: sourceCollectionStreamHandle(...)
      - pattern-regex: '\bregisterRuntimeHostAppSource\b'
      - pattern: sourceCollectionStreamHandle(...)

  - id: firegrid-runtime-no-host-internal-imports-outside-host
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-boundary-reconciliation.PUBLIC_SURFACE.4
      quality-acid: firegrid-runtime-boundary-reconciliation.PUBLIC_SURFACE.6
      category: runtime-boundary
      rationale: |
        Runtime host internals are composition implementation details. Runtime
        production code outside host should import the host barrel or package
        public runtime-host subpath so load-bearing surfaces remain explicit.
      fix-hint: |
        Import from packages/runtime/src/host/index.ts, @firegrid/runtime, or
        @firegrid/runtime/runtime-host instead of a host implementation file.
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/apps/*/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
        - "/packages/runtime/src/host/**"
    message: |
      Direct import from a runtime host implementation file. Use the host barrel
      or public runtime-host package subpath.
    pattern-regex: '(?m)^\s*(?:import|export)(?:\s+type)?[^\n]*\sfrom\s*["''][^"'']*(?:^|/|\.{1,2}/)host/(?:agent-tool-host-live|commands|config|config-live|host-owned-durable-tools|internal/[^"'']*|layers|raw-process-runtime|runtime-context-workflow|runtime-substrate|sync-run|types)(?:\.ts)?["'']'

  - id: firegrid-runtime-no-runtime-errors-imports-outside-runtime
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-boundary-reconciliation.CYCLE_BREAKING.2
      quality-acid: firegrid-runtime-boundary-reconciliation.PUBLIC_SURFACE.4
      category: runtime-boundary
      rationale: |
        runtime-errors.ts is a runtime-internal module used to break host cycles.
        External packages should consume public @firegrid/runtime exports instead
        of importing the source file.
      fix-hint: |
        Import RuntimeContextError or public error exports from @firegrid/runtime
        when they are intended API, or keep the usage inside packages/runtime/src.
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/apps/*/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
        - "/packages/runtime/src/**"
    message: |
      runtime-errors.ts is runtime-internal. External packages must use public
      @firegrid/runtime exports.
    pattern-regex: '(?m)^\s*(?:import|export)(?:\s+type)?[^\n]*\sfrom\s*["''](?:[^"'']*/runtime-errors(?:\.ts)?|packages/runtime/src/runtime-errors(?:\.ts)?|@firegrid/runtime/[^"'']*runtime-errors(?:\.ts)?)["'']'

  - id: firegrid-runtime-no-old-singleton-authority-tag-keys
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.10
      quality-acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.12
      category: runtime-authority
      rationale: |
        Old singleton Context.Tag keys recreate the pre-cutover authority service
        identity. New code should declare split capability tags only.
      fix-hint: |
        Replace old singleton tag keys with split capability tags such as
        RuntimeEventAppendAndGet, RuntimeIngressInputStream, or RuntimeContextRead.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Old singleton runtime authority Context.Tag key. Use split capability tags.
    pattern-regex: 'Context\.Tag\s*\(\s*["'']@firegrid/runtime/(?:RuntimeOutputJournal|RuntimeIngressAppender|RuntimeIngressDeliveryTracker|RuntimeControlPlaneRecorder|DurableWaitStore)["'']\s*\)'

  - id: firegrid-runtime-no-table-type-parameters-outside-authorities
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.ENFORCEMENT.7
      quality-acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.11
      category: runtime-authority
      rationale: |
        Production runtime components that accept runtime-owned DurableTable
        services can become hidden read/write owners. Table services should stay
        inside the authority/provider internals that define capability tags.
      fix-hint: |
        Accept Stream/Sink/Queue.Enqueue/narrow Effect capability tags in the
        Effect requirement channel, or keep the table parameter private to the
        authority provider module.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
        - "/packages/runtime/src/authorities/**"
        - "/packages/runtime/src/agent-event-pipeline/authorities/**"
        - "/packages/runtime/src/channels/**"
        - "/packages/runtime/src/control-plane/**"
        - "/packages/runtime/src/durable-tools/internal/durable-wait-store.ts"
        - "/packages/runtime/src/durable-tools/internal/table.ts"
        # tf-aseo + #692 Wave A: workflow-owned durable loop-state provider
        # was physically moved from `workflow-engine/runtime-context-state.ts`
        # into the semantic `tables/` folder during the Shape C cutover.
        # The broader `tables/**` exclusion below covers the moved file and
        # any future runtime-owned DurableTable authority modules — under
        # the new tree, tables/ is the canonical authority location (the
        # original rule intent "outside authorities" was tied to the legacy
        # authorities/ path; tables/ now plays that role per #689 +
        # docs/architecture/2026-05-22-runtime-physical-target-tree.md).
        - "/packages/runtime/src/tables/**"
    message: |
      Runtime production component accepts a runtime-owned DurableTable service.
      Use Effect capability tags instead.
    pattern-regex: '(?:Runtime(?:ControlPlane|Output|Ingress)Table|DurableToolsTable)\[["'']Type["'']\]'

  - id: firegrid-runtime-no-exported-authority-registry-api
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-runtime-agent-event-pipeline.AUTHORITIES.14
      quality-acid: firegrid-runtime-agent-event-pipeline.ENFORCEMENT.7
      category: runtime-authority
      rationale: |
        The runtime authority provider map is review/test metadata unless
        production behavior requires dynamic lookup. Exporting RuntimeAuthority
        registry APIs from production reintroduces a parallel registry surface.
      fix-hint: |
        Keep registry metadata in tests/review docs, or make production use the
        actual Effect Context.Tag/Layer graph directly.
    paths:
      include:
        - "/packages/runtime/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      RuntimeAuthorityRegistry production API exported. Keep review-only
      registry metadata out of production exports.
    pattern-regex: '\b(?:export\s+(?:const|interface|type)\s+RuntimeAuthorityRegistry\w*|RuntimeAuthorityRegistry(?:ByCapabilityTag|ByCollection|Entry)?\b)'

  - id: firegrid-factory-exported-contracts-use-schema
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-dark-factory-app.BOUNDARIES.1
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: schema-authority
      rationale: |
        Factory app contracts are product-facing durable rows, read models,
        command/config inputs, and UI adapter payloads. Exported contracts must
        be Effect Schema-backed so tools, clients, CLIs, docs, tests, and live
        adapters serialize the same shape. Raw exported interfaces drift from
        the Schema-first Firegrid contract.
      fix-hint: |
        export const FooSchema = Schema.Struct({ ... })
        export type Foo = Schema.Schema.Type<typeof FooSchema>
    paths:
      include:
        - "/apps/factory/src/**/*.ts"
        - "/apps/factory/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
        - "/apps/factory/src/bin/**"
    message: |
      Exported factory app contracts must be Effect Schema-backed. Use
      Schema.Struct plus `Schema.Schema.Type<typeof XSchema>` instead of raw
      exported interfaces or object-literal type aliases.
    pattern-regex: '\bexport\s+(interface\s+[A-Za-z_$][A-Za-z0-9_$]*|type\s+[A-Za-z_$][A-Za-z0-9_$]*\s*=\s*\{)'

  - id: firegrid-no-random-durable-identity
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: host-context-authority
      rationale: |
        Durable identity fields such as hostId and workerId must be stable
        across process restarts. Random durable ids orphan host-owned streams,
        workflow claims, clocks, and scheduled work.
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/src/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Durable identity generated from crypto.randomUUID(). Identity must come
      from stable config/storage; only per-request txids and session-bound ids
      may be random.
    pattern-regex: '((hostId|workerId|durableExecutionId)\s*[:=]\s*crypto\.randomUUID\(\)|`(host|worker|durableExecution)[_-]\$\{crypto\.randomUUID\(\)\}`)'

  - id: firegrid-no-raw-stream-authority-string-schema
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: schema-authority
      rationale: |
        Authority-bearing stream strings should decode through the canonical
        schema transform, not accept any string with only an annotation.
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/__tests__/**"
    message: |
      Raw Schema.String annotated as stream authority accepts invalid authority
      strings. Use the canonical transform/validated schema.
    pattern: Schema.String.pipe(streamAuthority)

  - id: firegrid-no-mutable-identity-let
    languages: [typescript]
    severity: WARNING
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: identity-correctness
      rationale: |
        Placeholder identity values create a window where a valid-looking but
        semantically invalid sessionId/contextId/hostId can be observed.
      fix-hint: |
        Sequence initialization so the identity is const before first use.
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
    message: |
      let declaration for an identity field initialized to a placeholder.
      Sequence initialization so the identity is const before first use.
    patterns:
      - pattern-either:
          - pattern: 'let $NAME: string = ""'
          - pattern: 'let $NAME = ""'
      - metavariable-regex:
          metavariable: $NAME
          regex: '.*(sessionId|contextId|hostId).*'

  - id: firegrid-fire-and-forget-promise-uses-fork
    languages: [typescript]
    severity: WARNING
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-idioms
      rationale: |
        void-prefixed Promise work is fire-and-forget. Inside Effect scopes,
        Effect.fork or Effect.forkScoped ties the work to parent fiber scope.
      fix-hint: |
        yield* effect.pipe(Effect.forkScoped)
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
        - "/packages/*/src/bin/**"
        - "/apps/*/src/bin/**"
    message: |
      Fire-and-forget Promise with void prefix. Inside Effect scopes, use
      Effect.fork or Effect.forkScoped.
    patterns:
      - pattern-not-inside: |
          Effect.sync(() => {
            ...
          })
      - pattern-either:
          - pattern: void $PROMISE.then(...)
          - pattern: void $PROMISE.then(...).catch(...)

  - id: firegrid-no-detached-promise-in-effect-sync
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-idioms
      rationale: |
        Effect.sync(() => { void promise.then(...) }) launches Promise work that
        escapes the Effect scope. Errors are unattributed and cancellation does
        not propagate.
      fix-hint: |
        Effect.tryPromise({ try: () => promise, catch: cause => ... }).pipe(Effect.forkScoped)
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/__tests__/**"
    message: |
      Detached Promise inside Effect.sync escapes Effect scope. Use
      Effect.tryPromise(...).pipe(Effect.forkScoped).
    patterns:
      - pattern-inside: |
          Effect.sync(() => {
            ...
          })
      - pattern-either:
          - pattern: void $PROMISE.then(...)
          - pattern: void $PROMISE.then(...).catch(...)

  - id: firegrid-match-should-be-exhaustive
    languages: [typescript]
    severity: WARNING
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-idioms
      rationale: |
        Match expressions should end with Match.exhaustive or Match.orElse so
        unhandled cases cannot silently produce undefined.
      fix-hint: |
        Match.value(x).pipe(..., Match.exhaustive)
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
    message: |
      Match expression does not end with Match.exhaustive or Match.orElse.
    pattern-regex: 'Match\.value\([^)]*\)\.pipe\(\s*(?:[^()]|\([^)]*\)|\n)*Match\.tag\([^)]*\),\s*\)'

  - id: firegrid-mutable-state-in-effect-gen
    languages: [typescript]
    severity: WARNING
    metadata:
      acid: firegrid-remediation-hardening.STATIC_QUALITY.13
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: effect-idioms
      rationale: |
        Direct Map mutation inside Effect.gen mixes mutable state with
        effectful code. Prefer Effect.sync wrappers for visibility or Ref
        state for fully Effect-managed mutation.
      fix-hint: |
        yield* Effect.sync(() => map.set(key, value))
    paths:
      include:
        - "/packages/*/src/**/*.ts"
        - "/packages/*/src/**/*.tsx"
        - "/apps/*/src/**/*.ts"
        - "/apps/*/src/**/*.tsx"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
    message: |
      Direct mutable Map state mutation inside Effect.gen. Wrap in Effect.sync
      for visibility, or use Ref<HashMap> for Effect-managed state.
    patterns:
      - pattern-inside: |
          Effect.gen(function* () {
            ...
          })
      - pattern-not-inside: Effect.sync(...)
      - pattern-either:
          - pattern: $MAP.set($K, $V)
          - pattern: $MAP.delete($K)
          - pattern: $MAP.clear()
      - metavariable-regex:
          metavariable: $MAP
          regex: '^[a-z][A-Za-z0-9_]*(\.[a-z][A-Za-z0-9_]*)?$'

  # ===========================================================================
  # tf-zchu: executable drift guards for the runtime design constraints cannon
  # (docs/cannon/architecture/runtime-design-constraints.md). These make C2/C4/
  # C6/C7 test-enforced rather than review-only. C2 is enforced by the existing
  # `firegrid-no-unclassified-workflow-make` rule above (annotated there). The
  # three rules below add C4, C6, and C7. The semgrep-error-baseline.json gate
  # (scripts/semgrep-check-baseline.mjs) is the "admissible bridge exception"
  # ledger: an existing in-scope finding may be baselined with a justification;
  # any NEW finding fails CI.
  # ===========================================================================

  - id: firegrid-c4-no-new-durable-deferred-runtime-wait
    languages: [typescript]
    severity: ERROR
    metadata:
      cannon: docs/cannon/architecture/runtime-design-constraints.md
      constraint: C4
      category: runtime-architecture
      rationale: |
        C4 (Async Waits Are Durable Completions): a RuntimeContext input, tool,
        permission, or child-session wait must be a durable completion /
        externally resolved wait keyed by stable domain identity, reconstructed
        from durable wait+completion records after restart. A per-sequence
        DurableDeferred mailbox is the workflow-engine bridge primitive, not the
        target shape; a new DurableDeferred use on these paths reimplements
        durable completions with more surface area (constraint "Runtime Input
        Mailbox" / SDD Gate).
      fix-hint: |
        Model the wait as a durable completion keyed by domain identity
        (tool:<contextId>:<toolUseId>, permission:<permissionRequestId>, input
        identity, child contextId), resolved first-valid-terminal-wins. The
        existing input-mailbox bridge is baselined under tf-5cn1 with deletion
        targets tf-vrz6/tf-w6qj; a NEW use needs an admissible bridge exception
        (modifies existing violating code, dispatches the RFC-conforming target
        as a bead, carries a sunset commitment) recorded in
        semgrep-error-baseline.json.
    paths:
      # RuntimeContext input/tool/permission/child-session durable-progress
      # surfaces. workflow-engine/workflows holds the input-wait body and child
      # spawn; agent-event-pipeline/control-plane/channels hold tool, permission,
      # and routed waits. workflow-engine/internal is intentionally OUT of scope:
      # its DurableDeferred clock-wakeup is an engine primitive, not a
      # RuntimeContext wait kind C4 governs.
      include:
        - "/packages/runtime/src/workflow-engine/workflows/**/*.ts"
        - "/packages/runtime/src/agent-event-pipeline/**/*.ts"
        - "/packages/runtime/src/control-plane/**/*.ts"
        - "/packages/runtime/src/channels/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      New DurableDeferred use on a RuntimeContext input/tool/permission/
      child-session path (C4). Async waits are durable completions keyed by
      domain identity, not per-sequence deferred mailboxes. The existing input
      bridge is baselined (tf-5cn1); a new use needs an admissible bridge
      exception (SDD Gate) recorded in semgrep-error-baseline.json.
    pattern-regex: '\bDurableDeferred\.[A-Za-z]+\s*\('

  - id: firegrid-c6-no-source-specific-cursor-event-taxonomy-in-agent-tools
    languages: [typescript]
    severity: ERROR
    metadata:
      cannon: docs/cannon/architecture/runtime-design-constraints.md
      constraint: C6
      category: runtime-architecture
      rationale: |
        C6 (Observations Are Typed Source, Cursor, Match): agent-tool protocol
        schemas must not invent source-specific cursor or event-tag taxonomies,
        or a standalone session_read / ChildOutput* protocol stack, when an
        existing channel schema already owns the event type. Delegated child
        output already has a typed primitive (SessionAgentOutputChannel) routed
        through the channel router; a tool/MCP adapter may wrap that route but
        must reuse the channel schema, not bypass it (constraint "Delegated
        Child Output").
      fix-hint: |
        Project the router-backed SessionAgentOutputChannel into a thin
        request/response adapter that reuses the channel schema. Do not add
        `cursor:`/`eventTag:` schema fields or ChildOutput*/session_read protocol
        schemas under packages/protocol/src/agent-tools. Cursors are source
        coordinates owned by the source, not agent-tool protocol identifiers.
    paths:
      include:
        - "/packages/protocol/src/agent-tools/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
    message: |
      Agent-tool protocol schema adds a source-specific cursor/event-tag
      taxonomy or a session_read/ChildOutput* stack (C6). Reuse the router-backed
      SessionAgentOutputChannel schema instead of inventing a parallel
      observation protocol.
    pattern-either:
      - pattern-regex: '\bChildOutput[A-Za-z0-9_]*\b'
      - pattern-regex: '\bsession_read\b'
      - pattern-regex: '\bsessionRead[A-Za-z0-9_]*\b'
      - pattern-regex: '\b(cursor|eventTag|event_tag)\s*:\s*Schema\.'

  - id: firegrid-c7-no-edge-local-terminal-synthesis
    languages: [typescript]
    severity: ERROR
    metadata:
      cannon: docs/cannon/architecture/runtime-design-constraints.md
      constraint: C7
      category: runtime-architecture
      rationale: |
        C7 (First-Class Schemas) / "Route Completion": terminal prompt
        completion is durable runtime result state, not edge-local synthesis. A
        transport edge must bind terminal completion to the durable state/result
        fact the keyed handler owns (first-valid-terminal-wins), not synthesize a
        terminal Done from raw TurnComplete observation. The ACP edge today
        derives terminal-ness only by OBSERVING a TurnComplete output, which is
        compliant; constructing the terminal completion locally is not.
      fix-hint: |
        Decode a runtime-produced RouteCompletionReceipt against the route's
        response schema (tf-r6br), or observe the durable terminal fact. Do not
        construct a terminal `{ _tag: "Done" }` completion at the edge.
    paths:
      include:
        - "/packages/host-sdk/src/host/acp-stdio-edge.ts"
        - "/packages/host-sdk/src/host/*edge*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
    message: |
      Edge-local terminal completion synthesis (C7). A transport edge must not
      construct a terminal `{ _tag: "Done" }` from raw TurnComplete; bind
      terminal completion to durable runtime result state (decode a
      runtime-produced RouteCompletionReceipt or observe the durable terminal
      fact).
    pattern-regex: '_tag:\s*["'']Done["'']'

  # ===========================================================================
  # tf-1r0o cutover: shape-aware drift guards for the Shape C RuntimeContext
  # subscriber landing zone and the transforms purity rule. These extend the
  # tf-zchu cannon enforcement (above) to the production target paths named in
  # packages/runtime/src/agent-event-pipeline/TOPOLOGY.md.
  # ===========================================================================

  - id: firegrid-shape-c-no-workflow-engine-in-runtime-context-subscriber
    languages: [typescript]
    severity: ERROR
    metadata:
      cannon: docs/cannon/architecture/runtime-pipeline-type-boundaries.md
      constraint: C2
      category: runtime-architecture
      rationale: |
        Shape C subscribers are keyed stateful per-event handlers; their `R`
        channel may name a state-store tag and the narrow live/channel tags
        they dispatch through, but it MUST NOT name workflow execution
        machinery (`WorkflowEngine.WorkflowEngine` / `WorkflowEngine.WorkflowInstance`).
        Calling `Activity.make` / `Workflow.suspend` / `Workflow.execute`
        inside a Shape C handler grows the workflow tags into `R`, which
        either turns the subscriber into a Shape D body (parked, replaying,
        C2 violation) or implicitly assumes a workflow runtime the host
        composition is not obligated to provide. A subscriber that genuinely
        needs Activity machinery lives in `agent-event-pipeline/tool-execution/`
        or under a justified `workflow-engine/workflows/` landing, not here.
      fix-hint: |
        Make the wait a durable completion keyed by domain identity
        (tool:<contextId>:<toolUseId>, permission:<permissionRequestId>,
        input identity, child contextId), resolved first-valid-terminal-wins.
        Run side effects through narrow capability tags
        (RuntimeToolUseExecutor, AgentSession, EgressChannel). If the work
        genuinely earns workflow machinery, move the file to
        agent-event-pipeline/tool-execution/ (Shape D) and surface the
        machinery justification in the SDD per the constraint-doc gate.
    paths:
      include:
        - "/packages/runtime/src/subscribers/runtime-context/**/*.ts"
        - "/semgrep-tests/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Shape C RuntimeContext subscriber names workflow execution machinery
      (Activity.make / Workflow.suspend / Workflow.execute / WorkflowEngine.*).
      Shape C `R` must not include WorkflowEngine.WorkflowEngine or
      WorkflowEngine.WorkflowInstance. Either model the wait as a durable
      completion keyed by domain identity, or move the file to a Shape D
      landing (tool-execution/ or a justified workflow-engine/workflows/).
    pattern-either:
      - pattern-regex: '\bActivity\.make\s*\('
      - pattern-regex: '\bWorkflow\.suspend\s*\('
      - pattern-regex: '\bWorkflow\.execute\s*\('
      - pattern-regex: '\bWorkflowEngine\.WorkflowEngine\b'
      - pattern-regex: '\bWorkflowEngine\.WorkflowInstance\b'

  # ------------------------------------------------------------------
  # Shape C cutover: host-sdk runtime-import gate.
  #
  # Source: docs/architecture/2026-05-22-runtime-physical-target-tree.md,
  # docs/architecture/host-sdk-runtime-boundary.md.
  #
  # Host-sdk MUST import runtime only through narrow semantic subpaths
  # (for example `@firegrid/runtime/tables/runtime-context-state`,
  # `@firegrid/runtime/subscribers/runtime-context-session`). The runtime
  # `kernel` barrel and the `_archive/` holding pen are runtime-internal.
  #
  # The 22 existing kernel-barrel sites in host-sdk are recorded as legacy
  # debt in semgrep-error-baseline.json; new host-sdk kernel-barrel imports
  # are blocked. `_archive/` imports from host-sdk are zero-baseline.
  # ------------------------------------------------------------------

  - id: firegrid-host-sdk-no-runtime-kernel-import
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: shape-c.host-sdk-boundary.kernel-barrel
      category: package-boundary
      doc: docs/architecture/2026-05-22-runtime-physical-target-tree.md
    paths:
      include:
        - "/packages/host-sdk/src/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
    message: |
      host-sdk must not import @firegrid/runtime/kernel. The kernel barrel is
      a runtime-internal mixed barrel; cross-boundary imports use a narrow
      semantic subpath aligned with the target tree (e.g.
      `@firegrid/runtime/tables/runtime-context-state`,
      `@firegrid/runtime/subscribers/runtime-context-session`).
      See docs/architecture/2026-05-22-runtime-physical-target-tree.md
      "Public Package Subpaths".
      Existing kernel-barrel sites are baselined as legacy debt; do not add
      new ones.
    pattern-regex: 'from\s+"@firegrid/runtime/kernel"'

  - id: firegrid-host-sdk-no-runtime-archive-import
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: shape-c.host-sdk-boundary.archive
      category: package-boundary
      doc: docs/architecture/2026-05-22-runtime-physical-target-tree.md
    paths:
      include:
        - "/packages/host-sdk/src/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
    message: |
      host-sdk must not import @firegrid/runtime/_archive/*. The archive is a
      time-boxed holding pen for wrong-shape code pending deletion; target
      code never imports it. Zero-baseline.
    pattern-regex: 'from\s+"@firegrid/runtime/_archive'

  - id: firegrid-host-sdk-no-runtime-workflow-engine-import
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: shape-c.host-sdk-boundary.workflow-engine
      category: package-boundary
      doc: docs/architecture/2026-05-22-runtime-physical-target-tree.md
      rationale: |
        The `@firegrid/runtime/workflow-engine` subpath is a Wave D legacy
        root (`packages/runtime/src/workflow-engine/`) that holds the
        long-lived parked-body RuntimeContext workflow and per-sequence
        input mailbox machinery. It is bridge-only — Shape D consumers
        will move under `subscribers/{tool-dispatch,wait-router,
        scheduled-prompt,runtime-control}/`. Existing host-sdk imports are
        baselined as Wave D deletion targets; this rule blocks new ones so
        preservation is visible in CI per
        `docs/architecture/2026-05-22-shape-c-cutover-roadmap.md` §"Wave
        D"/§"Wave E".
      fix-hint: |
        Replace the workflow-engine import with the target-tree Shape D
        subscriber subpath that owns the symbol once it lands
        (`@firegrid/runtime/subscribers/...`), or model the wait as a
        durable completion keyed by domain identity per
        `docs/cannon/architecture/runtime-design-constraints.md` §C4. Do
        not deepen the legacy-root surface to keep a cutover moving.
    paths:
      include:
        - "/packages/host-sdk/src/**/*.ts"
        - "/semgrep-tests/wave-a-runtime-boundary.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      host-sdk must not import `@firegrid/runtime/workflow-engine` (incl.
      any subpath). The workflow-engine legacy root is a Wave D bridge
      surface scheduled for deletion under
      `docs/architecture/2026-05-22-shape-c-cutover-roadmap.md` §"Wave
      D"/§"Wave E"; Shape D consumers move under
      `@firegrid/runtime/subscribers/...`. Existing sites are baselined as
      Wave D deletion targets; do not add new ones.
    pattern-regex: 'from\s+"@firegrid/runtime/workflow-engine[/"]'

  - id: firegrid-host-sdk-no-runtime-streams-import
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: shape-c.host-sdk-boundary.streams
      category: package-boundary
      doc: docs/architecture/2026-05-22-runtime-physical-target-tree.md
      rationale: |
        The `@firegrid/runtime/streams` subpath is a Wave D-D legacy root
        (`packages/runtime/src/streams/`) holding
        `RuntimeObservationStreams`, `CallerOwnedFactStreams`, and the
        `RuntimeObservationSource` schema family. Wave D-D's route-based
        observation proof (PR #716) shows the channel router +
        `SessionAgentOutputChannel`/`SessionLifecycleChannel` routes
        replace these sources for wait/child-output observation. Existing
        host-sdk imports are baselined as D-D deletion targets; this rule
        blocks new ones so preservation is visible in CI.
      fix-hint: |
        Replace the streams import with route-based observation through
        the channel router (`RuntimeChannelRouter` + the relevant target
        from `packages/runtime/src/channels/routes/`) per
        `docs/cannon/architecture/runtime-design-constraints.md` §C6 and
        the Wave D-D migration plan in PR #716's FINDING.md. Do not add
        a new source-specific stream primitive to keep a cutover moving.
    paths:
      include:
        - "/packages/host-sdk/src/**/*.ts"
        - "/semgrep-tests/wave-a-runtime-boundary.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      host-sdk must not import `@firegrid/runtime/streams` (incl. any
      subpath). The streams legacy root is a Wave D-D bridge surface
      scheduled for deletion under
      `docs/architecture/2026-05-22-shape-c-cutover-roadmap.md` §"Wave
      D"/§"Wave E"; observation moves to route-based dispatch through the
      channel router. Existing sites are baselined as D-D deletion
      targets; do not add new ones.
    pattern-regex: 'from\s+"@firegrid/runtime/streams[/"]'

  - id: firegrid-no-numbered-runtime-subpath
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: shape-c.semantic-tree.no-numbered-paths
      category: package-boundary
      doc: docs/architecture/2026-05-22-runtime-physical-target-tree.md
    paths:
      include:
        - "/packages/**/*.ts"
        - "/apps/**/*.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/__tests__/**"
    message: |
      Numbered runtime subpaths are not part of the target tree. Folder names
      are semantic; the pipeline order is a docs/lint convention, not a path
      prefix. Use semantic subpaths such as `@firegrid/runtime/tables/...`,
      `@firegrid/runtime/subscribers/...`, etc.
      Zero-baseline.
    pattern-regex: 'from\s+"@firegrid/runtime/[1-7]-'

  # ------------------------------------------------------------------
  # Wave C host-sdk boundary guards.
  #
  # Source: docs/architecture/host-sdk-runtime-boundary.md
  #   Cannon §3 (no host-sdk @effect/workflow imports)
  #   Cannon §6 (no host-sdk @firegrid/runtime root barrel imports)
  #
  # Wave C cuts host-sdk over to the runtime root assembled in #699. These
  # two rules close the only hard bans the boundary doc names that the
  # existing guards do NOT statically catch:
  #
  # - `@effect/workflow` direct imports: the depcruise rule
  #   `host-sdk-no-workflow-or-durable-substrate-scan` includes
  #   `node_modules/.../@effect/workflow/` in its `to.path` regex, but
  #   `options.includeOnly: "^packages/.*/src"` filters external node_modules
  #   modules out of the dependency list before the regex sees them, making
  #   the @effect/workflow clause a no-op. Verified empirically: depcruise
  #   does not list @effect/workflow as a dependency of host-sdk source files
  #   that import it. This Semgrep rule closes that gap at the source-text
  #   level.
  # - `@firegrid/runtime` root barrel: the boundary doc lists
  #   `@firegrid/host-sdk -/-> @firegrid/runtime$` as a guard but no rule
  #   exists. Zero current host-sdk hits, so zero-baseline.
  #
  # The four existing host-sdk @effect/workflow residue files (the ones the
  # boundary doc Cannon §3 names) are recorded in semgrep-error-baseline.json
  # as Wave C/D deletion targets. New imports block.
  # ------------------------------------------------------------------

  - id: firegrid-host-sdk-no-effect-workflow-import
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: shape-c.host-sdk-boundary.effect-workflow
      category: package-boundary
      doc: docs/architecture/host-sdk-runtime-boundary.md
      rationale: |
        Cannon §3 (host-sdk-runtime-boundary.md): the only sanctioned home for
        `Workflow.make` / `Activity.make` / `DurableDeferred` / `DurableClock`
        is a runtime-owned Shape D Layer with a justified workflow-machinery
        rationale (runtime-design-constraints.md §SDD Gate). New host-sdk
        `@effect/workflow` imports are bridge residue, not patterns to copy.
        Existing residue sites are baselined as Wave C/D deletion targets;
        this rule blocks new ones.
      fix-hint: |
        Move the workflow-shaped piece into a runtime-owned Shape D Layer
        under `packages/runtime/src/subscribers/{tool-dispatch|wait-router|
        scheduled-prompt|runtime-control}/`, where the workflow-machinery
        justification lives. host-sdk composes the resulting Layer/Tag, not
        the workflow execution.
    paths:
      include:
        - "/packages/host-sdk/src/**/*.ts"
        - "/semgrep-tests/wave-c-host-sdk-boundary.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      host-sdk must not import `@effect/workflow`. Workflow machinery
      (`Workflow.make` / `Activity.make` / `DurableDeferred` / `DurableClock`)
      is owned by runtime Shape D Layers with a justified workflow-machinery
      rationale (runtime-design-constraints.md §SDD Gate;
      host-sdk-runtime-boundary.md Cannon §3). Existing residue sites are
      baselined as Wave C/D deletion targets; do not add new ones.
    pattern-regex: 'from\s+"@effect/workflow'

  - id: firegrid-host-sdk-no-runtime-root-barrel-import
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: shape-c.host-sdk-boundary.root-barrel
      category: package-boundary
      doc: docs/architecture/host-sdk-runtime-boundary.md
      rationale: |
        Cannon §6 (host-sdk-runtime-boundary.md): the `@firegrid/runtime`
        root barrel widens the cross-boundary surface beyond what the
        host-sdk / runtime boundary admits. Sanctioned host-sdk imports go
        through narrow semantic subpaths
        (`@firegrid/runtime/tables/...`, `@firegrid/runtime/subscribers/...`,
        `@firegrid/runtime/composition/...`, etc.). Zero-baseline.
      fix-hint: |
        Replace the root-barrel import with the specific semantic subpath
        that owns the symbol (see
        docs/architecture/2026-05-22-runtime-physical-target-tree.md
        "Public Package Subpaths").
    paths:
      include:
        - "/packages/host-sdk/src/**/*.ts"
        - "/semgrep-tests/wave-c-host-sdk-boundary.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      host-sdk must not import the `@firegrid/runtime` root barrel.
      Cross-boundary imports use narrow semantic subpaths
      (`@firegrid/runtime/tables/...`, `@firegrid/runtime/subscribers/...`,
      `@firegrid/runtime/composition/...`, etc.). See
      docs/architecture/host-sdk-runtime-boundary.md Cannon §6.
      Zero-baseline.
    pattern-regex: 'from\s+"@firegrid/runtime"'

  # ------------------------------------------------------------------
  # Wave A runtime semantic-tree boundary guards (tf-r1mv).
  #
  # Source: docs/architecture/2026-05-22-runtime-physical-target-tree.md,
  # docs/cannon/architecture/runtime-pipeline-type-boundaries.md,
  # docs/architecture/host-sdk-runtime-boundary.md.
  #
  # Static-invariant import-boundary rules for the new semantic runtime
  # folders. Each rule is intentionally narrow and additive; existing rules
  # (tf-zchu Shape C subscriber, #689 host-sdk kernel/_archive/numbered)
  # are unchanged. No baselines are broadened by these rules.
  # ------------------------------------------------------------------

  - id: firegrid-transforms-purity-import-boundary
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: shape-c.transforms.purity
      category: runtime-architecture
      doc: docs/architecture/2026-05-22-runtime-physical-target-tree.md
      rationale: |
        `transforms/` is the pure-function tier of the runtime pipeline. The
        binding contract is `packages/runtime/src/transforms/README.md`
        §"May import" / §"Must not import". The invariant is *no effectful
        runtime or capability use* — not "no `effect` package imports". The
        bare `effect` package ships both pure data/schema helpers (Schema,
        Either, Option, Match, Predicate, Array, ...) and effectful runtime
        machinery (Effect, Layer, Context/Context.Tag, Stream, Scope). The
        pure helpers stay allowed; the runtime machinery is banned. The
        workflow substrate (`@effect/workflow` and the
        Activity/Workflow/DurableDeferred/DurableClock identifiers) is
        banned outright — these are I/O capability tags. Reaching up into
        `tables/`, `channels/`, `producers/`, `subscribers/`, or
        `composition/` is a structure violation (lower-tier importing
        higher-tier). Reaching back into the legacy
        `agent-event-pipeline/events/` (the pre-cutover event-vocab home)
        defeats the Wave A semantic move — the new `events/` folder is the
        canonical event-vocabulary home. Other `@effect/<sub>` packages
        (`@effect/ai`, `@effect/platform`, etc.) are NOT silently blocked
        here — review them at PR time against the README §"May import"
        list. Preferred fix when a transform needs a symbol from an
        `@effect/<sub>` helper is to add a re-export module under
        `packages/runtime/src/events/` and import the transform from there.
      fix-hint: |
        Move impure work into the caller. A transform is `(state, event) ->
        (state, actions)`; if you need to read durable state, the caller
        provides the state value; if you need to dispatch an effect, return an
        action record the caller consumes. If you need a legacy event-vocab
        symbol from `agent-event-pipeline/events/`, add a re-export under
        `packages/runtime/src/events/` first and import from `../events/*`.
    paths:
      include:
        - "/packages/runtime/src/transforms/**/*.ts"
        - "/semgrep-tests/wave-a-runtime-boundary.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      `transforms/` is pure (symbol-level). Do not import the effectful
      runtime tags `Effect`/`Layer`/`Context`/`Stream`/`Scope` from "effect",
      do not import `@effect/workflow`, do not name `Activity.*`/
      `Workflow.*`/`DurableDeferred.*`/`DurableClock.*`, and do not return
      `Effect.Effect<...>` from exports. Pure helpers like `Schema`/
      `Option`/`Either`/`Match`/`Predicate`/`Array` from "effect" remain
      allowed; other `@effect/<sub>` packages (e.g. `@effect/ai`,
      `@effect/platform`) are not blocked here — review at PR time against
      `packages/runtime/src/transforms/README.md` §"May import". Folder-
      path bans (`../tables/`, `../subscribers/`, `../agent-event-pipeline/`,
      etc.) live in `.dependency-cruiser.cjs` under
      `runtime-transforms-no-higher-tier-import`.
    pattern-either:
      - pattern-regex: '(?s)import\s+(?:type\s+)?\{[^}]*\bEffect\b[^}]*\}\s*from\s*"effect"'
      - pattern-regex: '(?s)import\s+(?:type\s+)?\{[^}]*\bLayer\b[^}]*\}\s*from\s*"effect"'
      - pattern-regex: '(?s)import\s+(?:type\s+)?\{[^}]*\bContext\b[^}]*\}\s*from\s*"effect"'
      - pattern-regex: '(?s)import\s+(?:type\s+)?\{[^}]*\bStream\b[^}]*\}\s*from\s*"effect"'
      - pattern-regex: '(?s)import\s+(?:type\s+)?\{[^}]*\bScope\b[^}]*\}\s*from\s*"effect"'
      - pattern-regex: 'from\s+"@effect/workflow'
      - pattern-regex: '\bActivity\.[A-Za-z_$][A-Za-z0-9_$]*\s*\('
      - pattern-regex: '\bWorkflow\.[A-Za-z_$][A-Za-z0-9_$]*\s*\('
      - pattern-regex: '\bDurableDeferred\.[A-Za-z_$][A-Za-z0-9_$]*\s*\('
      - pattern-regex: '\bDurableClock\.[A-Za-z_$][A-Za-z0-9_$]*\s*\('
      - pattern-regex: ':\s*Effect\.Effect\s*<'

  # NOTE: The path-based folder-direction rules
  #   - firegrid-events-no-higher-tier-import
  #   - firegrid-tables-no-higher-tier-import
  #   - firegrid-subscribers-no-producers-import
  #   - firegrid-shape-c-runtime-context-no-producers-import
  # live in .dependency-cruiser.cjs (dep-cruiser is path-graph aware and the
  # right tool for folder-direction enforcement). See
  #   runtime-events-no-higher-tier-import
  #   runtime-tables-no-higher-tier-import
  #   runtime-transforms-no-higher-tier-import
  #   runtime-producers-channels-no-higher-tier-import
  #   runtime-subscribers-no-composition-import
  #   runtime-shape-c-runtime-context-no-producers-import
  # Semgrep keeps the symbol-shape rules below (Effect/Layer/Context/Stream/
  # Scope identifier bans, Activity/Workflow/DurableDeferred/DurableClock
  # namespace bans, return-type Effect.Effect<>, @effect/workflow package).

  - id: firegrid-shape-c-runtime-context-no-workflow-machinery
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: shape-c.runtime-context.no-workflow-machinery
      category: runtime-architecture
      doc: docs/architecture/2026-05-22-runtime-physical-target-tree.md
      rationale: |
        Shape C subscribers under `subscribers/runtime-context/` and
        `subscribers/runtime-context-session/` are keyed stateful per-event
        handlers. Their `R` channel may name a state-store tag and narrow
        live/channel tags, but it must not name workflow execution machinery.
        This rule covers the new semantic-tree paths and adds
        `DurableDeferred.*` / `DurableClock.*` bans on top of the existing
        tf-zchu rule (which scopes to the old `agent-event-pipeline/`
        subscriber path and covers Activity/Workflow/WorkflowEngine).
      fix-hint: |
        Model the wait as a durable completion keyed by domain identity
        (tool:<contextId>:<toolUseId>, permission:<permissionRequestId>,
        input identity, child contextId). Run side effects through narrow
        capability tags (state store, session-command sink, channel router).
        DurableClock/DurableDeferred belong in Shape D folders
        (`subscribers/scheduled-prompt/`, `subscribers/tool-dispatch/` etc.).
    paths:
      include:
        - "/packages/runtime/src/subscribers/runtime-context/**/*.ts"
        - "/packages/runtime/src/subscribers/runtime-context-session/**/*.ts"
        - "/semgrep-tests/wave-a-runtime-boundary.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      Shape C `subscribers/runtime-context/` and
      `subscribers/runtime-context-session/` must not import `@effect/workflow`
      or name `WorkflowEngine.*` / `Activity.make` / `Workflow.suspend|execute`
      / `DurableDeferred.*` / `DurableClock.*`. Shape D folders own that
      machinery with documented justification.
    pattern-either:
      - pattern-regex: 'from\s+"@effect/workflow'
      - pattern-regex: '\bWorkflowEngine\.WorkflowEngine\b'
      - pattern-regex: '\bWorkflowEngine\.WorkflowInstance\b'
      - pattern-regex: '\bActivity\.make\s*\('
      - pattern-regex: '\bWorkflow\.suspend\s*\('
      - pattern-regex: '\bWorkflow\.execute\s*\('
      - pattern-regex: '\bDurableDeferred\.[A-Za-z_$][A-Za-z0-9_$]*\s*\('
      - pattern-regex: '\bDurableClock\.[A-Za-z_$][A-Za-z0-9_$]*\s*\('

  - id: firegrid-composition-no-legacy-imports
    languages: [typescript]
    severity: ERROR
    metadata:
      acid: shape-c.composition.no-legacy
      category: runtime-architecture
      doc: docs/architecture/2026-05-22-runtime-physical-target-tree.md
      rationale: |
        `composition/` is runtime-local topology wiring (Layer.mergeAll +
        topology checks). It must not import the deleted/quarantined legacy
        body driver (`RuntimeContextWorkflowNative` / `RuntimeContextWorkflowNativeLayer` /
        `executeRuntimeContextWorkflow` / `RuntimeContextWorkflowRuntime`), the
        legacy per-sequence input mailbox (`runtime-input-deferred`), the
        runtime kernel barrel (`@firegrid/runtime/kernel`), or `_archive/`.
      fix-hint: |
        Compose the runtime layer graph from semantic-tree exports only
        (tables/, producers/, subscribers/, channels/). Shape D consumers
        (`subscribers/tool-dispatch/`, `subscribers/wait-router/`, etc.) are
        the only places workflow machinery may surface, and composition
        depends on their resulting Effect Tags / Layers, not on workflow
        execution directly.
    paths:
      include:
        - "/packages/runtime/src/composition/**/*.ts"
        - "/semgrep-tests/wave-a-runtime-boundary.ts"
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.test.mts"
        - "**/__tests__/**"
    message: |
      `composition/` must not import legacy body-driver symbols
      (`RuntimeContextWorkflowNative`, `RuntimeContextWorkflowNativeLayer`,
      `executeRuntimeContextWorkflow`, `RuntimeContextWorkflowRuntime`),
      `runtime-input-deferred`, `@firegrid/runtime/kernel`, or
      `@firegrid/runtime/_archive`. Compose target-tree exports only.
    pattern-either:
      - pattern-regex: '\bRuntimeContextWorkflowNative\b'
      - pattern-regex: '\bRuntimeContextWorkflowNativeLayer\b'
      - pattern-regex: '\bexecuteRuntimeContextWorkflow\b'
      - pattern-regex: '\bRuntimeContextWorkflowRuntime\b'
      - pattern-regex: 'from\s+"[^"]*runtime-input-deferred'
      - pattern-regex: 'from\s+"@firegrid/runtime/kernel'
      - pattern-regex: 'from\s+"@firegrid/runtime/_archive'


