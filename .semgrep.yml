rules:
  - id: firegrid-no-process-env-outside-bin
    languages: [typescript]
    severity: ERROR
    paths:
      include:
        - "**/packages/*/src/**/*.ts"
        - "**/packages/*/src/**/*.tsx"
        - "**/apps/*/src/**/*.ts"
        - "**/apps/*/src/**/*.tsx"
        - "**/semgrep-tests/**/*.ts"
    message: |
      process.env reads belong at the binary entry boundary or in tooling
      scripts. In application code use Effect Config or accept config as an
      explicit parameter.
    pattern: process.env.$ANY
