# firegrid-remediation-hardening.STATIC_QUALITY.7
rules:
  - id: firegrid-tryPromise-stream-append
    languages: [typescript]
    severity: WARNING
    metadata:
      review-section: "3a"
      review-item: "R4"
      acid: firegrid-remediation-hardening.DUP_DETECTION.2
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      code-reuse: CODE_REUSE.1
      canonical-helper: packages/substrate/src/protocol/descriptors/append.ts:appendChange
      category: code-reuse
    paths:
      include:
        - "**/packages/*/src/**/*.ts"
        - "**/packages/*/src/**/*.tsx"
        - "**/apps/*/src/**/*.ts"
        - "**/apps/*/src/**/*.tsx"
        - "**/semgrep-tests/**/*.ts"
      exclude:
        - "**/packages/substrate/src/protocol/descriptors/append.ts"
    message: |
      Use the shared `appendChange(stream, stateEvent, mapErr)` helper
      instead of inlining DurableStream.append + JSON.stringify + tryPromise.
      See packages/substrate/src/protocol/descriptors/append.ts.
    patterns:
      - pattern: |
          Effect.tryPromise({
            try: () => $S.append(JSON.stringify($EV)),
            ...
          })

  - id: firegrid-acquire-db-shape
    languages: [typescript]
    severity: WARNING
    metadata:
      review-section: "lint-addendum"
      review-item: "R1"
      acid: firegrid-remediation-hardening.DUP_DETECTION.2
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      code-reuse: HOT_PATHS.2
      canonical-helper: packages/substrate/src/state-store/stream.ts:acquireSubstrateDb
      category: scoped-resource
    paths:
      include:
        - "**/packages/*/src/**/*.ts"
        - "**/packages/*/src/**/*.tsx"
        - "**/apps/*/src/**/*.ts"
        - "**/apps/*/src/**/*.tsx"
        - "**/semgrep-tests/**/*.ts"
      exclude:
        - "**/packages/substrate/src/state-store/stream.ts"
    message: |
      Use `acquireSubstrateDb(opts, mapError)` for scoped substrate database
      acquisition instead of hand-rolling acquireRelease + tryPromise + close.
      See packages/substrate/src/state-store/stream.ts.
    patterns:
      - pattern: |
          Effect.acquireRelease(
            Effect.tryPromise({
              ...
            }),
            ($DB) => Effect.sync(() => $DB.close()),
          )

  - id: firegrid-retained-fold-by-field
    languages: [typescript]
    severity: WARNING
    metadata:
      review-section: "retained-records"
      review-item: "R4"
      acid: firegrid-remediation-hardening.DUP_DETECTION.2
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      code-reuse: CODE_REUSE.7
      canonical-helper: packages/substrate/src/state-store/retained-records.ts:readRetainedByField
      category: code-reuse
    paths:
      include:
        - "**/packages/*/src/**/*.ts"
        - "**/packages/*/src/**/*.tsx"
        - "**/apps/*/src/**/*.ts"
        - "**/apps/*/src/**/*.tsx"
        - "**/semgrep-tests/**/*.ts"
    message: |
      Use a parameterized retained-row-by-field helper instead of re-reading
      JSON rows and hand-filtering by row type and field.
      See packages/substrate/src/state-store/retained-records.ts.
    patterns:
      - pattern-inside: |
          Effect.gen(function* () {
            ...
            const $ITEMS = yield* readJsonItems(...)
            ...
          })
      - pattern: |
          for (const $EV of $ITEMS) {
            if ($EV.type !== $ROW) continue
            $...BODY
          }
      - pattern-not-inside: |
          const readRetainedByField = <A>(
            ...
          ): Effect.Effect<ReadonlyArray<A>, RetainedReadError> =>
            Effect.gen(function* () {
              ...
            })

  - id: firegrid-authoritative-run-call
    languages: [typescript]
    severity: WARNING
    metadata:
      review-section: "3d"
      review-item: "R4"
      acid: firegrid-remediation-hardening.DUP_DETECTION.2
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      code-reuse: CODE_REUSE.3
      canonical-helper: packages/substrate/src/state-store/retained-records.ts:readAuthoritativeRun
      category: code-reuse
    paths:
      include:
        - "**/packages/*/src/**/*.ts"
        - "**/packages/*/src/**/*.tsx"
        - "**/apps/*/src/**/*.ts"
        - "**/apps/*/src/**/*.tsx"
        - "**/semgrep-tests/**/*.ts"
    message: |
      Centralize authoritative-run lookup behind the shared helper instead of
      calling readRetainedRunRecords directly.
      See packages/substrate/src/state-store/retained-records.ts.
    patterns:
      - pattern: readRetainedRunRecords($...ARGS)
      - pattern-not-inside: |
          export const readAuthoritativeRun = (
            ...
          ): Effect.Effect<RunValue | undefined, RetainedReadError> =>
            readRetainedRunRecords(...).pipe(
              ...
            )

  - id: firegrid-no-process-env-outside-bin
    languages: [typescript]
    severity: ERROR
    metadata:
      review-section: "configuration-review"
      review-item: "Q5"
      acid: firegrid-remediation-hardening.STATIC_QUALITY.10
      quality-acid: firegrid-remediation-hardening.STATIC_QUALITY.6
      category: configuration-boundary
    paths:
      include:
        - "**/packages/*/src/**/*.ts"
        - "**/packages/*/src/**/*.tsx"
        - "**/apps/*/src/**/*.ts"
        - "**/apps/*/src/**/*.tsx"
        - "**/semgrep-tests/**/*.ts"
    message: |
      process.env reads belong at the binary entry boundary (bin/) or in
      tooling scripts (scripts/). In application code use Config.string /
      Config.option / Config.redacted, or accept config as an explicit
      parameter. The companion ESLint rule local/no-process-env-outside-bin
      catches the same shape; this Semgrep rule is the structural backstop.
    pattern: process.env.$ANY
