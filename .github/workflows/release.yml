name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Workaround for npm/cli#9151: Node 22.22.2 ships npm 10.9.7 which
      # crashes during self-upgrade to 11.x (lazy require of promise-retry).
      # npm 10.9.8 fixes this with an eager require (npm/cli#9152).
      # TODO: Remove the intermediate install once Node 22 bundles npm >=10.9.8
      # (track nodejs/node#62463).
      - name: Update npm for OIDC support
        run: |
          npm install -g npm@10.9.8
          npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:run

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@8eb63fb4cfc7f9643537c7d39d0b68c835012a19
        with:
          version: pnpm run changeset:version
          publish: pnpm run changeset:publish
          commit: "ci: Version Packages"
          title: "ci: Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PRs about release
        if: steps.changesets.outputs.published == 'true'
        uses: tanstack/config/.github/comment-on-release@a4c6d06ed525a310901e3e9fbed9b2301ebecfd5
        with:
          published-packages: ${{ steps.changesets.outputs.publishedPackages }}
