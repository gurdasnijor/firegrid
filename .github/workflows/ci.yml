name: CI

on:
  # Explicit dispatch: task-exit.sh self-heals a DRAFT PR whose
  # `pull_request` event was suppressed (GitHub does not start Actions
  # from events created by some automation tokens) by dispatching CI
  # directly on the branch ref, so the merge gate always has a run.
  workflow_dispatch:
  # Enumerated so draft-open AND draft→ready both deterministically
  # trigger the gate (ready_for_review is NOT a default activity type).
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    # The beads-sync cron commits `.beads/issues.jsonl` every few
    # minutes (status SoT durability). Those data-only commits must not
    # trigger a full CI run — that cadence, not any single job, is the
    # dominant CI cost. The cron keeps syncing; it just stops paying CI.
    paths-ignore:
      - ".beads/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  TURBO_TELEMETRY_DISABLED: 1

# Per-job setup boilerplate (checkout + pnpm + node + install) lives in
# the local composite action at `.github/actions/setup`; pnpm/node
# version bumps touch one file rather than every job.
#
# Gating jobs:
#   lint              — eslint + dead-code (knip) + dup (jscpd) + dep boundaries
#   typecheck         — pnpm --recursive typecheck
#   effect-diagnostics — effect-language-service diagnostics
#   tests             — pnpm --recursive tests

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      # ESLint --cache (see the `lint` script) only re-lints files whose content
      # or config changed. Persist it across runs so a typical small-diff PR
      # lints in ~1s instead of a full cold pass. Keyed on the config so any
      # rule change busts the cache (correctness over a stale hit).
      - name: Restore ESLint cache
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('eslint.config.js', 'tsconfig.eslint.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('eslint.config.js', 'tsconfig.eslint.json', 'pnpm-lock.yaml') }}-

      - name: Lint
        run: pnpm run lint

      - name: Check dead code (knip, strict-0)
        run: pnpm run lint:dead

      - name: Check duplicate code (jscpd, strict-0)
        run: pnpm run lint:dup

      - name: Check dependency boundaries
        run: pnpm run lint:deps

  # The UKV coverage gate runs a live sim (~40s) and computes the verdict from
  # the host-substrate trace oracle (packages/tiny-firegrid/src/runner/coverage.ts);
  # the run exits non-zero on production-path-not-covered. It is the single
  # heaviest step. As its own job it runs in parallel and stops gating the lint
  # critical path. Not turbo-cacheable (the sim spawns real subprocesses — same
  # reason tiny-firegrid#test is cache:false), so no cache step here.
  coverage-gate:
    name: UKV coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Run UKV coverage gate (computed verdict)
        run: pnpm --filter @firegrid/tiny-firegrid run coverage:gate

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      # Turbo content-hashes task inputs and caches the result; persisting the
      # cache lets unchanged packages skip typecheck entirely. Unique per-job key
      # with a shared restore prefix so typecheck and tests seed each other's
      # cache without racing on the same save.
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-typecheck-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Typecheck packages
        run: pnpm --recursive --if-present --workspace-concurrency=4 run typecheck

  effect-diagnostics:
    name: Effect diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      # effect:diagnostics is now a per-package turbo task — persist the cache so
      # the (seconds-per-package) language-service run is skipped for unchanged
      # packages. Shared restore prefix with the other turbo jobs, unique save key.
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-diagnostics-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Effect diagnostics
        run: pnpm effect:diagnostics

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      # See the typecheck job: persist Turbo's cache so unchanged packages skip
      # their test run. Shared restore prefix, unique save key.
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-tests-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Test packages
        run: pnpm --recursive --if-present run test
