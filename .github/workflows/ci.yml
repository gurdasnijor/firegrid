name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  TURBO_TELEMETRY_DISABLED: 1

# Five gating jobs run in parallel; an additional non-gating
# `architecture-reports` job runs on pull requests to upload regenerated
# evidence as workflow artifacts so reviewers can inspect dependency
# graphs and the Effect artifact inventory without rerunning locally.
#
# Per-job setup boilerplate (checkout + pnpm + node + install) lives in
# the local composite action at `.github/actions/setup`; pnpm/node
# version bumps touch one file rather than every job.
#
# Gating jobs:
#   lint              — eslint + dead-code + dup + dep-cruiser + effect-quality + effect-rules
#   semgrep           — semgrep --test fixtures + production semgrep scan
#   typecheck         — pnpm --recursive typecheck
#   effect-diagnostics — effect-language-service diagnostics
#   tests             — pnpm --recursive tests
#   package-consumption — pack @firegrid/client and type-check an external consumer
#
# Non-gating job:
#   architecture-reports — runs `pnpm run arch:reports` on PRs and uploads
#                          the regenerated docs/effect-artifact-inventory.*
#                          and docs/dependency-graph* files as workflow
#                          artifacts. Continues on error so an evidence-
#                          regen failure doesn't block PR merges.

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm run lint

      - name: Check dead-code baseline
        run: pnpm run lint:dead

      - name: Check duplicate-token baseline
        run: pnpm run lint:dup

      - name: Check transitive dependency boundaries
        run: pnpm run lint:deps

      - name: Check Effect-quality metric ratchet
        run: pnpm run lint:effect-quality

      - name: Check Effect-artifact rule budgets
        run: pnpm run lint:effect-rules

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      # Semgrep's npm packages are unmaintained; install the maintained CLI
      # with pipx, matching docs/TOOLING.md.
      - name: Install Semgrep CLI
        run: pipx install semgrep

      - name: Test structural duplication rules
        run: pnpm run lint:semgrep:test

      - name: Check structural duplication shapes
        run: pnpm run lint:semgrep

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Typecheck packages
        run: pnpm --recursive --if-present --workspace-concurrency=4 run typecheck

  effect-diagnostics:
    name: Effect diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Effect diagnostics
        run: pnpm effect:diagnostics

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      # Each workspace's tests use an isolated per-process durable-streams
      # test server (see packages/{client,runtime,substrate}/src/__tests__/
      # helpers.ts). The four package vitest invocations run in parallel;
      # pnpm defaults to `os.availableParallelism()` (4 on GitHub-hosted
      # runners).
      - name: Test packages
        run: pnpm --recursive --if-present run test

  package-consumption:
    name: Package consumption
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Pack and type-check external client consumer
        run: pnpm run test:pack:client

  architecture-reports:
    name: Architecture reports (evidence)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Non-gating: surface architecture evidence on PRs without blocking merges.
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz

      - name: Regenerate architecture evidence
        run: pnpm run arch:reports

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Architecture evidence"
            echo
            echo "Regenerated by \`pnpm run arch:reports\`. Download the artifact"
            echo "below for the inventory JSON+Markdown plus dependency graph"
            echo "SVGs and Mermaid sources."
            echo
            echo "| File | Purpose |"
            echo "| --- | --- |"
            echo "| \`docs/effect-artifact-inventory.json\` | Machine-readable Effect artifact inventory |"
            echo "| \`docs/effect-artifact-inventory.md\` | Human-readable inventory |"
            echo "| \`docs/dependency-graph.svg\` | Broad production workspace graph |"
            echo "| \`docs/dependency-graph-modules.svg\` | Module-collapsed production graph |"
            echo "| \`docs/dependency-graph-archi.svg\` | Architecture view |"
            echo "| \`docs/dependency-graph.mmd\` | Collapsed Mermaid graph |"
            echo "| \`docs/dependency-graph-{client,runtime,substrate}.mmd\` | Per-package internals |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload architecture-evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-reports
          path: |
            docs/effect-artifact-inventory.json
            docs/effect-artifact-inventory.md
            docs/dependency-graph.svg
            docs/dependency-graph-modules.svg
            docs/dependency-graph-archi.svg
            docs/dependency-graph.mmd
            docs/dependency-graph-client.mmd
            docs/dependency-graph-runtime.mmd
            docs/dependency-graph-substrate.mmd
          if-no-files-found: warn
          retention-days: 14
