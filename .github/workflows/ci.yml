name: CI

on:
  # Explicit dispatch: task-exit.sh self-heals a DRAFT PR whose
  # `pull_request` event was suppressed (GitHub does not start Actions
  # from events created by some automation tokens) by dispatching CI
  # directly on the branch ref, so the merge gate always has a run.
  workflow_dispatch:
  # Enumerated so draft-open AND draft→ready both deterministically
  # trigger the gate (ready_for_review is NOT a default activity type).
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    # The beads-sync cron commits `.beads/issues.jsonl` every few
    # minutes (status SoT durability). Those data-only commits must not
    # trigger a full CI run — that cadence, not any single job, is the
    # dominant CI cost. The cron keeps syncing; it just stops paying CI.
    paths-ignore:
      - ".beads/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  TURBO_TELEMETRY_DISABLED: 1

# Per-job setup boilerplate (checkout + pnpm + node + install) lives in
# the local composite action at `.github/actions/setup`; pnpm/node
# version bumps touch one file rather than every job.
#
# Gating jobs:
#   lint              — eslint + dead-code + dup + effect-quality + ast-grep
#   semgrep           — semgrep --test fixtures + production semgrep scan
#   typecheck         — pnpm --recursive typecheck
#   effect-diagnostics — effect-language-service diagnostics
#   tests             — pnpm --recursive tests

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm run lint

      - name: Check dead-code baseline
        run: pnpm run lint:dead

      - name: Check duplicate-token baseline
        run: pnpm run lint:dup

      - name: Check dependency boundaries
        run: pnpm run lint:deps

      - name: Check Effect-quality metric ratchet
        run: pnpm run lint:effect-quality

      - name: Check ast-grep style guardrails
        run: pnpm run lint:ast-grep

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      # Semgrep's npm packages are unmaintained; install the maintained CLI
      # with pipx, matching docs/TOOLING.md.
      - name: Install Semgrep CLI
        run: pipx install semgrep

      - name: Test structural duplication rules
        run: pnpm run lint:semgrep:test

      - name: Check structural duplication shapes
        run: pnpm run lint:semgrep

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Typecheck packages
        run: pnpm --recursive --if-present --workspace-concurrency=4 run typecheck

  effect-diagnostics:
    name: Effect diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Effect diagnostics
        run: pnpm effect:diagnostics

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node + install
        uses: ./.github/actions/setup

      - name: Test packages
        run: pnpm --recursive --if-present run test
