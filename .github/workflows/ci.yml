name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: true
      TURBO_TELEMETRY_DISABLED: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Semgrep's npm packages are unmaintained; install the maintained CLI
      # with pipx, matching docs/TOOLING.md.
      - name: Install semgrep CLI
        run: pipx install semgrep

      - name: Lint
        run: pnpm run lint

      - name: Check dead-code baseline
        run: pnpm run lint:dead

      - name: Check duplicate-token baseline
        run: pnpm run lint:dup

      - name: Check transitive dependency boundaries
        run: pnpm run lint:deps

      - name: Test structural duplication rules
        run: pnpm run lint:semgrep:test

      - name: Check structural duplication shapes
        run: pnpm run lint:semgrep

      - name: Typecheck packages
        run: pnpm --recursive --if-present --workspace-concurrency=4 run typecheck

      - name: Effect diagnostics
        run: pnpm effect:diagnostics

      - name: Test packages
        run: pnpm --recursive --if-present --workspace-concurrency=1 run test
